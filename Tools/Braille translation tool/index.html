<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>зӣІж–ҮеҸҢеҗ‘зҝ»иҜ‘еҷЁ В· жӢјйҹізӣІж–Үе…ЁиҰҶзӣ–</title>
    <!-- дҪҝз”Ё jsDelivr еҠ йҖҹпјҢеҠ иҪҪжӣҙзЁіе®ҡ -->
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.19.0/dist/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ж ·ејҸдёҺд№ӢеүҚдҝқжҢҒдёҖиҮҙпјҢжӯӨеӨ„зңҒз•Ҙе®Ңж•ҙд»Јз Ғд»ҘдҝқиҜҒйҳ…иҜ»дҪ“йӘҢпјҢе®һйҷ…дҪҝз”Ёж—¶иҜ·дҝқз•ҷе®Ңж•ҙж ·ејҸ */
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-primary-fixed: #EADDFF;
            --md-sys-color-primary-fixed-dim: #D0BCFF;
            --md-sys-color-on-primary-fixed: #21005D;
            --md-sys-color-on-primary-fixed-variant: #4F378B;
            --md-sys-color-secondary: #625B71;
            --md-sys-color-on-secondary: #FFFFFF;
            --md-sys-color-secondary-container: #E8DEF8;
            --md-sys-color-on-secondary-container: #1D192B;
            --md-sys-color-tertiary: #7D5260;
            --md-sys-color-on-tertiary: #FFFFFF;
            --md-sys-color-tertiary-container: #FFD8E4;
            --md-sys-color-on-tertiary-container: #31111D;
            --md-sys-color-error: #B3261E;
            --md-sys-color-on-error: #FFFFFF;
            --md-sys-color-error-container: #F9DEDC;
            --md-sys-color-on-error-container: #410E0B;
            --md-sys-color-surface: #FFFBFE;
            --md-sys-color-on-surface: #1C1B1F;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-outline: #79747E;
            --md-sys-color-outline-variant: #CAC4D0;
            --md-sys-color-surface-dim: #D8D5DB;
            --md-sys-color-surface-bright: #FFFBFE;
            --md-sys-color-surface-container-lowest: #FFFFFF;
            --md-sys-color-surface-container-low: #F7F2FA;
            --md-sys-color-surface-container: #F3EDF7;
            --md-sys-color-surface-container-high: #ECE6F0;
            --md-sys-color-surface-container-highest: #E6E0E9;
            --md-sys-color-inverse-surface: #313033;
            --md-sys-color-inverse-on-surface: #F4EFF4;
            --md-sys-color-scrim: #000000;
            --md-sys-color-shadow: #000000;
            --md-elevation-1: 0px 1px 2px rgba(0, 0, 0, 0.3), 0px 1px 3px 1px rgba(0, 0, 0, 0.15);
            --md-elevation-2: 0px 1px 2px rgba(0, 0, 0, 0.3), 0px 2px 6px 2px rgba(0, 0, 0, 0.15);
            --md-elevation-3: 0px 1px 3px rgba(0, 0, 0, 0.3), 0px 4px 8px 3px rgba(0, 0, 0, 0.15);
            --md-elevation-4: 0px 2px 3px rgba(0, 0, 0, 0.3), 0px 6px 10px 4px rgba(0, 0, 0, 0.15);
            --md-elevation-5: 0px 4px 4px rgba(0, 0, 0, 0.3), 0px 8px 12px 6px rgba(0, 0, 0, 0.15);
            --transition-standard: 200ms cubic-bezier(0.2, 0, 0, 1);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --md-sys-color-primary: #D0BCFF;
                --md-sys-color-on-primary: #381E72;
                --md-sys-color-primary-container: #4F378B;
                --md-sys-color-on-primary-container: #EADDFF;
                --md-sys-color-secondary: #CCC2DC;
                --md-sys-color-on-secondary: #332D41;
                --md-sys-color-secondary-container: #4A4458;
                --md-sys-color-on-secondary-container: #E8DEF8;
                --md-sys-color-tertiary: #EFB8C8;
                --md-sys-color-on-tertiary: #492532;
                --md-sys-color-tertiary-container: #633B48;
                --md-sys-color-on-tertiary-container: #FFD8E4;
                --md-sys-color-error: #F2B8B5;
                --md-sys-color-on-error: #601410;
                --md-sys-color-error-container: #8C1D18;
                --md-sys-color-on-error-container: #F9DEDC;
                --md-sys-color-surface: #1C1B1F;
                --md-sys-color-on-surface: #E6E1E5;
                --md-sys-color-surface-variant: #49454F;
                --md-sys-color-on-surface-variant: #CAC4D0;
                --md-sys-color-outline: #938F99;
                --md-sys-color-outline-variant: #49454F;
                --md-sys-color-surface-dim: #141316;
                --md-sys-color-surface-bright: #3A383C;
                --md-sys-color-surface-container-lowest: #0F0D13;
                --md-sys-color-surface-container-low: #1C1B1F;
                --md-sys-color-surface-container: #201F24;
                --md-sys-color-surface-container-high: #2B292E;
                --md-sys-color-surface-container-highest: #363439;
                --md-sys-color-inverse-surface: #E6E1E5;
                --md-sys-color-inverse-on-surface: #313033;
                --md-sys-color-scrim: #000000;
                --md-sys-color-shadow: #000000;
            }
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            transition: background-color var(--transition-standard), color var(--transition-standard);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .top-app-bar {
            width: 100%;
            max-width: 840px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 4px;
            margin-bottom: 8px;
        }
        .top-app-bar .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }
        .top-app-bar h1 {
            font-size: 1.35rem;
            font-weight: 500;
            line-height: 1.3;
            color: var(--md-sys-color-on-surface);
        }
        .top-app-bar .subtitle {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--md-sys-color-on-surface-variant);
        }
        .chip-row {
            width: 100%;
            max-width: 840px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            align-items: center;
        }
        .chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--md-sys-color-outline);
            background: transparent;
            color: var(--md-sys-color-on-surface);
            transition: all var(--transition-standard);
            white-space: nowrap;
            font-family: inherit;
            outline: none;
        }
        .chip:hover {
            background: var(--md-sys-color-surface-container-highest);
            border-color: var(--md-sys-color-on-surface-variant);
        }
        .chip.active {
            background: var(--md-sys-color-primary-container);
            border-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary-container);
            font-weight: 600;
            box-shadow: var(--md-elevation-1);
        }
        .pinyin-status {
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: auto;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface-variant);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .pinyin-status.success {
            background: #dcedc8;
            color: #33691e;
        }
        .pinyin-status.fail {
            background: #ffcdd2;
            color: #b71c1c;
        }
        .main-container {
            width: 100%;
            max-width: 840px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background: var(--md-sys-color-surface-container-low);
            border-radius: 28px;
            padding: 20px 20px 16px;
            box-shadow: var(--md-elevation-1);
            transition: all var(--transition-standard);
            border: 1px solid transparent;
        }
        .card:hover {
            box-shadow: var(--md-elevation-2);
            border-color: var(--md-sys-color-outline-variant);
        }
        .card.input-card {
            background: var(--md-sys-color-surface-container-lowest);
            box-shadow: var(--md-elevation-2);
            border: 2px solid var(--md-sys-color-outline-variant);
        }
        .card.input-card:focus-within {
            border-color: var(--md-sys-color-primary);
            box-shadow: var(--md-elevation-3), 0 0 0 4px rgba(103, 80, 164, 0.12);
        }
        .card.output-card {
            background: linear-gradient(135deg, var(--md-sys-color-primary-container) 0%, var(--md-sys-color-surface-container-low) 100%);
            box-shadow: var(--md-elevation-2);
            min-height: 80px;
        }
        .card-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            font-size: 1.05rem;
            line-height: 1.7;
            resize: vertical;
            min-height: 70px;
            max-height: 220px;
            color: var(--md-sys-color-on-surface);
            outline: none;
            padding: 4px 0;
        }
        .card-textarea.braille-output {
            font-family: 'Roboto Mono', 'Noto Sans SC', monospace;
            font-size: 1.6rem;
            line-height: 1.8;
            letter-spacing: 0.04em;
            word-spacing: 0.2em;
            min-height: 60px;
            color: var(--md-sys-color-on-primary-container);
            cursor: default;
            user-select: text;
        }
        .card-textarea::placeholder {
            color: var(--md-sys-color-on-surface-variant);
            opacity: 0.6;
        }
        .char-count {
            font-size: 0.7rem;
            color: var(--md-sys-color-on-surface-variant);
            text-align: right;
            margin-top: 6px;
            opacity: 0.7;
        }
        .action-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            border: none;
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: all var(--transition-standard);
            outline: none;
        }
        .icon-btn:hover {
            background: var(--md-sys-color-surface-container-highest);
            color: var(--md-sys-color-on-surface);
            box-shadow: var(--md-elevation-1);
            transform: translateY(-1px);
        }
        .icon-btn:active {
            transform: scale(0.94);
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }
        .icon-btn.swap-btn {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            font-size: 1.6rem;
            box-shadow: var(--md-elevation-2);
        }
        .btn-filled, .btn-tonal {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all var(--transition-standard);
            display: flex;
            align-items: center;
            gap: 6px;
            outline: none;
        }
        .btn-filled {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            box-shadow: var(--md-elevation-1);
        }
        .btn-filled:hover {
            box-shadow: var(--md-elevation-3);
            filter: brightness(1.08);
            transform: translateY(-1px);
        }
        .btn-tonal {
            background: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }
        .btn-tonal:hover {
            box-shadow: var(--md-elevation-2);
            filter: brightness(0.95);
        }
        .braille-keyboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 8px 0;
        }
        .dot-grid-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .dot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 10px;
            padding: 12px;
            background: var(--md-sys-color-surface-container);
            border-radius: 20px;
            box-shadow: var(--md-elevation-1);
        }
        .dot-cell {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 180ms cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--md-sys-color-surface-variant);
            border: 2px solid var(--md-sys-color-outline-variant);
            outline: none;
        }
        .dot-cell:hover {
            border-color: var(--md-sys-color-primary);
            background: var(--md-sys-color-primary-container);
            box-shadow: 0 0 0 6px rgba(103, 80, 164, 0.1);
            transform: scale(1.08);
        }
        .dot-cell.active {
            background: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 6px rgba(103, 80, 164, 0.2), var(--md-elevation-2);
            transform: scale(1.05);
            animation: dot-pop 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes dot-pop {
            0% { transform: scale(0.7); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1.05); }
        }
        .braille-preview {
            font-size: 2.8rem;
            text-align: center;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--md-sys-color-on-surface);
            font-family: 'Roboto Mono', monospace;
        }
        .braille-viz {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .braille-viz-char {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 4px;
            border-radius: 10px;
            background: var(--md-sys-color-surface-container);
        }
        .viz-dot-row {
            display: flex;
            gap: 4px;
        }
        .viz-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--md-sys-color-outline-variant);
        }
        .viz-dot.filled {
            background: var(--md-sys-color-primary);
            box-shadow: 0 0 4px rgba(103, 80, 164, 0.5);
        }
        .snackbar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--md-sys-color-inverse-surface);
            color: var(--md-sys-color-inverse-on-surface);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: var(--md-elevation-4);
            z-index: 1000;
            transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .snackbar.show {
            transform: translateX(-50%) translateY(0);
        }
        @media (max-width: 600px) {
            body { padding: 8px; }
            .card { border-radius: 20px; padding: 14px 14px 12px; }
            .card-textarea { font-size: 0.95rem; min-height: 55px; }
            .card-textarea.braille-output { font-size: 1.3rem; }
            .dot-cell { width: 36px; height: 36px; }
            .dot-grid { gap: 7px; padding: 10px; }
            .icon-btn { width: 40px; height: 40px; }
            .icon-btn.swap-btn { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>
    <div class="top-app-bar">
        <div class="logo-icon">в ҝ</div>
        <div class="title-group">
            <h1>зӣІж–Үзҝ»иҜ‘еҷЁ</h1>
            <span class="subtitle">жӢјйҹізӣІж–Үе…ЁиҰҶзӣ– В· еҚ•зҪ‘йЎөеҚіз”Ё</span>
        </div>
    </div>

    <div class="chip-row" role="radiogroup" aria-label="зҝ»иҜ‘жЁЎејҸ">
        <button class="chip active" data-mode="auto" role="radio" aria-checked="true">иҮӘеҠЁжЈҖжөӢ</button>
        <button class="chip" data-mode="en" role="radio" aria-checked="false">иӢұж–ҮзӣІж–Ү</button>
        <button class="chip" data-mode="zh" role="radio" aria-checked="false">дёӯж–ҮзӣІж–Ү</button>
        <span id="pinyinStatus" class="pinyin-status">вҸі жЈҖжөӢжӢјйҹіеә“вҖҰ</span>
    </div>

    <div class="main-container">
        <div class="card input-card" id="inputCard">
            <div class="card-label"><span>вңҸпёҸ</span> иҫ“е…Ҙж–Үеӯ—</div>
            <textarea class="card-textarea" id="inputText" placeholder="еңЁжӯӨиҫ“е…Ҙж–Үеӯ—жҲ–зӣІж–Үеӯ—з¬ҰвҖҰ&#10;ж”ҜжҢҒдёӯж–ҮгҖҒиӢұж–ҮгҖҒж•°еӯ—еҸҠзӣІж–ҮUnicodeеӯ—з¬Ұ" rows="3"></textarea>
            <div class="char-count" id="inputCharCount">0 еӯ—з¬Ұ</div>
        </div>

        <div class="action-row">
            <button class="icon-btn swap-btn" id="swapBtn" title="дәӨжҚўж–№еҗ‘">вҮ…</button>
            <button class="btn-filled" id="translateBtn">вҹі зҝ»иҜ‘</button>
            <button class="btn-tonal" id="copyOutputBtn">рҹ“Ӣ еӨҚеҲ¶з»“жһң</button>
            <button class="icon-btn" id="clearBtn" title="жё…йҷӨ">вң•</button>
        </div>

        <div class="card output-card" id="outputCard">
            <div class="card-label"><span>в ҹ</span> зӣІж–Ү / зҝ»иҜ‘з»“жһң</div>
            <div class="card-textarea braille-output" id="outputText" tabindex="0" aria-live="polite">зӯүеҫ…иҫ“е…ҘвҖҰ</div>
            <div class="char-count" id="outputCharCount">0 зӣІз¬Ұ</div>
        </div>

        <div class="card" id="brailleKeyboardCard">
            <div class="braille-keyboard">
                <div class="keyboard-label">рҹҺ№ зӣІж–ҮзӮ№еӯ—й”®зӣҳ</div>
                <div class="dot-grid-container">
                    <div class="dot-grid" id="dotGrid">
                        <button class="dot-cell" data-dot="1"></button>
                        <button class="dot-cell" data-dot="4"></button>
                        <button class="dot-cell" data-dot="2"></button>
                        <button class="dot-cell" data-dot="5"></button>
                        <button class="dot-cell" data-dot="3"></button>
                        <button class="dot-cell" data-dot="6"></button>
                    </div>
                </div>
                <div class="braille-preview" id="braillePreview">в ҝ</div>
                <div class="braille-char-info" id="brailleCharInfo">жңӘйҖүжӢ©зӮ№дҪҚ</div>
                <div class="btn-row">
                    <button class="btn-filled" id="insertBrailleBtn">пјӢ жҸ’е…ҘзӣІз¬Ұ</button>
                    <button class="btn-tonal" id="appendToOutputBtn">вҶ“ ж·»еҠ еҲ°иҫ“еҮә</button>
                    <button class="icon-btn" id="resetDotsBtn">вҶә</button>
                </div>
            </div>
        </div>

        <div class="card" id="vizCard">
            <div class="card-label"><span>рҹ”Қ</span> зӣІж–ҮзӮ№йҳөеҸҜи§ҶеҢ–</div>
            <div class="braille-viz" id="brailleViz">иҫ“е…ҘзӣІж–Үеӯ—з¬ҰеҗҺеҸҜеңЁжӯӨжҹҘзңӢзӮ№йҳөж”ҫеӨ§еӣҫ</div>
        </div>
    </div>

    <div class="snackbar" id="snackbar"></div>

    <script>
        (function() {
            // ---------- жӢјйҹіеә“зҠ¶жҖҒжЈҖжөӢ ----------
            const pinyinStatusEl = document.getElementById('pinyinStatus');
            let pinyinLibReady = false;
            if (window.pinyinPro) {
                pinyinLibReady = true;
                pinyinStatusEl.textContent = 'вң… жӢјйҹіеә“е·Іе°ұз»Ә';
                pinyinStatusEl.classList.add('success');
                pinyinStatusEl.classList.remove('fail');
            } else {
                pinyinStatusEl.textContent = 'вқҢ жӢјйҹіеә“жңӘеҠ иҪҪ';
                pinyinStatusEl.classList.add('fail');
                pinyinStatusEl.classList.remove('success');
            }

            // еҰӮжһңеҠ иҪҪеӨұиҙҘпјҢ2з§’еҗҺеҶҚж¬ЎжЈҖжөӢпјҲжҹҗдәӣCDNеҸҜиғҪејӮжӯҘпјү
            setTimeout(() => {
                if (!pinyinLibReady && window.pinyinPro) {
                    pinyinLibReady = true;
                    pinyinStatusEl.textContent = 'вң… жӢјйҹіеә“е·Іе°ұз»Ә';
                    pinyinStatusEl.classList.add('success');
                    pinyinStatusEl.classList.remove('fail');
                }
            }, 2000);

            // ---------- DOMе…ғзҙ  ----------
            const inputText = document.getElementById('inputText');
            const outputText = document.getElementById('outputText');
            const inputCharCount = document.getElementById('inputCharCount');
            const outputCharCount = document.getElementById('outputCharCount');
            const swapBtn = document.getElementById('swapBtn');
            const translateBtn = document.getElementById('translateBtn');
            const copyOutputBtn = document.getElementById('copyOutputBtn');
            const clearBtn = document.getElementById('clearBtn');
            const dotGrid = document.getElementById('dotGrid');
            const braillePreview = document.getElementById('braillePreview');
            const brailleCharInfo = document.getElementById('brailleCharInfo');
            const insertBrailleBtn = document.getElementById('insertBrailleBtn');
            const appendToOutputBtn = document.getElementById('appendToOutputBtn');
            const resetDotsBtn = document.getElementById('resetDotsBtn');
            const brailleViz = document.getElementById('brailleViz');
            const snackbar = document.getElementById('snackbar');
            const modeChips = document.querySelectorAll('.chip');

            let activeDots = new Set();
            let currentMode = 'auto';
            let snackbarTimeout = null;

            // ---------- зӣІж–Үжҳ е°„иЎЁ ----------
            const enToBraille = {
                'a':'в Ғ','b':'в ғ','c':'в ү','d':'в ҷ','e':'в ‘','f':'в Ӣ','g':'в ӣ','h':'в “','i':'в Ҡ','j':'в ҡ',
                'k':'в …','l':'в Ү','m':'в Қ','n':'в қ','o':'в •','p':'в Ҹ','q':'в ҹ','r':'в —','s':'в Һ','t':'в һ',
                'u':'в Ҙ','v':'в §','w':'в ә','x':'в ӯ','y':'в Ҫ','z':'в ө',
                'A':'в  в Ғ','B':'в  в ғ','C':'в  в ү','D':'в  в ҷ','E':'в  в ‘','F':'в  в Ӣ','G':'в  в ӣ','H':'в  в “',
                'I':'в  в Ҡ','J':'в  в ҡ','K':'в  в …','L':'в  в Ү','M':'в  в Қ','N':'в  в қ','O':'в  в •','P':'в  в Ҹ',
                'Q':'в  в ҹ','R':'в  в —','S':'в  в Һ','T':'в  в һ','U':'в  в Ҙ','V':'в  в §','W':'в  в ә','X':'в  в ӯ','Y':'в  в Ҫ','Z':'в  в ө'
            };
            const brailleToEnSimple = {
                'в Ғ':'a','в ғ':'b','в ү':'c','в ҷ':'d','в ‘':'e','в Ӣ':'f','в ӣ':'g','в “':'h','в Ҡ':'i','в ҡ':'j',
                'в …':'k','в Ү':'l','в Қ':'m','в қ':'n','в •':'o','в Ҹ':'p','в ҹ':'q','в —':'r','в Һ':'s','в һ':'t',
                'в Ҙ':'u','в §':'v','в ә':'w','в ӯ':'x','в Ҫ':'y','в ө':'z','в  ':''
            };
            const digitToBraille = { '0':'в ҡ','1':'в Ғ','2':'в ғ','3':'в ү','4':'в ҷ','5':'в ‘','6':'в Ӣ','7':'в ӣ','8':'в “','9':'в Ҡ' };
            const brailleDigitToNum = { 'в ҡ':'0','в Ғ':'1','в ғ':'2','в ү':'3','в ҷ':'4','в ‘':'5','в Ӣ':'6','в ӣ':'7','в “':'8','в Ҡ':'9' };
            const punctToBraille = {
                '.':'в І',',':'в Ӯ','?':'в Ұ','!':'в –',';':'в Ҷ',':':'в ’','-':'в Ө',"'":'в „','"':'в Ұв ҙ','(':'в җв Ј',')':'в җв ң',
                '/':'в Ң','@':'в Ҳв Ғ','&':'в Ҳв Ҝ','*':'в җв ”','#':'в ёв №',' ':' ','\n':'\n'
            };
            const braillePunctToText = { 'в І':'.','в Ӯ':',','в Ұ':'?','в –':'!','в Ҷ':';','в ’':':','в Ө':'-','в „':"'" };

            // жӢјйҹізӣІж–Үжҳ е°„пјҲеЈ°жҜҚгҖҒйҹөжҜҚгҖҒеЈ°и°ғпјү
            const initialMap = {
                'b':'в ғ','p':'в Ҹ','m':'в Қ','f':'в Ӣ','d':'в ҷ','t':'в һ','n':'в қ','l':'в Ү',
                'g':'в ӣ','k':'в …','h':'в “','j':'в …','q':'в ҹ','x':'в ӯ',
                'zh':'в Ң','ch':'в ҹ','sh':'в ұ','r':'в ҡ','z':'в ө','c':'в ү','s':'в Һ','':''
            };
            const finalMap = {
                'a':'в Ғ','o':'в •','e':'в ‘','i':'в Ҡ','u':'в Ҙ','v':'в §',
                'ai':'в Ә','ei':'в Ј','ao':'в –','ou':'в ·','an':'в §','en':'в ў','ang':'в Ұ','eng':'в ҙ','ong':'в І',
                'ia':'в «','ie':'в ¬','iao':'в ӯ','iu':'в Ҫ','ian':'в Ҝ','in':'в ®','iang':'в ө','ing':'в ¬','iong':'в ҫ',
                'ua':'в ҝ','uo':'в ҝ','uai':'в Ҫ','ui':'в ҫ','uan':'в ё','un':'в ё','uang':'в ә','ueng':'в ј',
                've':'в «','vn':'в ®','er':'в ң','ГӘ':'в Ј','-i':'в „'
            };
            const toneMap = { '1':'в Ғ','2':'в Ӯ','3':'в „','4':'в Ҷ','5':'' };
            const initialsSorted = Object.keys(initialMap).sort((a,b)=>b.length-a.length);

            function pinyinToBraille(pinyinWithTone) {
                if (!pinyinWithTone) return '';
                const toneMatch = pinyinWithTone.match(/[1-5]$/);
                const tone = toneMatch ? toneMatch[0] : '5';
                const base = toneMatch ? pinyinWithTone.slice(0, -1) : pinyinWithTone;
                let baseNorm = base.replace(/Гј/g, 'v').replace(/u:/g, 'v');
                let initial = '';
                let final = baseNorm;
                for (let init of initialsSorted) {
                    if (baseNorm.startsWith(init)) {
                        initial = init;
                        final = baseNorm.slice(init.length);
                        break;
                    }
                }
                return (initialMap[initial] || '') + (finalMap[final] || '') + (toneMap[tone] || '');
            }

            function chineseToBraille(text) {
                if (!text || !pinyinLibReady) {
                    // еҰӮжһңжӢјйҹіеә“жңӘеҠ иҪҪпјҢдҝқз•ҷжұүеӯ—е№¶еҠ ж Үи®°
                    return text + '[?]';
                }
                try {
                    const pinyinArray = pinyinPro(text, { toneType: 'num', type: 'array' });
                    if (!pinyinArray || !pinyinArray.length) return text + '[?]';
                    let result = '';
                    for (const py of pinyinArray) {
                        if (/^[\u4e00-\u9fff]+$/.test(py) || py.length === 0) continue;
                        if (/[пјҢгҖӮпјҒпјҹпјӣпјҡвҖңвҖқвҖҳвҖҷгҖҒгҖҠгҖӢ]/.test(py)) {
                            result += py;
                            continue;
                        }
                        result += pinyinToBraille(py) || py;
                    }
                    return result;
                } catch (e) {
                    return text + '[жӢјйҹіиҪ¬жҚўеӨұиҙҘ]';
                }
            }

            // ---------- е·Ҙе…·еҮҪж•° ----------
            function isBrailleChar(ch) {
                const code = ch.codePointAt(0);
                return code >= 0x2800 && code <= 0x28FF;
            }
            function hasBrailleChars(str) {
                for (const ch of str) if (isBrailleChar(ch)) return true;
                return false;
            }
            function hasChineseChars(str) {
                return /[\u4e00-\u9fff\u3400-\u4dbf]/.test(str);
            }
            function getDotsFromBrailleChar(ch) {
                if (!isBrailleChar(ch)) return [];
                const code = ch.codePointAt(0) - 0x2800;
                const dots = [];
                for (let i = 0; i < 6; i++) if (code & (1 << i)) dots.push(i + 1);
                return dots;
            }
            function getBrailleCharFromDots(dots) {
                let code = 0;
                for (const d of dots) if (d >= 1 && d <= 6) code |= (1 << (d - 1));
                return String.fromCodePoint(0x2800 + code);
            }

            function translateTextToBraille(text, mode) {
                if (!text || text.trim() === '') return '';
                let result = '';
                let i = 0;
                while (i < text.length) {
                    const ch = text[i];
                    if (ch === ' ' || ch === '\n') {
                        result += ch; i++; continue;
                    }
                    if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch)) {
                        if (mode === 'en') {
                            result += ch;
                        } else {
                            let j = i;
                            while (j < text.length && /[\u4e00-\u9fff\u3400-\u4dbf]/.test(text[j])) j++;
                            result += chineseToBraille(text.substring(i, j));
                            i = j;
                            continue;
                        }
                        i++; continue;
                    }
                    if (/\d/.test(ch)) {
                        const needNumSign = (i === 0 || !/\d/.test(text[i-1]) || text[i-1] === ' ' || text[i-1] === '\n');
                        if (needNumSign) result += 'в ј';
                        result += digitToBraille[ch] || ch;
                        i++; continue;
                    }
                    if (punctToBraille[ch]) { result += punctToBraille[ch]; i++; continue; }
                    if (enToBraille[ch]) { result += enToBraille[ch]; i++; continue; }
                    result += ch; i++;
                }
                return result;
            }

            function translateBrailleToText(brailleStr, mode) {
                if (!brailleStr || brailleStr.trim() === '') return '';
                let result = '';
                let i = 0, inNumber = false, capitalNext = false;
                while (i < brailleStr.length) {
                    const ch = brailleStr[i];
                    if (ch === ' ' || ch === '\n') {
                        result += ch; inNumber = false; capitalNext = false; i++; continue;
                    }
                    if (!isBrailleChar(ch)) { result += ch; i++; continue; }
                    if (ch === 'в ј') { inNumber = true; i++; continue; }
                    if (ch === 'в  ') { capitalNext = true; i++; continue; }
                    if (inNumber) {
                        result += brailleDigitToNum[ch] !== undefined ? brailleDigitToNum[ch] : (brailleToEnSimple[ch] || ch);
                        if (brailleDigitToNum[ch] === undefined) inNumber = false;
                        i++; continue;
                    }
                    if (mode === 'zh' || mode === 'auto') {
                        if (brailleToEnSimple[ch] !== undefined && brailleToEnSimple[ch] !== '') {
                            result += capitalNext ? brailleToEnSimple[ch].toUpperCase() : brailleToEnSimple[ch];
                            capitalNext = false;
                        } else if (braillePunctToText[ch]) {
                            result += braillePunctToText[ch];
                        } else {
                            result += ch;
                        }
                        i++; continue;
                    }
                    if (brailleToEnSimple[ch] !== undefined && brailleToEnSimple[ch] !== '') {
                        result += capitalNext ? brailleToEnSimple[ch].toUpperCase() : brailleToEnSimple[ch];
                        capitalNext = false;
                    } else if (braillePunctToText[ch]) {
                        result += braillePunctToText[ch];
                    } else {
                        result += ch;
                    }
                    i++;
                }
                return result;
            }

            function performTranslation() {
                const text = inputText.value;
                if (!text || text.trim() === '') {
                    outputText.textContent = 'зӯүеҫ…иҫ“е…ҘвҖҰ';
                    outputCharCount.textContent = '0 зӣІз¬Ұ';
                    updateBrailleViz('');
                    return;
                }
                const hasBraille = hasBrailleChars(text);
                const direction = hasBraille ? 'braille-to-text' : 'text-to-braille';
                let result = '';
                if (direction === 'braille-to-text') {
                    result = translateBrailleToText(text, currentMode === 'auto' ? 'en' : currentMode);
                } else {
                    result = translateTextToBraille(text, currentMode === 'auto' ? (hasChineseChars(text) ? 'zh' : 'en') : currentMode);
                }
                outputText.textContent = result || 'пјҲж— жі•зҝ»иҜ‘пјү';
                const brailleCount = [...result].filter(ch => isBrailleChar(ch)).length;
                outputCharCount.textContent = direction === 'text-to-braille' ? brailleCount + ' зӣІз¬Ұ' : [...result].length + ' еӯ—з¬Ұ';
                updateBrailleViz(result);
            }

            function updateBrailleViz(brailleStr) {
                if (!brailleStr || brailleStr.trim() === '' || brailleStr === 'зӯүеҫ…иҫ“е…ҘвҖҰ') {
                    brailleViz.innerHTML = '<span style="color:var(--md-sys-color-on-surface-variant);font-size:0.85rem;">иҫ“е…ҘзӣІж–Үеӯ—з¬ҰеҗҺеҸҜеңЁжӯӨжҹҘзңӢзӮ№йҳөж”ҫеӨ§еӣҫ</span>';
                    return;
                }
                const brailleChars = [...brailleStr].filter(ch => isBrailleChar(ch)).slice(0, 40);
                if (brailleChars.length === 0) {
                    brailleViz.innerHTML = '<span style="color:var(--md-sys-color-on-surface-variant);font-size:0.85rem;">еҪ“еүҚиҫ“еҮәдёҚеҗ«зӣІж–Үеӯ—з¬Ұ</span>';
                    return;
                }
                let html = '';
                for (const ch of brailleChars) {
                    const dots = getDotsFromBrailleChar(ch);
                    html += '<div class="braille-viz-char">';
                    for (let row = 0; row < 3; row++) {
                        const leftDot = row + 1, rightDot = row + 4;
                        html += '<div class="viz-dot-row">';
                        html += `<span class="viz-dot${dots.includes(leftDot) ? ' filled' : ''}"></span>`;
                        html += `<span class="viz-dot${dots.includes(rightDot) ? ' filled' : ''}"></span>`;
                        html += '</div>';
                    }
                    html += `<span class="viz-label">${ch}</span></div>`;
                }
                brailleViz.innerHTML = html;
            }

            function showSnackbar(msg, dur = 2200) {
                if (snackbarTimeout) clearTimeout(snackbarTimeout);
                snackbar.textContent = msg;
                snackbar.classList.add('show');
                snackbarTimeout = setTimeout(() => snackbar.classList.remove('show'), dur);
            }

            // зӮ№еӯ—й”®зӣҳдәӨдә’
            function updateBraillePreview() {
                const sorted = [...activeDots].sort((a,b)=>a-b);
                if (sorted.length === 0) {
                    braillePreview.textContent = 'в ҝ';
                    brailleCharInfo.textContent = 'жңӘйҖүжӢ©зӮ№дҪҚ';
                } else {
                    const ch = getBrailleCharFromDots(sorted);
                    braillePreview.textContent = ch;
                    brailleCharInfo.textContent = `зӮ№${sorted.join('гҖҒ')} В· U+${(0x2800 + [...activeDots].reduce((acc,d)=>acc|(1<<(d-1)),0)).toString(16).toUpperCase()}`;
                }
            }
            function resetDots() {
                activeDots.clear();
                document.querySelectorAll('.dot-cell').forEach(c => { c.classList.remove('active'); c.setAttribute('aria-pressed','false'); });
                updateBraillePreview();
            }

            dotGrid.addEventListener('click', (e) => {
                const cell = e.target.closest('.dot-cell');
                if (!cell) return;
                const dotNum = parseInt(cell.dataset.dot);
                if (activeDots.has(dotNum)) {
                    activeDots.delete(dotNum);
                    cell.classList.remove('active');
                } else {
                    activeDots.add(dotNum);
                    cell.classList.add('active');
                }
                updateBraillePreview();
            });
            resetDotsBtn.addEventListener('click', resetDots);

            insertBrailleBtn.addEventListener('click', () => {
                if (activeDots.size === 0) { showSnackbar('иҜ·йҖүжӢ©зӮ№дҪҚ'); return; }
                const ch = getBrailleCharFromDots([...activeDots]);
                const pos = inputText.selectionStart;
                inputText.value = inputText.value.slice(0, pos) + ch + inputText.value.slice(pos);
                inputText.focus();
                inputText.setSelectionRange(pos + 1, pos + 1);
                resetDots();
                performTranslation();
                showSnackbar('е·ІжҸ’е…ҘзӣІз¬Ұ');
            });

            appendToOutputBtn.addEventListener('click', () => {
                if (activeDots.size === 0) { showSnackbar('иҜ·йҖүжӢ©зӮ№дҪҚ'); return; }
                const ch = getBrailleCharFromDots([...activeDots]);
                const cur = outputText.textContent;
                outputText.textContent = (cur === 'зӯүеҫ…иҫ“е…ҘвҖҰ' || cur === 'пјҲж— жі•зҝ»иҜ‘пјү') ? ch : cur + ch;
                updateBrailleViz(outputText.textContent);
                outputCharCount.textContent = [...outputText.textContent].filter(c=>isBrailleChar(c)).length + ' зӣІз¬Ұ';
                resetDots();
                showSnackbar('е·Іж·»еҠ еҲ°иҫ“еҮә');
            });

            // дё»иҰҒдәӢд»¶
            inputText.addEventListener('input', () => {
                inputCharCount.textContent = [...inputText.value].length + ' еӯ—з¬Ұ';
                requestAnimationFrame(performTranslation);
            });
            translateBtn.addEventListener('click', performTranslation);
            swapBtn.addEventListener('click', () => {
                const out = outputText.textContent;
                if (out === 'зӯүеҫ…иҫ“е…ҘвҖҰ' || out === 'пјҲж— жі•зҝ»иҜ‘пјү' || !out.trim()) {
                    showSnackbar('жІЎжңүеҸҜдәӨжҚўзҡ„еҶ…е®№'); return;
                }
                [inputText.value, outputText.textContent] = [out, inputText.value];
                inputCharCount.textContent = [...inputText.value].length + ' еӯ—з¬Ұ';
                outputCharCount.textContent = [...outputText.textContent].filter(c=>isBrailleChar(c)).length + ' зӣІз¬Ұ';
                updateBrailleViz(outputText.textContent);
            });
            copyOutputBtn.addEventListener('click', () => {
                const text = outputText.textContent;
                if (text === 'зӯүеҫ…иҫ“е…ҘвҖҰ' || text === 'пјҲж— жі•зҝ»иҜ‘пјү') return;
                navigator.clipboard.writeText(text).then(() => showSnackbar('е·ІеӨҚеҲ¶'));
            });
            clearBtn.addEventListener('click', () => {
                inputText.value = '';
                outputText.textContent = 'зӯүеҫ…иҫ“е…ҘвҖҰ';
                inputCharCount.textContent = '0 еӯ—з¬Ұ';
                outputCharCount.textContent = '0 зӣІз¬Ұ';
                resetDots();
                updateBrailleViz('');
                inputText.focus();
            });
            modeChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    modeChips.forEach(c => { c.classList.remove('active'); c.setAttribute('aria-checked','false'); });
                    chip.classList.add('active');
                    chip.setAttribute('aria-checked','true');
                    currentMode = chip.dataset.mode;
                    performTranslation();
                });
            });
            outputText.addEventListener('click', () => {
                const t = outputText.textContent;
                if (t && t !== 'зӯүеҫ…иҫ“е…ҘвҖҰ' && t !== 'пјҲж— жі•зҝ»иҜ‘пјү') navigator.clipboard.writeText(t).then(()=>showSnackbar('е·ІеӨҚеҲ¶'));
            });

            // еҲқе§ӢеҢ–
            updateBraillePreview();
            updateBrailleViz('');
            inputCharCount.textContent = '0 еӯ—з¬Ұ';
            outputCharCount.textContent = '0 зӣІз¬Ұ';
            setTimeout(() => inputText.focus(), 300);
        })();
    </script>
</body>
</html>
