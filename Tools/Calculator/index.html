<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=yes,viewport-fit=cover">
<title>配料表含量转换器</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0">
<link rel="stylesheet" href="/Tools/navbar.css">
<script src="/Tools/navbar.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#9fe870;--op:#0e0f0c;--pa:#cdffad;--pp:#e2f6d5;--k:#0e0f0c;--kd:#163300;--b:#454745;--m:#868685;--c:#fff;--s:#e8ebe6;--r:24px;--rs:12px;--rp:9999px;--r-sm:8px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--s);color:var(--k);min-height:100vh;display:flex;justify-content:center;padding:16px}
.wrap{width:100%;max-width:1000px;display:flex;flex-direction:column;gap:12px;margin-top:4px}
.card{background:var(--c);border-radius:var(--r);box-shadow:0 4px 24px rgba(14,15,12,.06);overflow:hidden}
.card-pad{padding:24px}
.g{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ph{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.ph-bdg{display:inline-flex;align-items:center;gap:5px;background:var(--pp);color:var(--kd);padding:4px 12px;border-radius:var(--rp);font-size:11px;font-weight:700}
.ph-bdg .material-symbols-rounded{font-size:13px}
.ph-r{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.pb{width:36px;height:36px;background:var(--s);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:var(--b)}
.pc{background:none;border:none;width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--m);transition:all .15s;flex-shrink:0}
.pc:hover{background:var(--s);color:#d03238}
.pc .material-symbols-rounded{font-size:18px}
.sv{background:var(--s);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.sr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ip{display:flex;align-items:center;gap:6px}
.ip label{font-size:11px;font-weight:700;color:var(--b);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.inp-sm{width:64px;height:34px;border:2px solid var(--k);border-radius:var(--r-sm);padding:0 8px;font-family:'Inter',monospace;font-size:13px;font-weight:600;text-align:center;background:var(--c);color:var(--k);outline:none;transition:all .15s}
.inp-sm:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(159,232,112,.2)}
.ip .un{font-size:10px;color:var(--m);font-weight:600;text-transform:uppercase}
.qr{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ql{font-size:9px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.08em;margin-right:2px}
.qc{background:var(--c);border:none;margin:0 2px;padding:3px 10px;border-radius:var(--rp);font-size:10px;font-weight:700;cursor:pointer;color:var(--b);font-family:inherit;transition:all .12s}
.qc:hover{background:var(--pp);color:var(--kd)}
.qc.act{background:var(--k);color:var(--p)}
.nt{display:flex;flex-direction:column;gap:3px}
.nr{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:10px;transition:background .12s}
.nr:focus-within{background:var(--s)}
.nr.hl{background:var(--pp)}
.nr.he{background:rgba(255,209,26,.06)}
.nd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nd-na{background:#e8b860}
.nd-kj{background:#e08070}
.nd-pr{background:#9a8ad4}
.nd-ft{background:#e896b0}
.nd-cb{background:#5db8c4}
.nd-fb{background:#9cbc60}
.nn{flex:1;min-width:0;font-size:12px;font-weight:700;color:var(--k)}
.ir{display:flex;gap:10px;flex-shrink:0}
.rc{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.rl{font-size:8px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.06em;line-height:1}
.rv{font-size:12px;font-weight:700;line-height:1.2;font-variant-numeric:tabular-nums;color:var(--k)}
.ru{font-size:.65em;font-weight:500;color:var(--m)}
.ni{width:52px;height:28px;border:2px solid var(--k);border-radius:var(--r-sm);padding:0 6px;font-family:'Inter',monospace;font-size:12px;font-weight:600;text-align:right;background:var(--c);color:var(--k);outline:none;transition:all .12s;flex-shrink:0}
.ni:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(159,232,112,.2)}
.nu{font-size:10px;font-weight:600;color:var(--m);min-width:20px;flex-shrink:0}
.ft{background:var(--k);padding:16px 24px;text-align:center}
.ft .ft-t{font-size:12px;font-weight:700;color:var(--p);margin-bottom:4px}
.ft .ft-f{font-size:10px;color:rgba(232,235,230,.5);line-height:1.6}
.ft .ft-f strong{color:var(--p);font-weight:600}
.add-card-wrap{display:flex;justify-content:center;padding:4px 0}
.add-card{width:44px;height:44px;border:none;border-radius:16px;background:var(--c);color:var(--b);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .12s;box-shadow:0 2px 8px rgba(14,15,12,.06)}
.add-card:hover{background:var(--pp);color:var(--kd);transform:scale(1.05)}
.add-card:active{transform:scale(.92)}
@media(max-width:720px){
.g{grid-template-columns:1fr}
.wrap{max-width:480px}
}
</style>
</head>
<body>
<div class="wrap">
<div class="g" id="grid"></div>
<div class="add-card-wrap">
  <button class="add-card" id="addCardBtn" title="添加面板"><span class="material-symbols-rounded">add</span></button>
</div>
<div class="card"><div class="ft"><div class="ft-t">换算公式</div><div class="ft-f"><strong>盐(g) = 钠(mg) × 2.54 ÷ 1000</strong> &nbsp;·&nbsp; <strong>kcal = kJ ÷ 4.184</strong></div></div></div>
</div>
<script>
(function(){
  var P = [];
  var nextLetter = 'A';

  function g(id) {
    var e = document.getElementById(id);
    if (!e) return null;
    var v = e.value.trim();
    if (v === '') return null;
    var n = parseFloat(v);
    return (isNaN(n) || n < 0) ? null : n;
  }

  function f(n, d) {
    if (n === null || isNaN(n)) return '\u2014';
    if (n === 0) return '0';
    return parseFloat(n.toFixed(d)).toString();
  }

  function c(p) {
    var s = g('s'+p) || 100;
    var na = g('na'+p), kj = g('kj'+p), pro = g('pro'+p), fat = g('fat'+p), car = g('car'+p), fib = g('fib'+p);
    var sp = na !== null ? (na * 2.54 / 1000) / s : null;
    var kp = kj !== null ? (kj / 4.184) / s : null;
    var pp = pro !== null ? pro / s : null;
    var fp = fat !== null ? fat / s : null;
    var cp = car !== null ? car / s : null;
    var fip = fib !== null ? fib / s : null;
    document.getElementById('salt'+p).textContent = sp !== null ? f(sp,3) : '\u2014';
    document.getElementById('kcal'+p).textContent = kp !== null ? f(kp,2) : '\u2014';
    document.getElementById('pr'+p).textContent = pp !== null ? f(pp,2) : '\u2014';
    document.getElementById('ft'+p).textContent = fp !== null ? f(fp,2) : '\u2014';
    document.getElementById('cb'+p).textContent = cp !== null ? f(cp,2) : '\u2014';
    document.getElementById('fb'+p).textContent = fip !== null ? f(fip,2) : '\u2014';
    var tw = g('tw'+p);
    function t(pg) { return (pg !== null && tw !== null && tw > 0) ? f(pg * tw, 2) : '\u2014'; }
    document.getElementById('ts'+p).textContent = t(sp);
    document.getElementById('tk'+p).textContent = t(kp);
    document.getElementById('tpr'+p).textContent = t(pp);
    document.getElementById('tft'+p).textContent = t(fp);
    document.getElementById('tcb'+p).textContent = t(cp);
    document.getElementById('tfb'+p).textContent = t(fip);
    var tc = document.getElementById('tp'+p);
    if (tc) tc.querySelectorAll('.qc').forEach(function(b) {
      b.classList.toggle('act', tw !== null && Math.abs(parseFloat(b.dataset.w) - tw) < 0.01);
    });
  }

  function bindPanel(p) {
    // 记住当前面板哪个输入框最后获得焦点
    var lastFocused = null;
    var ids = ['s'+p,'na'+p,'kj'+p,'pro'+p,'fat'+p,'car'+p,'fib'+p,'tw'+p];
    ids.forEach(function(id) {
      var e = document.getElementById(id);
      if (e) {
        e.addEventListener('input', function() { c(p); });
        e.addEventListener('change', function() { c(p); });
        e.addEventListener('focus', function() { lastFocused = e; });
      }
    });
    var tp = document.getElementById('tp'+p);
    if (tp) tp.addEventListener('click', function(e) {
      var t = e.target.closest('.qc');
      if (!t) return;
      var w = t.dataset.w;
      var sInput = document.getElementById('s'+p);
      var twInput = document.getElementById('tw'+p);
      if (lastFocused === sInput) {
        sInput.value = w;
        sInput.blur();
      } else {
        twInput.value = w;
        if (lastFocused === twInput) twInput.blur();
      }
      lastFocused = null;
      c(p);
    });
  }

  // 克隆卡片（从第一张卡片复制 DOM，替换 ID）
  function cloneCard(letter) {
    var template = document.querySelector('#grid .card');
    if (!template) return null;
    var clone = template.cloneNode(true);
    clone.id = 'p' + letter.toLowerCase();

    // 替换所有带 ID 的元素
    var idMap = {
      'sA':'s','twA':'tw','naA':'na','kjA':'kj','proA':'pro',
      'fatA':'fat','carA':'car','fibA':'fib',
      'saltA':'salt','kcalA':'kcal','prA':'pr','ftA':'ft','cbA':'cb','fbA':'fb',
      'tsA':'ts','tkA':'tk','tprA':'tpr','tftA':'tft','tcbA':'tcb','tfbA':'tfb',
      'tpA':'tp'
    };
    clone.querySelectorAll('[id]').forEach(function(el) {
      var old = el.id;
      if (idMap[old]) el.id = idMap[old] + letter;
    });
    // 替换 letter 标签
    var label = clone.querySelector('.pb');
    if (label) label.textContent = letter;
    // 替换 data-p
    var closeBtn = clone.querySelector('.pc');
    if (closeBtn) closeBtn.setAttribute('data-p', letter);
    // 清空输入值
    clone.querySelectorAll('input').forEach(function(inp) {
      if (inp.id.startsWith('s')) inp.value = '100';
      else inp.value = '';
    });
    // 清空结果显示
    clone.querySelectorAll('.rv').forEach(function(el) {
      el.textContent = '\u2014';
    });
    // 取消高亮
    clone.querySelectorAll('.qc').forEach(function(el) {
      el.classList.remove('act');
    });
    return clone;
  }

  // 新建卡片（克隆后追加）
  function addCard(letter) {
    letter = letter || nextLetter;
    if (!letter) return;
    if (letter === nextLetter) {
      nextLetter = String.fromCharCode(nextLetter.charCodeAt(0) + 1);
    }
    var grid = document.getElementById('grid');
    // 第一张卡片由 JS 创建
    if (!grid.querySelector('.card')) {
      // 用 innerHTML 创建第一张
      var dummy = document.createElement('div');
      dummy.innerHTML = '<div class="card card-pad" id="pa">' +
        '<div class="ph"><div class="ph-bdg"><span class="material-symbols-rounded">calculate</span> Nutrition Calculator</div>' +
        '<div class="ph-r"><div class="pb">A</div>' +
        '<button class="pc remove-card" data-p="A"><span class="material-symbols-rounded">close</span></button></div></div>' +
        '<div class="sv"><div class="sr">' +
        '<div class="ip"><label>每份</label><input type="number" id="sA" value="100" step="any" min="0" class="inp-sm"><span class="un">g</span></div>' +
        '<div class="ip"><label>总重</label><input type="number" id="twA" placeholder="—" step="any" min="0" class="inp-sm"><span class="un">g</span></div></div>' +
        '<div class="qr"><span class="ql">快捷</span><div id="tpA">' +
        '<button class="qc" data-w="15">15</button><button class="qc" data-w="30">30</button>' +
        '<button class="qc" data-w="50">50</button><button class="qc" data-w="100">100</button>' +
        '<button class="qc" data-w="200">200</button><button class="qc" data-w="500">500</button></div></div></div>' +
        '<div class="nt">' +
        '<div class="nr hl"><span class="nd nd-na"></span><span class="nn">钠</span><div class="ir"><div class="rc"><span class="rl">每g</span><span class="rv" id="saltA">—</span></div><div class="rc"><span class="rl">总含</span><span class="rv" id="tsA">—</span></div></div><input type="number" id="naA" placeholder="0" class="ni"><span class="nu">mg</span></div>' +
        '<div class="nr he"><span class="nd nd-kj"></span><span class="nn">能量</span><div class="ir"><div class="rc"><span class="rl">每g</span><span class="rv" id="kcalA">—</span></div><div class="rc"><span class="rl">总含</span><span class="rv" id="tkA">—</span></div></div><input type="number" id="kjA" placeholder="0" class="ni"><span class="nu">kJ</span></div>' +
        '<div class="nr"><span class="nd nd-pr"></span><span class="nn">蛋白质</span><div class="ir"><div class="rc"><span class="rl">每g</span><span class="rv" id="prA">—</span></div><div class="rc"><span class="rl">总含</span><span class="rv" id="tprA">—</span></div></div><input type="number" id="proA" placeholder="0" class="ni"><span class="nu">g</span></div>' +
        '<div class="nr"><span class="nd nd-ft"></span><span class="nn">脂肪</span><div class="ir"><div class="rc"><span class="rl">每g</span><span class="rv" id="ftA">—</span></div><div class=" class</span><span class="rv" id="tftA">—</span></div></div><input type="number" id="fatA" placeholder="0" class="ni"><span class="nu">g</span></div>' +
        '<div class="nr"><span class="nd nd-cb"></span><span class="nn">碳水</span><div class="ir"><div class="rc"><span class="rl">每g</span><span class="rv" id="cbA">—</span></div><div class="rc"><span class="rl">总含</span><span class="rv" id="tcbA">—</span></div></div><input type="number" id="carA" placeholder="0" class="ni"><span class="nu">g</span></div>' +
        '<div class="nr"><span class="nd nd-fb"></span><span class="nn">纤维</span><div class="ir"><div class="rc"><span class="rl">每g</span><span class="rv" id="fbA">—</span></div><div class="rc"><span class="rl">总含</span><span class="rv" id="tfbA">—</span></div></div><input type="number" id="fibA" placeholder="0" class="ni"><span class="nu">g</span></div>' +
        '</div></div>';
      var card = dummy.firstChild;
      grid.appendChild(card);
    } else {
      // 克隆
      var card = cloneCard(letter);
      if (!card) return;
      grid.appendChild(card);
    }
    P.push(letter);
    bindPanel(letter);
    c(letter);
  }

  // 初始化
  addCard('A');
  addCard('B');
  nextLetter = 'C';

  // 删除卡片（事件委托）
  document.getElementById('grid').addEventListener('click', function(e) {
    var btn = e.target.closest('.remove-card');
    if (!btn) return;
    var p = btn.getAttribute('data-p');
    var card = btn.closest('.card');
    if (!card || P.length <= 2) return;
    card.remove();
    var idx = P.indexOf(p);
    if (idx > -1) P.splice(idx, 1);
  });

  // 添加卡片按钮
  document.getElementById('addCardBtn').addEventListener('click', function() {
    addCard();
  });
})();
</script>
</body>
</html>
