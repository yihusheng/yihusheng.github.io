<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC 地址查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- ═══ 统一导航栏 ═══ -->
    <link rel="stylesheet" href="/Tools/navbar.css">
    <script src="/Tools/navbar.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wise: {
                            primary: '#9fe870',
                            'on-primary': '#0e0f0c',
                            'primary-active': '#cdffad',
                            'primary-neutral': '#c5edab',
                            'primary-pale': '#e2f6d5',
                            ink: '#0e0f0c',
                            'ink-deep': '#163300',
                            body: '#454745',
                            mute: '#868685',
                            canvas: '#ffffff',
                            'canvas-soft': '#e8ebe6',
                            positive: '#2ead4b',
                            'positive-deep': '#054d28',
                            negative: '#d03238',
                            'negative-deep': '#a72027',
                            'negative-bg': '#320707',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        display: ['Manrope', 'Inter', 'system-ui', 'sans-serif'],
                    },
                    borderRadius: {
                        'wise-xl': '24px',
                        'wise-md': '12px',
                        'wise-pill': '9999px',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #e8ebe6; /* canvas-soft */
            color: #0e0f0c; /* ink */
        }

        .loader {
            border: 3px solid #e2f6d5;
            border-top: 3px solid #9fe870;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans selection:bg-wise-primary-pale selection:text-wise-ink">

    <main class="w-full max-w-xl bg-wise-canvas rounded-wise-xl overflow-hidden relative shadow-sm">
        
        <!-- Header Section -->
        <header class="bg-wise-canvas-soft p-8 pb-6 text-center border-b border-wise-mute/10">

            <h1 class="text-3xl font-display font-extrabold tracking-tight text-wise-ink mb-1">MAC 地址查询</h1>
        </header>

        <!-- Input Section -->
        <section class="bg-wise-canvas p-8 py-10">
            <div class="mb-8">
                <label for="macInput" class="block text-xs font-semibold text-wise-body mb-3 ml-1 uppercase tracking-wider">
                    输入 MAC 地址
                </label>
                
                <!-- 重构后的单一智能输入框 -->
                <div class="relative flex items-center border-2 border-wise-ink rounded-wise-md overflow-hidden focus-within:border-wise-primary focus-within:shadow-[0_0_0_2px_rgba(159,232,112,0.3)] transition-all duration-200 bg-wise-canvas">
                    <input 
                        type="text" 
                        id="macInput" 
                        placeholder="A1:B2:C3:D4:E5:F6" 
                        class="w-full h-14 bg-transparent text-wise-ink px-5 outline-none text-xl font-mono font-bold tracking-widest placeholder:text-wise-mute/50"
                        maxlength="17"
                        autocomplete="off"
                    >
                    <div class="pr-4 text-wise-mute/50 group-focus-within:text-wise-primary transition-colors">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>
                <p id="errorMsg" class="text-wise-negative text-xs mt-3 ml-1 h-4 opacity-0 transition-opacity duration-300 font-medium">
                    请输入有效的 MAC 地址
                </p>
            </div>

            <button 
                id="searchBtn"
                class="w-full bg-wise-primary text-wise-on-primary font-semibold py-4 rounded-wise-xl hover:bg-wise-primary-active active:scale-[0.98] transition-all duration-200 flex items-center justify-content gap-2 text-lg shadow-sm"
            >
                <span>地址查询</span>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </section>

        <!-- Result Section -->
        <section id="resultSection" class="bg-wise-canvas-soft px-8 py-10 hidden">
            <div class="border-t border-wise-mute/20 pt-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="h-8 w-1.5 bg-wise-primary rounded-wise-pill"></div>
                    <h2 class="text-2xl font-display font-extrabold text-wise-ink">查询结果</h2>
                    <span id="dataSourceBadge" class="ml-auto text-xs bg-wise-primary-pale text-wise-positive-deep px-3 py-1 rounded-wise-pill font-semibold">
                        API Source
                    </span>
                </div>

                <!-- Result Card -->
                <div class="bg-wise-canvas rounded-wise-xl p-6 border border-wise-canvas-soft shadow-sm fade-in">
                    <!-- Vendor Name -->
                    <div class="flex items-start justify-between mb-6">
                        <div>
                            <span class="text-xs font-bold text-wise-body uppercase tracking-widest block mb-2">Vendor / 厂商</span>
                            <p id="vendorName" class="text-2xl font-display font-extrabold text-wise-ink leading-tight">Loading...</p>
                        </div>
                        <div class="bg-wise-primary-pale p-3 rounded-wise-xl text-wise-ink">
                            <i class="fa-solid fa-building text-xl"></i>
                        </div>
                    </div>
                    
                    <!-- Details Grid -->
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div class="space-y-4">
                            <div class="bg-wise-canvas-soft p-4 rounded-wise-xl">
                                <span class="text-[10px] text-wise-body font-bold uppercase block mb-1">MAC 前缀 (OUI)</span>
                                <span id="ouiPrefix" class="text-sm font-mono font-bold text-wise-ink block">--</span>
                            </div>
                            <div class="bg-wise-canvas-soft p-4 rounded-wise-xl">
                                <span class="text-[10px] text-wise-body font-bold uppercase block mb-1">国家/地区</span>
                                <div class="flex items-center gap-2">
                                    <i id="countryIcon" class="fa-solid fa-earth-americas text-wise-primary text-xs"></i>
                                    <span id="countryName" class="text-sm font-medium text-wise-ink">--</span>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="bg-wise-canvas-soft p-4 rounded-wise-xl">
                                <span class="text-[10px] text-wise-body font-bold uppercase block mb-1">地址类型</span>
                                <span id="addressType" class="text-sm font-medium text-wise-ink block">--</span>
                            </div>
                             <div class="bg-wise-canvas-soft p-4 rounded-wise-xl">
                                <span class="text-[10px] text-wise-body font-bold uppercase block mb-1">数据源</span>
                                <span id="apiSource" class="text-xs font-semibold text-wise-ink block">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- Full Address -->
                    <div id="addressContainer" class="mt-6 pt-4 border-t border-wise-canvas hidden">
                        <span class="text-[10px] text-wise-body font-bold uppercase block mb-1">详细地址</span>
                        <p id="fullAddress" class="text-sm text-wise-ink leading-relaxed"></p>
                    </div>
                </div>

                <div class="mt-6 text-center">
                    <button id="resetBtn" class="text-sm text-wise-ink font-semibold hover:underline underline-offset-4 inline-flex items-center gap-1">
                        <i class="fa-solid fa-arrow-rotate-left text-xs"></i>
                        查询新的 MAC 地址
                    </button>
                </div>
            </div>
        </section>

        <!-- Loading State -->
        <div id="loadingState" class="hidden absolute inset-0 bg-wise-canvas/90 backdrop-blur-sm z-10 flex flex-col items-center justify-center">
            <div class="loader mb-3"></div>
            <span id="loadingText" class="text-sm font-medium text-wise-body animate-pulse">正在连接数据源...</span>
        </div>

        <!-- Footer -->
        <footer class="bg-wise-ink p-6 text-center">
            <p class="text-xs text-wise-canvas-soft/70">
                数据来源: IEEE OUI • maclookup.app
            </p>
        </footer>
    </main>

    <script>
        // DOM Elements
        const macInput = document.getElementById('macInput');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultSection = document.getElementById('resultSection');
        const loadingState = document.getElementById('loadingState');
        const loadingText = document.getElementById('loadingText');
        const errorMsg = document.getElementById('errorMsg');
        const inputWrapper = macInput.parentElement; // 获取包裹输入框的div，用于控制边框颜色
        
        // Result Fields
        const vendorNameEl = document.getElementById('vendorName');
        const ouiPrefixEl = document.getElementById('ouiPrefix');
        const addressTypeEl = document.getElementById('addressType');
        const countryNameEl = document.getElementById('countryName');
        const apiSourceEl = document.getElementById('apiSource');
        const addressContainer = document.getElementById('addressContainer');
        const fullAddressEl = document.getElementById('fullAddress');

        // --- 新的智能单一输入框逻辑 ---
        
        // 核心格式化函数：提取十六进制并自动插入冒号
        function formatMac(value) {
            // 1. 提取所有的十六进制字符
            const hex = value.replace(/[^a-fA-F0-9]/g, '').toUpperCase();
            // 2. 每两位一组，用冒号连接
            const parts = hex.match(/.{1,2}/g);
            return parts ? parts.join(':') : '';
        }

        macInput.addEventListener('input', (e) => {
            // 防止最大长度限制导致冒号无法输入的问题
            // 如果用户正在输入，暂时解除maxlength限制
            macInput.removeAttribute('maxlength');
            
            const cursorPosition = macInput.selectionStart;
            const oldValue = macInput.value;
            
            // 格式化
            const formatted = formatMac(oldValue);
            macInput.value = formatted;
            
            // 恢复maxlength
            macInput.setAttribute('maxlength', '17');

            // 智能光标位置计算
            // 如果新输入了字符且刚好补了冒号，光标需要多移动一位
            let diff = formatted.length - oldValue.length;
            let newPosition = cursorPosition + diff;
            
            // 确保光标位置合理
            if (newPosition < 0) newPosition = 0;
            if (newPosition > formatted.length) newPosition = formatted.length;
            
            macInput.setSelectionRange(newPosition, newPosition);
            
            hideError();
        });

        // 智能退格键处理：当光标前面是冒号时，连同冒号前面的字符一起删除
        macInput.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace') {
                const cursorPosition = macInput.selectionStart;
                const value = macInput.value;
                
                // 如果光标前面是冒号，并且没有选中文本
                if (cursorPosition > 0 && value[cursorPosition - 1] === ':' && macInput.selectionStart === macInput.selectionEnd) {
                    e.preventDefault();
                    // 删除冒号及前面的字符
                    const newValue = value.substring(0, cursorPosition - 2) + value.substring(cursorPosition);
                    macInput.value = formatMac(newValue); // 重新格式化以防万一
                    macInput.setSelectionRange(cursorPosition - 2, cursorPosition - 2);
                }
            }
            
            // 回车键触发查询
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // 粘贴事件：清洗并格式化
        macInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            const formatted = formatMac(pasteData);
            macInput.value = formatted;
            // 将光标移动到末尾
            macInput.setSelectionRange(formatted.length, formatted.length);
            hideError();
        });

        // 检查代理是否有效的函数
        async function checkProxyStatus() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                const response = await fetch(`https://cors.maxcloud.fun/?url=https://httpbin.org/get`, { 
                    signal: controller.signal,
                    method: 'GET'
                });
                clearTimeout(timeoutId);
                return response.ok;
            } catch (error) {
                console.error("Proxy check failed:", error);
                return false;
            }
        }

        // --- 核心查询逻辑 ---
        
        function isValidMac(mac) {
            const regex = /^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$/;
            return regex.test(mac);
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('opacity-0');
            // 修改包裹容器的边框颜色
            inputWrapper.classList.remove('border-wise-ink');
            inputWrapper.classList.add('border-wise-negative');
        }

        function hideError() {
            errorMsg.classList.add('opacity-0');
            inputWrapper.classList.remove('border-wise-negative');
            // 恢复原边框色，如果当前没有聚焦则是ink，聚焦则是primary (focus-within会自动处理primary)
            if (!macInput.matches(':focus')) {
                inputWrapper.classList.add('border-wise-ink');
            }
        }

        function getAddressType(mac) {
            const firstByte = parseInt(mac.substring(0, 2), 16);
            const isMulticast = (firstByte & 1) === 1;
            const isLocallyAdministered = (firstByte & 2) === 2;
            if (isLocallyAdministered) return "Local (Random)";
            if (isMulticast) return "Multicast";
            return "Unicast";
        }

        async function performSearch() {
            const mac = macInput.value.trim();

            if (!isValidMac(mac)) {
                showError("格式无效，请输入如 A1:B2:C3:D4:E5:F6");
                return;
            }

            loadingState.classList.remove('hidden');
            resultSection.classList.add('hidden');
            addressContainer.classList.add('hidden');
            vendorNameEl.classList.remove('text-wise-negative', 'text-wise-body');

            try {
                const isProxyAvailable = await checkProxyStatus();
                
                if (!isProxyAvailable) {
                    throw new Error('Proxy unavailable');
                }
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);

                const targetUrl = `https://api.maclookup.app/v2/macs/${mac}`;
                const proxyUrl = `https://cors.maxcloud.fun/?url=${targetUrl}`;
                
                const response = await fetch(proxyUrl, { signal: controller.signal });
                
                clearTimeout(timeoutId);

                if (response.ok) {
                    const json = await response.json();
                    
                    if (json && json.errors && json.errors.detail === "Not Found") {
                        vendorNameEl.textContent = "暂无数据";
                        vendorNameEl.classList.add('text-wise-body');
                        ouiPrefixEl.textContent = mac.substring(0, 8).toUpperCase();
                        countryNameEl.textContent = "暂无数据";
                        countryNameEl.classList.add('text-wise-body');
                        addressContainer.classList.add('hidden');
                    } else if (json && json.company) {
                        vendorNameEl.textContent = json.company;
                        ouiPrefixEl.textContent = mac.substring(0, 8).toUpperCase();
                        addressTypeEl.textContent = getAddressType(mac);
                        apiSourceEl.textContent = "maclookup.app";
                        
                        if (json.country) {
                            countryNameEl.textContent = json.country;
                            countryNameEl.classList.remove('text-wise-body');
                        } else {
                            countryNameEl.textContent = "暂无数据";
                            countryNameEl.classList.add('text-wise-body');
                        }

                        if (json.address) {
                            addressContainer.classList.remove('hidden');
                            fullAddressEl.textContent = json.address;
                        } else {
                            addressContainer.classList.add('hidden');
                        }
                    } else {
                        throw new Error('Invalid data structure');
                    }
                } else {
                    throw new Error('API returned non-OK status');
                }

            } catch (error) {
                console.error("Detailed Error:", error);
                let errorText = "查询失败";
                if (error.name === 'AbortError') errorText = "请求超时";
                else if (error.message.includes('Failed to fetch')) errorText = "网络连接异常";
                else if (error.message === 'Proxy unavailable') errorText = "代理服务器不可用，请稍后重试";
                
                vendorNameEl.textContent = errorText;
                vendorNameEl.classList.add('text-wise-negative');
                ouiPrefixEl.textContent = "--";
                countryNameEl.textContent = "--";
                addressContainer.classList.add('hidden');
                
            } finally {
                loadingState.classList.add('hidden');
                resultSection.classList.remove('hidden');
            }
        }

        searchBtn.addEventListener('click', performSearch);
        resetBtn.addEventListener('click', () => {
            macInput.value = '';
            resultSection.classList.add('hidden');
            hideError();
            macInput.focus();
        });
        
        // 页面加载时自动聚焦
        window.onload = () => {
            macInput.focus();
        };
    </script>
</body>
</html>
