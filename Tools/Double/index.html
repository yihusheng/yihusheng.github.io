<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>双浮点运算计算器</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
<link rel="stylesheet" href="/Tools/navbar.css">
<script src="/Tools/navbar.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#9fe870;--op:#0e0f0c;--pa:#cdffad;--pp:#e2f6d5;--k:#0e0f0c;--kd:#163300;--b:#454745;--m:#868685;--c:#fff;--s:#e8ebe6;--neg:#d03238;--r:24px;--rs:12px;--rp:9999px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--s);color:var(--k);min-height:100vh;display:flex;justify-content:center;padding:16px}
.wrap{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px;margin-top:8px}
.bdg{display:inline-flex;align-items:center;gap:5px;background:var(--pp);color:var(--kd);padding:4px 12px;border-radius:var(--rp);font-size:11px;font-weight:700;width:fit-content;margin-bottom:6px}
.bdg .material-symbols-rounded{font-size:13px}
h1{font-size:26px;font-weight:900;letter-spacing:-.03em;line-height:1.1;margin-bottom:2px}
.sub{font-size:13px;color:var(--m);margin-bottom:16px}
.card{background:var(--c);border-radius:var(--r);box-shadow:0 4px 24px rgba(14,15,12,.06);overflow:hidden}
.pad{padding:24px}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--b);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.inp{width:100%;height:50px;background:var(--c);border:2px solid var(--k);border-radius:var(--rs);padding:0 14px;font-family:'Inter',monospace;font-size:16px;font-weight:600;color:var(--k);outline:none;transition:all .2s}
.inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(159,232,112,.2)}
.inp::placeholder{color:rgba(134,134,133,.35)}
.inp.r{color:var(--p);background:var(--k);border-color:var(--k);font-size:20px;font-weight:800;letter-spacing:-.02em;cursor:default}
.btn{width:100%;height:50px;border:none;border-radius:var(--rs);background:var(--k);color:var(--p);font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;box-shadow:0 3px 12px rgba(14,15,12,.1)}
.btn:hover{background:var(--kd);transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.ft{background:var(--k);padding:14px 24px;text-align:center}
.ft p{font-size:11px;color:rgba(232,235,230,.5)}
.info{font-size:12px;color:var(--m);text-align:center;margin-top:4px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
<div class="card" style="padding:24px">
  <div class="bdg"><span class="material-symbols-rounded">calculate</span> Float Calculator</div>
  <h1>双浮点运算</h1>
  <p class="sub">双字数值与浮点数双向转换</p>

  <label class="lbl"><span class="material-symbols-rounded" style="font-size:13px">memory</span> 双字数值</label>
  <input id="input" class="inp" type="text" value="1072693248">

  <label class="lbl" style="margin-top:16px"><span class="material-symbols-rounded" style="font-size:13px">tag</span> 浮点结果</label>
  <input id="result" class="inp r" type="text" value="1" readonly>

  <button class="btn" id="calculate" style="margin-top:20px"><span class="material-symbols-rounded" style="font-size:18px">sync_alt</span> 开始转换</button>

  <div class="info">双字数值与浮点数相互转换 &bull; 输入任一值自动计算</div>
</div>
<div class="card"><div class="ft"><p>有能力的请支持下作者：137362300@qq.com</p></div></div>
</div>

<script>
var inp=document.getElementById('input'),res=document.getElementById('result'),btn=document.getElementById('calculate');
function c2f(v){var n=parseFloat(v);if(isNaN(n))return'数值不正确';var r=1+(n-1072693248)/Math.pow(2,20);return r%1===0?r.toFixed(0):r.toFixed(2)}
function f2c(v){var n=parseFloat(v);if(isNaN(n))return'';var r=(n-1)*Math.pow(2,20)+1072693248;return r.toFixed(0)}
function up(){var iv=inp.value,rv=res.value;if(document.activeElement===inp){var r=c2f(iv);if(r!=='数值不正确')res.value=r}else if(document.activeElement===res){var c=f2c(rv);if(c)inp.value=c}}
btn.onclick=function(){var r=c2f(inp.value);res.value=r}
inp.addEventListener('input',function(){var r=c2f(this.value);if(r!=='数值不正确')res.value=r})
res.addEventListener('input',function(){var c=f2c(this.value);if(c)inp.value=c})
</script>
</body>
</html>
