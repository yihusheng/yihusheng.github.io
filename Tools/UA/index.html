<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UA 信息读取</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500900=" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
<link rel="stylesheet" href="/src/css/wise.css">
<link rel="stylesheet" href="/src/css/ua.css">
<link rel="stylesheet" href="/Tools/navbar.css">
<script src="/Tools/navbar.js"></script>
</head>
<body>
<div class="wrap">
<div class="card" style="padding:24px">
  <div class="bdg"><span class="material-symbols-rounded">device_hub</span> UA Analyzer</div>
  <h1>UA 信息读取</h1>
  <p class-A系统、浏览器信息</p>
  <div class="ua-box">
    <textarea id="uaInput" placeholder="粘贴 User-Agent 字符串..."></textarea>
    <button class="ua-cp" id="copyUABtn"><span class="material-symbols-rounded">content_copy</span> 复制</button>
  </div>
  btn="parseBtn" style="margin-top:12px"><span class="material-symbols-rounded" style="font-size:16px">search</span> 解析</button>
  <div class="rw">
    <button class="btn btn-s" id="useMyUABtn"><span class="material-symbols-rounded" style="font-size:14px">smartphone</span> 本机 UA</button>
    <button class="btn btn-s" id="clearBtn"><span class="material-symbols-rounded" style="font-size:14px">delete</span> 清空</button>
  </div>
</div>
<div class="card rs" id="resultCard">
  <div class="pad">
    <label class="lbl"><span class="material-symbols-rounded" style="font-size:13px">analytics</span> 解析结果</label>
    <div class="dg">
      <div class="di"><div class="dl">浏览器</div><div class="dv" id="bVal">--</div></div>
      <div class="di"><div class="dl">版本</div><div class="dv" id="bvVal">--</div></div>
      <div class="di"><div class="dl">操作系统</div><div class="dv" id="oVal">--</div></div>
      <div class="di"><div class="dl">系统版本</div><div class="dv" id="ovVal">--</div></div>
      <div class="di"><div class="dl">设备品牌</div><div class="dv" id="brVal">--</div></div>
      <div class="di"><div class="dl">设备型号</div><div class="dv" id="mVal">--</div></div>
      <div class="di" style="grid-column:1/-1"><div class="dl">设备类别</div><div class="dv" id="tVal">--</div></div>
    </div>
    <div class="raw" id="rawD"></div>
    <div class="rw">
      <button class="btn btn-s" id="cpyBtn"><span class="material-symbols-rounded" style="font-size:14px">content_copy</span> 复制结果</button>
      <button class="btn btn-s" id="dbBtn"><span class="material-symbols-rounded" style="font-size:14px">open_in_new</span> 设备数据库</button>
    </div>
  </div>
</div>
<div class="card"><div class="ft"><p>数据参考 <a href="https://github.com/KHwang9883/MobileModels" target="_blank">KHwang9883/MobileModels</a></p></div></div>
</div>
<script>
var DB = {
  '24129PN74C':['小米','Xiaomi 15'],'2410DPN6CC':['小米','Xiaomi 15 Pro'],'25019PNF3C':['小米','Xiaomi 15 Ultra'],
  '23127PN0CC':['小米','Xiaomi 14'],'23116PN5BC':['小米','Xiaomi 14 Pro'],'24031PN0DC':['小米','Xiaomi 14 Ultra'],
  '2211133C':['小米','Xiaomi 13'],'2210132C':['小米','Xiaomi 13 Pro'],'2304FPN6DC':['小米','Xiaomi 13 Ultra'],
  '2201123C':['小米','Xiaomi 12'],'2201122C':['小米','Xiaomi 12 Pro'],'2106118C':['小米','MIX 4'],
  '23113RKC6C':['红米','Redmi K70'],'23117RK66C':['红米','Redmi K70 Pro'],
  '22127RK46C':['红米','Redmi K60 Pro'],'23013RK75C':['红米','Redmi K60'],
  'M2012K11C':['红米','Redmi K40 Pro'],'M2012K11AC':['红米','Redmi K40'],
  'PJZ110':['一加','OnePlus 13'],'PJD110':['一加','OnePlus 12'],'PHB110':['一加','OnePlus 11'],
  'NE2210':['一加','OnePlus 10 Pro'],'PHK110':['一加','OnePlus Ace 2'],'PJE110':['一加','OnePlus Ace 3'],
  'PJX110':['一加','OnePlus Ace 3 Pro'],'PKG110':['一加','OnePlus Ace 5'],
  'SM-S9280':['三星','Galaxy S24 Ultra'],'SM-S9180':['三星','Galaxy S23 Ultra'],
  'SM-S9080':['三星','Galaxy S22 Ultra'],'SM-S9210':['三星','Galaxy S24'],
  'V2324A':['vivo','X100 Pro'],'V2309A':['vivo','X100'],'V2241A':['vivo','X90'],
  'PHY110':['OPPO','Find X7 Ultra'],'PHZ110':['OPPO','7'],
['00'],
-AN00':['荣耀','P':':'], A mi ['s '],
ivoOO'],
  ['meizu','魅族'],['pixel','谷歌'],['moto','摩托罗拉'],['motorola','摩托罗拉'],
  ['nokia','诺基亚'],['sony','索尼'],['xperia','索尼'],['asus','华硕'],
  ['nothing','Nothing'],['nubia','努比亚'],['zte','中兴'],
  ['blackshark','黑鲨'],['coolpad','酷派'],['360','360']
];
function getBrand(ua) {
  var u = ua.toLowerCase();
  for (var i = 0; i < BRANDS.length; i++) {
    if (u.indexOf(BRANDS[i][0]) !== -1) return BRANDS[i][1];
  }
  return '';
}
function getType(ua) {
  var u = ua.toLowerCase();
  if (u.indexOf('iphone')!==-1 || (u.indexOf('mobile')!==-1 && u.indexOf('android')!==-1)) return '手机';
  if (u.indexOf('ipad')!==-1 || u.indexOf('tablet')!==-1) return '平板';
  if (u.indexOf('watch')!==-1) return '手表';
  if (u.indexOf('tv')!==-1) return '电视';
  if (u.indexOf('mobile')!==-1) return '手机';
  return '电脑';
}
function parse() {
  var ua = document.getElementById('uaInput').value.trim();
  if (!ua) return;
  var b = '未知', bv = '';
  var u = ua.toLowerCase();
  if (u.indexOf('edg')!==-1) { b='Edge'; bv=(ua.match(/Edg\/([\d.]+)/)||[])[1]||''; }
  else if (u.indexOf('chrome')!==-1) { b='Chrome'; bv=(ua.match(/Chrome\/([\d.]+)/)||[])[1]||''; }
  else if (u.indexOf('firefox')!==-1) { b='Firefox'; bv=(ua.match(/Firefox\/([\d.]+)/)||[])[1]||''; }
  else if (u.indexOf('safari')!==-1) { b='Safari'; bv=(ua.match(/Version\/([\d.]+)/)||[])[1]||''; }
  else if (u.indexOf('opr')!==-1) { b='Opera'; bv=(ua.match(/OPR\/([\d.]+)/)||[])[1]||''; }
  else if (u.indexOf('micromessenger')!==-1';
 '';
')!==-1) { os='Android'; ov=(ua.match(/Android\s([\d.]+)/)||[])[1]||''; }
  else if (u.indexOf('iphone os')!==-1 || u.indexOf('ios')!==-1) { os='iOS'; var v=ua.match(/OS\s([\d_]+)/); if(v) ov=v[1].replace(/_/g,'.'); }
  else if (u.indexOf('mac os x')!==-1) { os='macOS'; var v=ua.match(/Mac OS X\s([\d_]+)/); if(v) ov=v[1].replace(/_/g,'.'); }
  else if (u.indexOf('windows nt 10')!==-1) os='Windows 10/11';
  else if (u.indexOf('linux')!==-1) os='Linux';
  else if (u.indexOf('harmonyos')!==-1) { os='HarmonyOS'; ov=(ua.match(/HarmonyOS\s([\d.]+)/)||[])[1]||''; }
  var dbBrand = '', modelText = '--';
  var m = ua.match(/Android\s[\d.]+;\s*([A-Za-z0-9_-]{6,})\s*(?:Build|\))/);
  if (m) {
    var code = m[1].toUpperCase();
    if (DB[code]) { dbBrand = DB[code][0]; modelText = DB[code][0] + ' ' + DB[code][1] + ' (' + code + ')'; }
    else modelText = code;
  }
  if (modelText === '--') {
    m = ua.match(/[;\s]([A-Z0-9]{6,12})\s*[;)\\]/);
    if (m) {
      var code = m[1].toUpperCase();
      if (DB[code]) { dbBrand = DB[code][0]; modelText = DB[code][0] + ' ' + DB[code][1] + ' (' + code + ')'; }
      else modelText = code;
    }
  }
  m = ua.match(/iPhone(\d+,\d+)/);
  if (m) { dbBrand = '苹果'; modelText = '苹果 iPhone ' + m[1].replace(',','/'); }
  var brand = dbBrand || getBrand(ua) || '--';
  var type = getType(ua);
  document.getElementById('bVal').textContent = b;
  document.getElementById('bvVal').textContent = bv || '--';
  document.getElementById('oVal').textContent = os;
  document.getElementById('ovVal').textContent = ov || '--';
  document.getElementById('brVal').textContent = brand;
  document.getElementById('mVal').textContent = modelText;
  document.getElementById('tVal').textContent = type;
  document.getElementById('rawD').textContent = ua;
  document.getElementById('resultCard').classList.add('s');
}
document.getElementById('parseBtn').addEventListener('click', parse);
document.getElementById('useMyUABtn').addEventListener('click', function(){
  document.getElementById('uaInput').value = navigator.userAgent;
  parse();
});
document.getElementById('clearBtn').addEventListener('click', function(){
  document.getElementById('uaInput').value = '';
  document.getElementById('resultCard').classList.remove('s');
});
document.getElementById('copyUABtn').addEventListener('click', function(){
  var text = document.getElementById('uaInput').value;
  if (!text) return;
  var btn = document.getElementById('copyUABtn');
  navigator.clipboard.writeText(text).then(function(){
    btn.innerHTML = '<span class="material-symbols-rounded">check</span> 已复制';
    setTimeout(function(){ btn.innerHTML = '<span class="material-symbols-rounded">content_copy</span> 复制'; }, 1500);
  });
});
document.getElementById('cpyBtn').addEventListener('click', function(){
  var t = '浏览器: ' + document.getElementById('bVal').textContent + ' ' + document.getElementById('bvVal').textContent +
    '\n系统: ' + document.getElementById('oVal').textContent + ' ' + document.getElementById('ovVal').textContent +
    '\n品牌: ' + document.getElementById('brVal').textContent +
    '\n型号: ' + document.getElementById('mVal').textContent +
    '\n类型: ' + document.getElementById('tVal').textContent +
    '\n\n原始 UA:\n' + document.getElementById('uaInput').value;
  navigator.clipboard.writeText(t);
});
document.getElementById('dbBtn').addEventListener('click', function(){
  window.open('https://github.com/KHwang9883/MobileModels','_blank');
});
window.addEventListener('load', function(){
  document.getElementById('uaInput').value = navigator.userAgent;
  setTimeout(parse, 100);
});
</script>
</body>
</html>
