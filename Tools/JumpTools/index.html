<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>跳转链接 · 应用商店直达</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
<link rel="stylesheet" href="/src/css/wise.css">
<link rel="stylesheet" href="/Tools/navbar.css">
<script src="/Tools/navbar.js"></script>
</head>
<body>
<div class="wrap">
  <div class="card" style="padding:var(--sxl)">
    <div class="badge-positive"><span class="material-symbols-rounded">open_in_new</span> App Store Links</div>
    <h1 style="margin-top:4px">跳转链接</h1>
    <p class="sub">输入包名 · 自动生成商店直达链接</p>
    <label class="lbl">应用包名</label>
    <input type="text" id="packageInput" class="inp" placeholder="例如: com.tencent.mm" value="com.instagram.android">
    <select id="brandSelect" style="width:100%;margin-top:var(--sl)">
      <option value="auto">自动检测</option>
      <option value="huawei">华为 / 荣耀</option>
      <option value="xiaomi">小米 / Redmi</option>
      <option value="oppo">OPPO / 一加</option>
      <option value="vivo">vivo / iQOO</option>
      <option value="samsung">三星</option>
      <option value="generic_android">通用 Android</option>
      <option value="apple">苹果 iPhone</option>
    </select>
  </div>
  <div class="card" style="padding:var(--sxl)">
    <div style="margin-bottom:var(--sl)">
      <div style="display:flex;align-items:center;gap:var(--ss);margin-bottom:var(--ss)">
        <div style="width:32px;height:32px;background:var(--pp);border-radius:var(--rm);display:flex;align-items:center;justify-content:center;flex-shrink:0"><span class="material-symbols-rounded" style="font-size:16px;color:var(--kd)">star</span></div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:var(--b)">品牌专用</div>
          <div style="font-size:10px;color:var(--m)" id="brandHintBadge">自动检测</div>
        </div>
        <span id="brandCopyOk" style="display:none;font-size:10px;color:var(--pos);font-weight:600">已复制</span>
      </div>
      <div style="background:var(--s);border-radius:var(--rm);padding:var(--sm) var(--sl);font-family:var(--fm);font-size:11px;word-break:break-all;color:var(--k);margin-bottom:var(--ss);line-height:1.5;min-height:20px" id="brandProtocolLink">请输入有效包名</div>
      <button class="btn-secondary" id="copyBrandLinkBtn" style="height:38px;font-size:14px">复制链接</button>
    </div>
    <div style="margin-bottom:var(--sl)">
      <div style="display:flex;align-items:center;gap:var(--ss);margin-bottom:var(--ss)">
        <div style="width:32px;height:32px;background:var(--pp);border-radius:var(--rm);display:flex;align-items:center;justify-content:center;flex-shrink:0"><span class="material-symbols-rounded" style="font-size:16px;color:var(--kd)">public</span></div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:var(--b)">通用市场</div>
          <div style="font-size:10px;color:var(--m)">协议直达</div>
        </div>
        <span id="universalCopyOk" style="display:none;font-size:10px;color:var(--pos);font-weight:600">已复制</span>
      </div>
      <div style="background:var(--s);border-radius:var(--rm);padding:var(--sm) var(--sl);font-family:var(--fm);font-size:11px;word-break:break-all;color:var(--k);margin-bottom:var(--ss);line-height:1.5;min-height:20px" id="universalProtocolLink">请输入有效包名</div>
      <button class="btn-secondary" id="copyUniversalLinkBtn" style="height:38px;font-size:14px">复制链接</button>
    </div>
    <div>
      <div style="display:flex;align-items:center;gap:var(--ss);margin-bottom:var(--ss)">
        <div style="width:32px;height:32px;background:var(--pp);border-radius:var(--rm);display:flex;align-items:center;justify-content:center;flex-shrink:0"><span class="material-symbols-rounded" style="font-size:16px;color:var(--kd)">language</span></div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;color:var(--b)">网页商店</div>
          <div style="font-size:10px;color:var(--m)">浏览器备选</div>
        </div>
        <span id="webCopyOk" style="display:none;font-size:10px;color:var(--pos);font-weight:600">已复制</span>
      </div>
      <div style="background:var(--s);border-radius:var(--rm);padding:var(--sm) var(--sl);font-family:var(--fm);font-size:11px;word-break:break-all;color:var(--k);margin-bottom:var(--ss);line-height:1.5;min-height:20px" id="webLink">请输入有效包名</div>
      <button class="btn-secondary" id="copyWebLinkBtn" style="height:38px;font-size:14px">复制链接</button>
    </div>
  </div>
  <div class="card-dark" style="padding:var(--sl) var(--sxl);text-align:center">
    <p style="font-size:11px;color:rgba(232,235,230,.5)">点击链接可能不跳转，请使用复制按钮</p>
  </div>
</div>
<script>
var cManual='auto',PI=document.getElementById('packageInput'),BS=document.getElementById('brandSelect'),BH=document.getElementById('brandHintBadge'),BPL=document.getElementById('brandProtocolLink'),UPL=document.getElementById('universalProtocolLink'),WL=document.getElementById('webLink');
var bCO=document.getElementById('brandCopyOk'),uCO=document.getElementById('universalCopyOk'),wCO=document.getElementById('webCopyOk');
function gAuto(){var u=navigator.userAgent.toLowerCase(),i=/iphone|ipad|ipod/.test(u),a=/android/.test(u),h=/harmonyos|huawei|hmos/i.test(u),b='generic_android',p='android',f=false;if(i){p='ios';b='apple';f=true}else if(h||(a&&(u.includes('huawei')||u.includes('honor')))){if(u.includes('honor'))b='honor';else b='huawei'}else if(a){if(u.includes('xiaomi')||u.includes('mi ')||u.includes('redmi')||u.includes('poco'))b='xiaomi';else if(u.includes('oppo')||u.includes('realme')||(u.includes('oneplus')&&!u.includes('oppo')))b='oppo';else if(u.includes('vivo')||u.includes('iqoo'))b='vivo';else if(u.includes('samsung')||u.includes('sm-'))b='samsung';else if(u.includes('honor'))b='honor';else if(u.includes('huawei'))b='huawei';else b='generic_android'}else{p='other';b='desktop'}return{brand:b,platform:p,isIOS:f}}
function gEff(){var a=gAuto(),s=cManual;if(s==='auto')return a;var b=s,p=a.platform,i=false;if(s==='apple'){i=true;p='ios'}else if(s==='generic_android'){p='android'}else{i=false;p='android'}return{brand:b,platform:p,isIOS:i}}
function gBN(b,i){if(i)return'App Store';switch(b){case'huawei':return'华为';case'honor':return'荣耀';case'xiaomi':return'小米';case'oppo':return'OPPO';case'oneplus':return'一加';case'vivo':return'vivo';case'samsung':return'三星';default:return'通用'}}
var pkg,bi,brand,isIOS,brandLink,universalLink,webLinkUrl;
function upd(){pkg=PI.value.trim();bi=gEff();brand=bi.brand;isIOS=bi.isIOS;BH.textContent=cManual!=='auto'?'手动: '+gBN(brand,isIOS):'自动: '+gBN(brand,isIOS);brandLink=pkg?gBSL(pkg,bi):null;universalLink=pkg?gUL(pkg,bi):null;webLinkUrl=pkg?gWS(pkg,bi):null;BPL.textContent=brandLink||'请输入有效包名';UPL.textContent=universalLink||'请输入有效包名';WL.textContent=webLinkUrl||'请输入有效包名'}
function gBSL(p,b){if(!p)return null;var pk=p.trim(),br=b.brand;if(b.isIOS)return'itms-apps://itunes.apple.com/search?term='+encodeURIComponent(pk)+'&entity=software';switch(br){case'huawei':case'honor':return'app://com.huawei.appmarket/'+pk;case'xiaomi':return'mimarket://details?id='+pk;case'oppo':case'oneplus':return'oppomarket://details?packagename='+pk;case'vivo':return'vivomarket://details?id='+pk;case'samsung':return'samsungapps://ProductDetail/'+pk;default:return'market://details?id='+pk}}
function gUL(p,b){if(!p)return null;var pk=p.trim();return b.isIOS?'itms-apps://itunes.apple.com/search?term='+encodeURIComponent(pk)+'&entity=software':'market://details?id='+pk}
function gWS(p,b){if(!p)return null;var pk=p.trim();return b.isIOS?'https://apps.apple.com/search?term='+encodeURIComponent(pk):'https://play.google.com/store/apps/details?id='+pk}
function cp(t,ok){if(!t)return;try{navigator.clipboard.writeText(t);ok.style.display='inline';setTimeout(function(){ok.style.display='none'},1500)}catch(e){}}
PI.addEventListener('input',upd);BS.addEventListener('change',function(){cManual=BS.value;upd()});document.getElementById('copyBrandLinkBtn').addEventListener('click',function(){cp(brandLink,bCO)});document.getElementById('copyUniversalLinkBtn').addEventListener('click',function(){cp(universalLink,uCO)});document.getElementById('copyWebLinkBtn').addEventListener('click',function(){cp(webLinkUrl,wCO)})
function init(){var a=gAuto(),s=a.brand;if(a.isIOS)s='apple';else if(s==='honor'||s==='oneplus')s='oppo';else if(!['huawei','xiaomi','oppo','vivo','samsung','generic_android'].includes(s))s='generic_android';for(var i=0;i<BS.options.length;i++){if(BS.options[i].value===s){BS.selectedIndex=i;break}}cManual=BS.value;upd()}
init()
</script>
</body>
</html>
