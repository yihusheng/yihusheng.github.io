// 新增：通过IP获取位置
async function getLocationByIP() {
    try {
        // 优先尝试 ipapi.co (支持HTTPS)
        const response = await fetch('https://ipapi.co/json/');
        if (!response.ok) throw new Error('IP API request failed');
        const data = await response.json();
        if (data.latitude && data.longitude) {
            return { lat: data.latitude, lon: data.longitude };
        }
    } catch (e) {
        console.warn('IP定位失败 (ipapi.co)', e);
        // 如果是在HTTP环境下，尝试 ip-api.com
        if (location.protocol === 'http:') {
            try {
                const resHttp = await fetch('http://ip-api.com/json/?lang=zh-CN');
                if (resHttp.ok) {
                    const dataHttp = await resHttp.json();
                    if (dataHttp.status === 'success') {
                        return { lat: dataHttp.lat, lon: dataHttp.lon };
                    }
                }
            } catch (e2) {
                console.warn('IP定位失败 (ip-api.com)', e2);
            }
        }
    }
    return null;
}

async function fetchWeather() {
    let lat = parseFloat(CookieUtils.get('weather_lat')) || null;
    let lon = parseFloat(CookieUtils.get('weather_lon')) || null;

    if (!lat || !lon) {
        if ('geolocation' in navigator) {
            try {
                document.getElementById('locationDisplay').textContent = "定位中...";
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { 
                        timeout: 10000, 
                        enableHighAccuracy: true, 
                        maximumAge: 5*60*1000 
                    });
                });
                lat = position.coords.latitude;
                lon = position.coords.longitude;
                CookieUtils.set('weather_lat', lat, 30);
                CookieUtils.set('weather_lon', lon, 30);
                // 后续会统一更新城市名显示
            } catch (e) {
                console.warn('GPS定位失败，尝试IP定位', e);
                const ipLoc = await getLocationByIP();
                if (ipLoc) {
                    lat = ipLoc.lat;
                    lon = ipLoc.lon;
                    CookieUtils.set('weather_lat', lat, 30);
                    CookieUtils.set('weather_lon', lon, 30);
                    document.getElementById('locationDisplay').textContent = "IP定位中...";
                } else {
                    // GPS和IP都失败
                    lat = 39.9042;
                    lon = 116.4074;
                    document.getElementById('locationDisplay').textContent = "定位失败";
                }
            }
        } else {
            // 不支持GPS，直接尝试IP
            console.warn('不支持GPS，尝试IP定位');
            const ipLoc = await getLocationByIP();
            if (ipLoc) {
                lat = ipLoc.lat;
                lon = ipLoc.lon;
                CookieUtils.set('weather_lat', lat, 30);
                CookieUtils.set('weather_lon', lon, 30);
                document.getElementById('locationDisplay').textContent = "IP定位中...";
            } else {
                lat = 39.9042;
                lon = 116.4074;
                document.getElementById('locationDisplay').textContent = "不支持定位";
            }
        }
    }

    // 反向地理编码获取位置名称 (通用逻辑)
    try {
        const locRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=zh`);
        const locData = await locRes.json();
        let locationName = "未知位置";
        if (locData?.city) locationName = locData.city;
        else if (locData?.locality) locationName = locData.locality;
        else if (locData?.principalSubdivision) locationName = locData.principalSubdivision;
        else if (locData?.countryName) locationName = locData.countryName;
        else locationName = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
        
        // 更新显示
        const currentDisplay = document.getElementById('locationDisplay').textContent;
        // 只有当前显示的是"定位中..."或"IP定位中..."时，才覆盖显示城市名
        // 避免在"定位失败"或"不支持定位"时覆盖提示
        if (currentDisplay.includes('定位中') || currentDisplay === '未知位置') {
            document.getElementById('locationDisplay').textContent = locationName;
        }

        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=auto`);
        const data = await weatherRes.json();
        const current = data.current_weather || data.current;
        const daily = data.daily;
        const temp = Math.round(current.temperature_2m);
        const code = current.weather_code;
        const weather = weatherCodeMap[code] || { desc: "未知", icon: "thermostat", bg: "#1a1c18" };
        
        document.getElementById('islandWeatherTemp').textContent = `${temp}°`;
        document.getElementById('islandWeatherIcon').textContent = weather.icon;
        document.getElementById('detailIcon').textContent = weather.icon;
        document.getElementById('detailTemp').textContent = `${temp}°`;
        document.getElementById('detailDesc').textContent = weather.desc;
        document.getElementById('detailRange').textContent = `H:${Math.round(daily.temperature_2m_max[0])}° L:${Math.round(daily.temperature_2m_min[0])}°`;
        document.getElementById('detailWind').innerHTML = `<span class="material-symbols-rounded">air</span> ${Math.round(current.wind_speed_10m)}km/h`;
        document.getElementById('detailHumidity').innerHTML = `<span class="material-symbols-rounded">water_drop</span> ${current.relative_humidity_2m}%`;
        
        document.documentElement.style.setProperty('--island-expand-bg', weather.bg);
    } catch (e) {
        console.warn('天气数据获取失败', e);
        // 只有在不是"定位失败"的状态下才显示"天气获取失败"
        if (!document.getElementById('locationDisplay').textContent.includes('失败') && !document.getElementById('locationDisplay').textContent.includes('不支持')) {
             document.getElementById('locationDisplay').textContent = "天气获取失败";
        }
    }
}

document.getElementById('sliderThumb'); audio.addEventListener('timeupdate', () => { const { duration, currentTime } = audio; if (isNaN(duration)) return; const percent = (currentTime / duration) * 100; if (!isDragging) updateUI(percent); if (currentTime >= duration && duration > 0) document.getElementById('nextBtn').click(); }); audioSlider.addEventListener('input', () => { isDragging = true; updateUI(audioSlider.value); }); audioSlider.addEventListener('change', () => { isDragging = false; audio.currentTime = (audioSlider.value / 100) * audio.duration; }); function updateUI(percent) { percent = isNaN(percent) ? 0 : Math.max(0, Math.min(100, percent)); audioSlider.value = percent; activeTrack.style.width = percent + '%'; inactiveTrack.style.left = percent + '%'; inactiveTrack.style.width = (100 - percent) + '%'; sliderThumb.style.left = percent + '%'; const cur = isDragging ? (percent / 100) * audio.duration : audio.currentTime; document.getElementById('currTime').innerText = isNaN(cur) ? '0:00' : `${Math.floor(cur/60)}:${String(Math.floor(cur%60)).padStart(2,'0')}`; document.getElementById('durTime').innerText = isNaN(audio.duration) ? '0:00' : `${Math.floor(audio.duration/60)}:${String(Math.floor(audio.duration%60)).padStart(2,'0')}`; } if ('mediaSession' in navigator) { navigator.mediaSession.setActionHandler('play', playSong); navigator.mediaSession.setActionHandler('pause', pauseSong); navigator.mediaSession.setActionHandler('previoustrack', () => document.getElementById('prevBtn').click()); navigator.mediaSession.setActionHandler('nexttrack', () => document.getElementById('nextBtn').click()); } function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); } document.addEventListener('keydown', e => { if (e.key === ' ') { e.preventDefault(); audio.paused ? playSong() : pauseSong(); } else if (e.key === 'ArrowLeft') { e.preventDefault(); document.getElementById('prevBtn').click(); } else if (e.key === 'ArrowRight') { e.preventDefault(); document.getElementById('nextBtn').click(); } }); async function loadBingWallpaper() { if (window.innerWidth < 768) return; try { const response = await fetch('https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN'); const data = await response.json(); if (data.images && data.images.length > 0) { const imgUrl = 'https://www.bing.com' + data.images[0].url; const img = new Image(); img.src = imgUrl; img.onload = () => { document.body.style.backgroundImage = `url(${imgUrl})`; }; } } catch (e) { console.warn('Bing壁纸加载失败'); } } function init() { updateTime(); setInterval(updateTime, 1000); fetchWeather(); setInterval(fetchWeather, 10 * 60 * 1000); island.addEventListener('click', toggleIsland); loadBingWallpaper(); window.addEventListener('resize', () => { if (window.innerWidth >= 768) loadBingWallpaper(); }); updateThemeColor(); } loadSong(songs[currentSongIndex]); init(); </script> </body> </html>
