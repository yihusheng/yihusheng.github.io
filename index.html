<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- 状态栏颜色固定为纯黑 -->
    <meta name="theme-color" content="#000000">
    <title>Tools Music</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>

    <div class="phone-screen" id="app">
        <div class="dynamic-island" id="island">
            <div class="island-default">
                <span class="island-time" id="islandTime">12:00</span>
                <div class="island-weather">
                    <span class="island-weather-icon" id="islandWeatherIcon">☀️</span>
                    <span class="island-weather-temp" id="islandWeatherTemp">--°</span>
                </div>
            </div>
            
            <div class="island-weather-detail">
                <div class="detail-left">
                    <span class="detail-icon-lg" id="detailIcon">☀️</span>
                    <div class="detail-temp-wrap">
                        <span class="detail-temp-now" id="detailTemp">25°</span>
                        <span class="detail-temp-range" id="detailRange">H:28° L:20°</span>
                    </div>
                </div>
                <div class="detail-right">
                    <div class="location-display" id="locationDisplay">获取中...</div>
                    <div class="detail-desc" id="detailDesc">晴朗</div>
                    <div class="detail-meta">
                        <span id="detailWind">💨 12km/h</span>
                        <span id="detailHumidity">💧 45%</span>
                    </div>
                </div>
            </div>
            <div class="island-content">
                <div class="island-music">
                    <img id="islandCover" crossorigin="anonymous" src="" class="island-cover" alt="cover">
                    <div class="island-info">
                        <span id="islandTitle" class="island-title">Song Title</span>
                        <span id="islandArtist" class="island-artist">Artist</span>
                    </div>
                </div>
                <div class="island-waveform">
                    <div class="island-bar"></div>
                    <div class="island-bar"></div>
                    <div class="island-bar"></div>
                </div>
            </div>
        </div>

        <div class="player-content">
            <div class="player-background"></div>
            
            <img id="mainCover" crossorigin="anonymous" src="" class="album-art">
            <div class="song-info">
                <h1 id="mainTitle" class="song-title-main">Title</h1>
                <p id="mainArtist" class="artist-name">Artist</p>
            </div>
             <div class="m3-slider-root">
                <div class="m3-slider-track-inactive" id="inactiveTrack"></div>
                <div class="m3-slider-track-active-container" id="activeTrack">
                    <svg width="600" height="20" viewBox="0 0 600 20" preserveAspectRatio="none">
                        <path class="m3-slider-wavy-path" d="M0,10 Q10,0 20,10 T40,10 T60,10 T80,10 T100,10 T120,10 T140,10 T160,10 T180,10 T200,10 T220,10 T240,10 T260,10 T280,10 T300,10 T320,10 T340,10 T360,10 T380,10 T400,10 T420,10 T440,10 T460,10 T480,10 T500,10 T520,10 T540,10 T560,10 T580,10 T600,10" />
                    </svg>
                </div>
                <div class="m3-slider-thumb-vertical" id="sliderThumb"></div>
                <input type="range" class="m3-slider-input" id="audioSlider" min="0" max="100" value="0">
            </div>
            <div class="time-labels">
                <span id="currTime">0:00</span>
                <span id="durTime">0:00</span>
            </div>
            <div class="controls">
                <button class="btn" id="prevBtn"><span class="material-symbols-rounded">skip_previous</span></button>
                <button class="btn btn-play" id="playBtn">
                    <span class="material-symbols-rounded" id="playIcon">play_arrow</span>
                </button>
                <button class="btn" id="nextBtn"><span class="material-symbols-rounded">skip_next</span></button>
            </div>
        </div>

        <div class="bottom-drawer" id="drawer">
            <div class="nav-handle-area" onclick="toggleDrawer()"><div class="md3-nav-bar"></div></div>
            <div class="drawer-scroll-view">
                <h3 class="drawer-title">Dashboard</h3>
                <div class="grid">
                    <div class="card"><span class="material-symbols-rounded">calculate</span><span><a href="/Tools/Double">Double</a></span></div>
                    <div class="card"><span class="material-symbols-rounded">lan</span><span><a href="/Tools/MAC">MAC Info</a></span></div>
                    <div class="card"><span class="material-symbols-rounded">dashboard</span><span><a href="/Tools/zashboard">zashboard</a></span></div>
                    <div class="card"><span class="material-symbols-rounded">dashboard</span><span><span><a href="/Tools/Metacubexd">Metacubexd</a></span></div>
                    <div class="card"><span class="material-symbols-rounded">dns</span><span><a href="/Tools/Webp2jpg">DNS Prefetch</a></span></div>
                    <div class="card"><span class="material-symbols-rounded">imagesmode</span><span><a href="/Tools/Webp2jpg">Webp2jpg</a></span></div>
                </div>
                <div class="drawer-footer-copyright">
                    <div class="copyright-text">&copy; 2026 Personal Dashboard. All Rights Reserved. <a href="/Music" class="secret-x">✕</a></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>
    <canvas id="colorCanvas" style="display: none;"></canvas>

    <script src="./src/script.js"></script>
</body>
</html>
