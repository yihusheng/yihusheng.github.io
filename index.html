<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC 地址深度查询工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6750A4',
                        onPrimary: '#FFFFFF',
                        primaryContainer: '#EADDFF',
                        onPrimaryContainer: '#21005D',
                        secondary: '#625B71',
                        secondaryContainer: '#E8DEF8',
                        background: '#FFFBFE',
                        surface: '#FFFBFE',
                        surfaceVariant: '#E7E0EC',
                        onSurface: '#1C1B1F',
                        onSurfaceVariant: '#49454F',
                        outline: '#79747E',
                        error: '#B3261E',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans SC"', '"Roboto"', 'sans-serif'],
                    },
                    boxShadow: {
                        'md3': '0px 4px 8px 3px rgba(0, 0, 0, 0.15), 0px 1px 3px 0px rgba(0, 0, 0, 0.3)',
                        'md3-sm': '0px 1px 3px 1px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fdf8fd;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0) 0, hsla(253,16%,7%,0) 50%), 
                radial-gradient(at 50% 0%, hsla(265,100%,74%,0.1) 0, hsla(265,100%,74%,0) 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0) 0, hsla(339,49%,30%,0) 50%);
        }
        
        .loader {
            border: 3px solid #EADDFF;
            border-top: 3px solid #6750A4;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-onSurface font-sans selection:bg-primaryContainer selection:text-onPrimaryContainer">

    <main class="w-full max-w-lg bg-surface rounded-[32px] shadow-md3 overflow-hidden border border-white/50 backdrop-blur-sm relative">
        
        <!-- Header Section -->
        <header class="p-8 pb-4 text-center">
            <div class="w-16 h-16 bg-primaryContainer rounded-full flex items-center justify-center mx-auto mb-4 text-primary shadow-sm">
                <i class="fa-solid fa-globe text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-onSurface mb-1">MAC 地址深度查询</h1>
            <p class="text-sm text-onSurfaceVariant">集成 maclookup.app 与 macvendors.co 数据源</p>
        </header>

        <!-- Input Section -->
        <section class="px-8 py-4">
            <div class="relative group">
                <label for="macInput" class="block text-xs font-medium text-onSurfaceVariant mb-2 ml-1 uppercase tracking-wider">MAC Address</label>
                <div class="relative">
                    <input 
                        type="text" 
                        id="macInput" 
                        placeholder="例如: BC:5F:F4:XX:XX:XX" 
                        class="w-full bg-surfaceVariant text-onSurface px-5 py-4 rounded-2xl outline-none border-2 border-transparent focus:border-primary focus:bg-surface transition-all duration-300 placeholder:text-onSurfaceVariant/50 text-lg font-mono tracking-wider shadow-inner"
                        maxlength="17"
                    >
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-onSurfaceVariant/50 group-focus-within:text-primary transition-colors">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>
                <p id="errorMsg" class="text-error text-xs mt-2 ml-1 h-4 opacity-0 transition-opacity duration-300 font-medium">请输入有效的 MAC 地址</p>
            </div>

            <button 
                id="searchBtn"
                class="w-full mt-4 bg-primary text-onPrimary font-medium py-4 rounded-2xl shadow-md3-sm hover:shadow-md3 hover:bg-[#523e85] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2"
            >
                <span>深度查询</span>
                <i class="fa-solid fa-database"></i>
            </button>
        </section>

        <!-- Result Section -->
        <section id="resultSection" class="px-8 py-6 hidden">
            <div class="border-t border-surfaceVariant pt-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="h-8 w-1 bg-primary rounded-full"></div>
                    <h2 class="text-lg font-bold text-onSurface">查询结果</h2>
                    <span id="dataSourceBadge" class="ml-auto text-xs bg-secondaryContainer text-secondary px-2 py-1 rounded-md font-medium">API Source</span>
                </div>

                <!-- Result Card -->
                <div class="bg-primaryContainer/30 rounded-2xl p-5 border border-primaryContainer/50 backdrop-blur-md fade-in">
                    <!-- Vendor Name -->
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <span class="text-xs font-bold text-primary uppercase tracking-widest block mb-1">Vendor / 厂商</span>
                            <p id="vendorName" class="text-xl font-bold text-onPrimaryContainer leading-tight">Loading...</p>
                        </div>
                        <div class="bg-white/50 p-2 rounded-lg text-primary">
                            <i class="fa-solid fa-building"></i>
                        </div>
                    </div>
                    
                    <!-- Details Grid -->
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <!-- Left Column -->
                        <div class="space-y-3">
                            <div class="bg-white/40 p-3 rounded-xl">
                                <span class="text-[10px] text-onSurfaceVariant font-bold uppercase block mb-1">MAC 前缀 (OUI)</span>
                                <span id="ouiPrefix" class="text-sm font-mono font-bold text-onSurface block">--</span>
                            </div>
                            <div class="bg-white/40 p-3 rounded-xl">
                                <span class="text-[10px] text-onSurfaceVariant font-bold uppercase block mb-1">国家/地区</span>
                                <div class="flex items-center gap-2">
                                    <i id="countryIcon" class="fa-solid fa-earth-americas text-primary text-xs"></i>
                                    <span id="countryName" class="text-sm font-medium text-onSurface">--</span>
                                </div>
                            </div>
                        </div>

                        <!-- Right Column -->
                        <div class="space-y-3">
                            <div class="bg-white/40 p-3 rounded-xl">
                                <span class="text-[10px] text-onSurfaceVariant font-bold uppercase block mb-1">地址类型</span>
                                <span id="addressType" class="text-sm font-medium text-onSurface block">--</span>
                            </div>
                             <div class="bg-white/40 p-3 rounded-xl">
                                <span class="text-[10px] text-onSurfaceVariant font-bold uppercase block mb-1">数据源</span>
                                <span id="apiSource" class="text-xs font-medium text-primary block">--</span>
                            </div>
                        </div>
                    </div>

                    <!-- Full Address (Only for maclookup.app) -->
                    <div id="addressContainer" class="mt-4 pt-3 border-t border-white/40 hidden">
                        <span class="text-[10px] text-onSurfaceVariant font-bold uppercase block mb-1">详细地址</span>
                        <p id="fullAddress" class="text-xs text-onSurface leading-relaxed"></p>
                    </div>
                </div>
                
                <div class="mt-4 text-center">
                    <button id="resetBtn" class="text-sm text-primary font-medium hover:underline underline-offset-4">查询另一个</button>
                </div>
            </div>
        </section>

        <!-- Loading State -->
        <div id="loadingState" class="hidden absolute inset-0 bg-surface/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center">
            <div class="loader mb-3"></div>
            <span id="loadingText" class="text-sm font-medium text-onSurfaceVariant animate-pulse">正在连接 maclookup.app...</span>
        </div>

        <!-- Footer -->
        <footer class="p-6 text-center border-t border-surfaceVariant">
            <p class="text-xs text-onSurfaceVariant/70">
                数据来源: IEEE OUI • maclookup.app • macvendors.co
            </p>
        </footer>
    </main>

    <script>
        // DOM Elements
        const macInput = document.getElementById('macInput');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultSection = document.getElementById('resultSection');
        const loadingState = document.getElementById('loadingState');
        const loadingText = document.getElementById('loadingText');
        const errorMsg = document.getElementById('errorMsg');
        
        // Result Fields
        const vendorNameEl = document.getElementById('vendorName');
        const ouiPrefixEl = document.getElementById('ouiPrefix');
        const addressTypeEl = document.getElementById('addressType');
        const countryNameEl = document.getElementById('countryName');
        const countryIconEl = document.getElementById('countryIcon');
        const apiSourceEl = document.getElementById('apiSource');
        const addressContainer = document.getElementById('addressContainer');
        const fullAddressEl = document.getElementById('fullAddress');

        // Helper: Format MAC Address
        macInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/[^a-fA-F0-9]/g, '').toUpperCase();
            let formattedValue = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 2 === 0) formattedValue += ':';
                formattedValue += value[i];
            }
            e.target.value = formattedValue;
            hideError();
        });

        // Helper: Validate MAC
        function isValidMac(mac) {
            const regex = /^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$/;
            return regex.test(mac);
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('opacity-0');
            macInput.classList.add('border-error');
            macInput.classList.add('text-error');
        }

        function hideError() {
            errorMsg.classList.add('opacity-0');
            macInput.classList.remove('border-error');
            macInput.classList.remove('text-error');
        }

        // Logic: Determine Address Type
        function getAddressType(mac) {
            const firstByte = parseInt(mac.substring(0, 2), 16);
            const isMulticast = (firstByte & 1) === 1;
            const isLocallyAdministered = (firstByte & 2) === 2;
            if (isLocallyAdministered) return "Local (Random)";
            if (isMulticast) return "Multicast";
            return "Unicast";
        }

        // Logic: Fetch with Fallback
        async function performSearch() {
            const mac = macInput.value.trim();
            if (!isValidMac(mac)) {
                showError("格式无效，请输入如 00:1A:2B:3C:4D:5E");
                return;
            }

            loadingState.classList.remove('hidden');
            resultSection.classList.add('hidden');
            addressContainer.classList.add('hidden'); // Reset address visibility

            try {
                // Strategy 1: Try maclookup.app (Rich Data)
                loadingText.textContent = "正在从 maclookup.app 获取详细信息...";
                let data = null;
                let source = "maclookup.app";

                try {
                    const response = await fetch(`https://api.maclookup.app/v2/macs/${mac}`);
                    if (response.ok) {
                        data = await response.json();
                    } else {
                        throw new Error('Lookup failed');
                    }
                } catch (e) {
                    // Strategy 2: Fallback to macvendors.co (Simple Text)
                    console.log("Primary API failed, falling back to macvendors.co");
                    loadingText.textContent = "尝试备用数据源 macvendors.co...";
                    source = "macvendors.co";
                    
                    const fallbackResponse = await fetch(`https://api.macvendors.com/${mac}`);
                    if (fallbackResponse.ok) {
                        const vendorText = await fallbackResponse.text();
                        data = {
                            company: vendorText,
                            country: "未知",
                            address: null
                        };
                    } else {
                        throw new Error('All APIs failed');
                    }
                }

                // Update UI
                vendorNameEl.textContent = data.company || "未知厂商";
                ouiPrefixEl.textContent = mac.substring(0, 8).toUpperCase();
                addressTypeEl.textContent = getAddressType(mac);
                apiSourceEl.textContent = source;
                
                // Handle Rich Data Fields
                if (data.country) {
                    countryNameEl.textContent = data.country;
                    // Simple icon mapping based on country code could go here
                } else {
                    countryNameEl.textContent = "N/A";
                }

                if (data.address) {
                    addressContainer.classList.remove('hidden');
                    fullAddressEl.textContent = data.address;
                }

            } catch (error) {
                console.error(error);
                vendorNameEl.textContent = "查询失败";
                vendorNameEl.classList.add('text-error');
            } finally {
                loadingState.classList.add('hidden');
                resultSection.classList.remove('hidden');
            }
        }

        searchBtn.addEventListener('click', performSearch);
        macInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
        resetBtn.addEventListener('click', () => {
            macInput.value = '';
            resultSection.classList.add('hidden');
            macInput.focus();
        });
    </script>
</body>
</html>
