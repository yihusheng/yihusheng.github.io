<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#e8ebe6">
    <title>Tools Music</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
    <!-- Howler.js — 开源音频引擎 (MIT License) -->
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
    <style>
        :root {
            --wise-primary: #9fe870;
            --wise-on-primary: #0e0f0c;
            --wise-primary-active: #cdffad;
            --wise-primary-pale: #e2f6d5;
            --wise-ink: #0e0f0c;
            --wise-ink-deep: #163300;
            --wise-body: #454745;
            --wise-mute: #868685;
            --wise-canvas: #ffffff;
            --wise-canvas-soft: #e8ebe6;
            --wise-canvas-soft-darker: #d8dbd6;
            --wise-positive: #2ead4b;
            --wise-negative: #d03238;
            --wise-negative-bg: #320707;
            --md-sys-color-primary: #9fe870;
            --md-sys-color-on-primary: #0e0f0c;
            --md-sys-color-primary-container: #0e0f0c;
            --md-sys-color-on-primary-container: #9fe870;
            --md-sys-color-secondary-container: #e8ebe6;
            --md-sys-color-on-secondary-container: #0e0f0c;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-surface-container: #e8ebe6;
            --md-sys-color-on-surface: #0e0f0c;
            --md-sys-color-on-surface-variant: #868685;
            --md-sys-color-outline: #868685;
            --island-bg: #0e0f0c;
            --island-expand-bg: #1a1c18;
            --phone-screen-bg: #e8ebe6;
            --player-bg: #e8ebe6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-feature-settings: "calt";
            background-color: #e8ebe6;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            transition: background-image 0.5s ease;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .phone-screen {
            width: 100vw;
            height: 100dvh;
            height: 100vh;
            background-color: var(--phone-screen-bg);
            overflow: hidden;
            position: relative;
            color: var(--md-sys-color-on-surface);
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        @supports (height: 100dvh) { .phone-screen { height: 100dvh; } }

        /* Dynamic Island */
        .dynamic-island {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 126px;
            height: 38px;
            background-color: var(--island-bg);
            border-radius: 20px;
            z-index: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(14,15,12,0.3);
            cursor: pointer;
            top: calc(env(safe-area-inset-top, 12px) + 10px);
        }
        .dynamic-island.active { width: 320px; height: 150px; border-radius: 36px; background-color: var(--island-expand-bg); }
        .island-default {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 0 14px; gap: 8px;
            opacity: 1; pointer-events: auto;
            transition: opacity 0.2s ease;
            position: absolute; height: 100%; z-index: 10;
        }
        .dynamic-island.active .island-default { opacity: 0; pointer-events: none; }
        .island-time { font-size: 0.85rem; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
        .island-weather { display: flex; align-items: center; gap: 5px; }
        .island-weather-icon { font-size: 1.15rem; color: var(--md-sys-color-primary); line-height: 1; }
        .island-weather-temp { font-size: 0.75rem; font-weight: 600; color: var(--md-sys-color-primary); font-variant-numeric: tabular-nums; }
        .island-weather-detail {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 20px 24px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease 0.1s;
            position: absolute; top: 0; height: 100%; z-index: 20;
        }
        .dynamic-island.active .island-weather-detail { opacity: 1; pointer-events: auto; }
        .detail-left { display: flex; flex-direction: column; align-items: flex-start; }
        .detail-icon-lg { font-size: 2.8rem; line-height: 1; margin-bottom: 10px; color: var(--md-sys-color-primary); }
        .detail-temp-wrap { display: flex; flex-direction: column; }
        .detail-temp-now { font-size: 2.2rem; font-weight: 900; color: var(--md-sys-color-primary); line-height: 1; }
        .detail-temp-range { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 4px; font-weight: 500; }
        .detail-right { text-align: right; display: flex; flex-direction: column; gap: 6px; }
        .detail-desc { font-size: 1.05rem; font-weight: 700; color: #fff; }
        .location-display { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 2px; font-weight: 500; }
        .detail-meta { font-size: 0.75rem; color: rgba(255,255,255,0.38); display: flex; flex-direction: column; gap: 3px; font-weight: 400; }
        .detail-meta .material-symbols-rounded { font-size: 0.85rem; vertical-align: middle; color: rgba(255,255,255,0.45); margin-right: 2px; }

        /* Player */
        .player-content {
            padding: calc(env(safe-area-inset-top, 20px) + 100px) 24px 70px;
            display: flex; flex-direction: column; align-items: center;
            height: 100%; position: relative; z-index: 1;
        }
        .player-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-color: var(--player-bg);
            filter: blur(60px) saturate(1.2);
            transform: scale(1.3);
            opacity: 0.3;
            transition: background-color 0.6s ease;
        }
        .album-art {
            width: 280px; height: 280px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(14,15,12,0.1), 0 2px 8px rgba(14,15,12,0.05);
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
            max-width: 75vw;
            background: var(--wise-canvas);
        }
        .album-art.change { transform: scale(0.9); opacity: 0.7; }
        .song-info { text-align: center; margin-bottom: 12px; width: 100%; padding: 0 8px; }
        .song-title-main {
            font-weight: 900; font-size: 1.75rem;
            color: var(--md-sys-color-on-surface);
            margin-bottom: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: -0.5px; line-height: 1.15;
        }
        .artist-name { font-size: 1.05rem; color: var(--wise-ink-deep); font-weight: 600; letter-spacing: -0.2px; }

        /* Wavy Slider */
        .m3-slider-root { width: 100%; height: 60px; position: relative; display: flex; align-items: center; margin-bottom: 0; flex-shrink: 0; }
        .m3-slider-track-inactive { position: absolute; height: 4px; background-color: rgba(14,15,12,0.1); border-radius: 2px; z-index: 1; top: 28px; left: 0; width: 100%; }
        .m3-slider-track-active-container { position: absolute; left: 0; height: 20px; overflow: hidden; z-index: 2; width: 0%; top: 20px; }
        .m3-slider-wavy-path { fill: none; stroke: var(--md-sys-color-primary); stroke-width: 4; stroke-linecap: round; }
        @keyframes wavy-move { from { transform: translateX(0); } to { transform: translateX(-40px); } }
        .playing .m3-slider-wavy-path { animation: wavy-move 1.5s linear infinite; }
        .m3-slider-thumb-vertical { position: absolute; top: 30px; left: 0%; width: 4px; height: 20px; background-color: var(--md-sys-color-primary); border-radius: 2px; transform: translate(-50%, -50%); z-index: 3; pointer-events: none; box-shadow: 0 2px 8px rgba(14,15,12,0.15); }
        .m3-slider-input { position: absolute; width: 100%; height: 100%; -webkit-appearance: none; appearance: none; background: transparent; z-index: 20 !important; cursor: pointer; outline: none; margin: 0; }
        .m3-slider-input::-webkit-slider-thumb { -webkit-appearance: none; height: 0; width: 0; border: none; background: transparent; cursor: pointer; box-shadow: none; }
        .m3-slider-input::-moz-range-thumb { width: 0; height: 0; border: none; background: transparent; cursor: pointer; box-shadow: none; }
        .time-labels { width: 100%; display: flex; justify-content: space-between; margin-top: 4px; color: var(--md-sys-color-on-surface-variant); font-size: 0.75rem; font-weight: 600; flex-shrink: 0; font-variant-numeric: tabular-nums; }

        /* Controls */
        .controls { display: flex; gap: 20px; align-items: center; flex-shrink: 0; margin-top: 8px; }
        .btn { background: var(--wise-canvas-soft-darker); color: var(--md-sys-color-on-secondary-container); border: none; cursor: pointer; border-radius: 24px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 1px 3px rgba(14,15,12,0.06); }
        .btn:active { transform: scale(0.92); background: var(--wise-canvas-soft); }
        .btn .material-symbols-rounded { font-size: 1.5rem; }
        .btn-play { width: 72px; height: 72px; border-radius: 36px; background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); box-shadow: 0 4px 16px rgba(159,232,112,0.35); }
        .btn-play:active { background: var(--wise-primary-active); }
        .btn-play .material-symbols-rounded { font-size: 2rem; }
        @keyframes pulse-play { 0%, 100% { box-shadow: 0 4px 16px rgba(159,232,112,0.35); transform: scale(1); } 50% { box-shadow: 0 6px 24px rgba(159,232,112,0.5); transform: scale(1.03); } }
        .playing .btn-play { animation: pulse-play 2s ease-in-out infinite; }

        /* Bottom Drawer */
        .bottom-drawer { position: absolute; bottom: 0; left: 0; width: 100%; height: 92%; background: var(--md-sys-color-surface); border-radius: 24px 24px 0 0; transform: translateY(calc(100% - 16px)); transition: transform 0.5s cubic-bezier(0.2,0,0,1); z-index: 1000; display: flex; flex-direction: column; box-shadow: 0 -8px 40px rgba(14,15,12,0.08); }
        .bottom-drawer.open { transform: translateY(0); }
        .nav-handle-area { width: 100%; height: 16px; padding-top: 6px; display: flex; justify-content: center; flex-shrink: 0; cursor: pointer; background: transparent; }
        .md3-nav-bar { width: 32px; height: 4px; background: var(--md-sys-color-outline); border-radius: 2px; opacity: 0.3; }
        .drawer-scroll-view { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 4px 24px 0; }
        .drawer-scroll-view::-webkit-scrollbar { display: none; }
        .drawer-title { font-size: 1.5rem; color: var(--md-sys-color-on-surface); margin: 4px 0 16px; font-weight: 900; flex-shrink: 0; letter-spacing: -0.5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 16px; }
        .card { background: var(--md-sys-color-surface-container); border-radius: 24px; padding: 18px 16px; text-decoration: none; color: var(--md-sys-color-on-surface); display: flex; flex-direction: column; gap: 10px; border: none; box-shadow: none; transition: all 0.25s cubic-bezier(0.2, 0, 0, 1); position: relative; overflow: hidden; }
        .card:active { transform: scale(0.97); background: var(--wise-primary-pale); }
        .card .material-symbols-rounded { font-size: 1.7rem; color: var(--wise-ink-deep); }
        .card a { text-decoration: none; color: var(--md-sys-color-on-surface); font-weight: 600; font-size: 0.9rem; display: block; padding: 2px 0; transition: color 0.2s; position: relative; z-index: 1; }
        .card a:hover { color: var(--wise-ink-deep); text-decoration: none; }
        .drawer-footer-copyright { flex-shrink: 0; padding: 12px 24px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); text-align: center; width: 100%; background: var(--wise-ink); z-index: 1; }
        .copyright-text { font-size: 0.7rem; color: var(--wise-canvas-soft); margin-bottom: 4px; opacity: 0.65; font-weight: 400; }
        .secret-x { text-decoration: none; color: inherit; opacity: 0.15; transition: opacity 0.3s; padding: 5px; font-weight: 700; }
        .secret-x:hover { opacity: 1; color: var(--md-sys-color-primary); }

        /* Desktop — 移除 background-attachment: fixed 修复 Chrome 壁纸不显示 */
        @media screen and (min-width: 768px) {
            body {
                background-color: var(--wise-canvas-soft);
                background-size: cover;
                background-position: center;
                /* background-attachment: fixed 已移除 — 避免 Chrome 下 background-size:cover 渲染失效 */
                display: flex;
                justify-content: flex-end;
                align-items: flex-end;
                padding: 20px;
            }
            .phone-screen { width: 375px; height: 812px; border-radius: 40px; box-shadow: 0 0 0 10px var(--wise-ink), 0 0 0 12px rgba(14,15,12,0.2), 0 30px 60px rgba(14,15,12,0.15); position: relative; margin: 0; padding-top: env(safe-area-inset-top); transform: none; align-self: flex-end; }
            .player-content { padding-top: calc(env(safe-area-inset-top, 20px) + 100px); }
        }
        @media screen and (min-width: 1024px) { body { padding: 30px; } .phone-screen { width: 390px; height: 844px; } }
    </style>
</head>
<body>
<div class="phone-screen" id="app">

    <!-- 灵动岛 -->
    <div class="dynamic-island" id="island">
        <div class="island-default">
            <span class="island-time" id="islandTime">12:00</span>
            <div class="island-weather">

                    <span class="detail-temp-range" id="detailRange">H:28° L:20°</span>

            </div>
            <div class="detail-right">

    <div class="player-content">

        <img id="mainCover" crossorigin="anonymous" src="" class="album-art" alt="专辑封面">

                <svg width="600" height="20" viewBox="0 0 600 20" preserveAspectRatio="none">
                    <path class="m3-slider-wavy-path" d="M0,10 Q10,0 20,10 T40,10 T60,10 T80,10 T100,10 T120,10 T140,10 T160,10 T180,10 T200,10 T220,10 T240,10 T260,10 T280,10 T300,10 T320,10 T340,10 T360,10 T380,10 T400,10 T420,10 T440,10 T460,10 T480,10 T500,10 T520,10 T540,10 T560,10 T580,10 T600,10" />
                </svg>
            </div>
            <div class="m3-slider-thumb-vertical" id="sliderThumb"></div>
            <input type="range" class="m3-slider-input" id="audioSlider" min="0" max="100" value="0" title="播放进度">
        </div>
        <div class="time-labels">
            <span id="currTime">0:00</span>
            <span id="durTime">0:00</span>

        <div class="controls">
            <button class="btn" id="prevBtn" aria-label="上一首"><span class="material-symbols-rounded">skip_previous</span></button>

                <span class="material-symbols-rounded" id="playIcon">play_arrow</span>

    <!-- 底部抽屉 -->

        <div class="drawer-scroll-view">
            <h3 class="drawer-title">Dashboard</h3>
            <div class="grid">
                <div class="card"><span class="material-symbols-rounded">calculate</span><span><a href="/Tools/Double">Double</a></span></div>
                <div class="card"><span class="material-symbols-rounded">lan</span><span><a href="/Tools/MAC">MAC Info</a></span></div>
                <div class="card"><span class="material-symbols-rounded">dashboard</span><span><a href="/Tools/zashboard">zashboard</a></span></div>
                <div class="card"><span class="material-symbols-rounded">dashboard</span><span><a href="/Tools/Metacubexd">Metacubexd</a></span></div>
                <div class="card"><span class="material-symbols-rounded">dns</span><span><a href="/Tools/Underline">Underline</a></span></div>
                <div class="card"><span class="material-symbols-rounded">function</span><span><a href="/Tools/Content Calculator">ContentCalculator</a></span></div>
            </div>
        </div>
        <div class="drawer-footer-copyright">
            <div class="copyright-text">&copy; 2026 Personal Dashboard. All Rights Reserved. <a href="/Music" class="secret-x">✕</a></div>
        </div>
    </div>
</div>

<canvas id="colorCanvas" style="display: none;"></canvas>

<script>
/* =========================================================================
   Color Utilities — 从封面提取主题色
   ========================================================================= */
const ColorUtils = {
    hexToRgb: (hex) => {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
    },
    rgbToHsl: (r, g, b) => {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; }
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) { case r: h = (g - b) / d + (g < b ? 6 : 0); break; case g: h = (b - r) / d + 2; break; case b: h = (r - g) / d + 4; break; }
            h /= 6;
        }
        return { h: h * 360, s: s * 100, l: l * 100 };
    },
    hslToString: (h, s, l) => `hsl(${h}, ${s}%, ${l}%)`,
    extractColorFromUrl: (imageUrl, callback) => {
        const canvas = document.getElementById('colorCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        if (!imageUrl.startsWith('blob:') && !imageUrl.startsWith('data:')) {
            img.crossOrigin = "Anonymous";
        }
        img.src = imageUrl;
        img.onload = function() {
            canvas.width = 50; canvas.height = 50;
            ctx.drawImage(img, 0, 0, 50, 50);
            try {
                const imageData = ctx.getImageData(0, 0, 50, 50).data;
                let r = 0, g = 0, b = 0, totalWeight = 0;
                for (let i = 0; i < imageData.length; i += 4) {
                    const pixelR = imageData[i], pixelG = imageData[i+1], pixelB = imageData[i+2];
                    const brightness = (0.299 * pixelR + 0.587 * pixelG + 0.114 * pixelB);
                    const weight = brightness < 50 ? 2 : 1;
                    r += pixelR * weight; g += pixelG * weight; b += pixelB * weight;
                    totalWeight += weight;
                }
                if (totalWeight > 0) { r = Math.floor(r / totalWeight); g = Math.floor(g / totalWeight); b = Math.floor(b / totalWeight); }
                callback({ r, g, b });
            } catch (e) {
                callback({ r: 100, g: 145, b: 65 });
            }
        };
        img.onerror = () => callback({ r: 100, g: 145, b: 65 });
    },
    generateTheme: (sourceRgb) => {
        const hsl = ColorUtils.rgbToHsl(sourceRgb.r, sourceRgb.g, sourceRgb.b);
        const h = hsl.h;
        const s = Math.max(20, Math.min(100, hsl.s));
        const l = hsl.l;
        const accentL = Math.max(55, Math.min(78, l + 20));
        const accentS = Math.max(50, Math.min(95, s + 10));
        return {
            '--md-sys-color-primary': ColorUtils.hslToString(h, accentS, accentL),
            '--md-sys-color-on-primary': '#0e0f0c',
            '--md-sys-color-primary-container': ColorUtils.hslToString(h, Math.max(25, s - 5), Math.min(30, l - 15)),
            '--md-sys-color-on-primary-container': ColorUtils.hslToString(h, accentS, Math.min(85, accentL + 10)),
            '--md-sys-color-secondary-container': ColorUtils.hslToString(h, Math.max(5, s / 6), 91),
            '--md-sys-color-on-secondary-container': '#0e0f0c',
            '--md-sys-color-surface': '#ffffff',
            '--md-sys-color-surface-container': ColorUtils.hslToString(h, Math.max(4, s / 7), 91),
            '--md-sys-color-on-surface': '#0e0f0c',
            '--md-sys-color-on-surface-variant': '#868685',
            '--md-sys-color-outline': '#868685',
            '--phone-screen-bg': ColorUtils.hslToString(h, Math.max(3, s / 8), 91),
            '--player-bg': ColorUtils.hslToString(h, Math.max(5, s / 6), 88),
            '--island-expand-bg': ColorUtils.hslToString(h, Math.max(8, s / 3), 10),

/* =========================================================================
   Cookie 工具
   ========================================================================= */
const CookieUtils = {
    set: (n, v, d = 30) => {
        const dt = new Date(); dt.setTime(dt.getTime() + d * 864e5);
        document.cookie = n + "=" + v + ";expires=" + dt.toUTCString() + ";path=/";
    },
    get: (n) => {
        const v = document.cookie.match('(^|;) ?' + n + '=([^;]*)(;|$)');
        return v ? v[2] : null;
    },
    remove: (n) => { document.cookie = n + "=;expires=Thu, 01 Jan 1970 00:00:01 GMT;path=/"; }
};

/* =========================================================================
   扫描 /src/ 目录
   — 发现所有音频文件 + 匹配同名图片作为封面候选
   — 返回 [{ src, coverImage? }]
   ========================================================================= */
const AUDIO_EXTENSIONS = ['.mp3', '.ogg', '.wav', '.flac', '.m4a', '.aac', '.opus', '.wma'];
const IMAGE_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.webp', '.bmp', '.gif', '.svg'];

/**
 * 从 URL 提取不带扩展名的文件基础名
 * e.g. "/src/Artist - Song.mp3" → "Artist - Song"
 */
function baseNameNoExt(url) {
    try {
        const decoded = decodeURIComponent(url);
        const filename = decoded.split('/').pop() || decoded;
        const lastDot = filename.lastIndexOf('.');
        return lastDot > 0 ? filename.slice(0, lastDot) : filename;
    } catch (e) {
        return url;
    }
}

/**
 * 规范化路径 — 确保以 / 开头的绝对路径
 */
function normalizePath(href, dirPrefix) {
    if (href.startsWith('/')) return href;
    if (href.startsWith('http')) return href;
    // 相对路径，拼接到目录前缀
    const base = dirPrefix.endsWith('/') ? dirPrefix : dirPrefix + '/';
    return base + href;
}

async function scanSrcDirectory() {
    const dirPathsToTry = ['/src/', '/src', './src/', './src'];
    const IMG_EXTS = IMAGE_EXTENSIONS;
    const AUD_EXTS = AUDIO_EXTENSIONS;

    for (const dirPath of dirPathsToTry) {
        try {
            const response = await fetch(dirPath);
            if (!response.ok) continue;
            const html = await response.text();

            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const links = [...doc.querySelectorAll('a')];

            // 分离音频和图片文件
            const audioFiles = [];
            const imageFiles = [];

            for (const a of links) {
                const href = a.getAttribute('href');
                if (!href) continue;
                if (href === '../' || href === './' || href === '/' || href.startsWith('http')) continue;
                if (href.startsWith('?')) continue;

                const lower = href.toLowerCase();

                if (AUD_EXTS.some(ext => lower.endsWith(ext))) {
                    audioFiles.push(normalizePath(href, dirPath));
                } else if (IMG_EXTS.some(ext => lower.endsWith(ext))) {
                    imageFiles.push(normalizePath(href, dirPath));
                }
            }

            if (audioFiles.length === 0) continue;

            // 建立图片 baseName → 路径 的映射
            const imageMap = new Map();
            for (const imgPath of imageFiles) {
                const bn = baseNameNoExt(imgPath).toLowerCase();
                // 如果有多个同名图片，取第一个
                if (!imageMap.has(bn)) {
                    imageMap.set(bn, imgPath);
                }
            }

            // 构建歌曲列表，匹配同名封面
            const result = audioFiles.map(audioPath => {
                const bn = baseNameNoExt(audioPath).toLowerCase();
                const matchedCover = imageMap.get(bn) || null;
                const entry = { src: audioPath };
                if (matchedCover) {
                    entry.coverImage = matchedCover;
                }
                return entry;
            });

            console.log(`✅ 从 ${dirPath} 扫描完成：`);
            console.log(`   🎵 ${audioFiles.length} 首音频`);
            console.log(`   🖼️ ${imageFiles.length} 张图片`);
            console.log(`   🔗 同名封面匹配：${result.filter(e => e.coverImage).length} 首`);

            return result;
        } catch (e) {
            console.warn(`⚠️ 扫描 ${dirPath} 失败:`, e.message);
        }
    }

    // 所有路径都失败
    console.error('❌ 无法扫描 /src/ 目录。请确保：');
    console.error('   1. /src/ 目录存在且可访问');
    console.error('   2. 服务器开启了目录列表 (autoindex on)');
    console.error('   3. 目录中包含 .mp3/.ogg/.wav/.flac 等音频文件');
    return [];
}

async function getLocationByIP() {

        const response = await fetch('https://ipapi.co/json/');

        const data = await response.json();
        if (data.latitude && data.longitude) return { lat: data.latitude, lon: data.longitude, city: data.city };
    } catch (e) {
        console.warn('IP定位失败 (ipapi.co)', e);
        if (location.protocol === 'http:') {
            try {
                const resHttp = await fetch('http://ip-api.com/json/?lang=zh-CN');
                if (resHttp.ok) {
                    const dataHttp = await resHttp.json();
                    if (dataHttp.status === 'success') return { lat: dataHttp.lat, lon: dataHttp.lon, city: dataHttp.city };
                }
            } catch (e2) { console.warn('IP定位失败 (ip-api.com)', e2); }
        }
    }
    return null;
}

async function fetchWeather() {
    let lat = parseFloat(CookieUtils.get('weather_lat')) || null;
    let lon = parseFloat(CookieUtils.get('weather_lon')) || null;
    let locationName = null;

    if (!lat || !lon) {
        if ('geolocation' in navigator) {
            try {
                document.getElementById('locationDisplay').textContent = "正在请求位置...";
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject,
                        { timeout: 10000, enableHighAccuracy: true, maximumAge: 5*60*1000 });
                });
                lat = position.coords.latitude;
                lon = position.coords.longitude;
                CookieUtils.set('weather_lat', lat, 30);
                CookieUtils.set('weather_lon', lon, 30);
            } catch (geoError) {
                console.warn('GPS定位失败，尝试IP定位。错误原因:', geoError.message);
                document.getElementById('locationDisplay').textContent = "IP定位中...";
                const ipLoc = await getLocationByIP();
                if (ipLoc) { lat = ipLoc.lat; lon = ipLoc.lon; locationName = ipLoc.city || "IP定位位置"; CookieUtils.set('weather_lat', lat, 30); CookieUtils.set('weather_lon', lon, 30); }
                else { lat = 39.9042; lon = 116.4074; document.getElementById('locationDisplay').textContent = "默认位置 (北京)"; }
            }
        } else {
            const ipLoc = await getLocationByIP();
            if (ipLoc) { lat = ipLoc.lat; lon = ipLoc.lon; locationName = ipLoc.city || "IP定位位置"; CookieUtils.set('weather_lat', lat, 30); CookieUtils.set('weather_lon', lon, 30); }
            else { lat = 39.9042; lon = 116.4074; document.getElementById('locationDisplay').textContent = "默认位置 (北京)"; }
        }
    }

    try {
        if (!locationName) {
            try {
                const locRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=zh`);

        if (!document.getElementById('locationDisplay').textContent.includes('默认'))
            document.getElementById('locationDisplay').textContent = locationName;

        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=auto`);

/* =========================================================================
   从文件名生成占位封面 (SVG Data URL) — 最低优先级
   ========================================================================= */
function generatePlaceholderCover(seed) {
    let hash = 0;
    for (let i = 0; i < seed.length; i++) {
        hash = seed.charCodeAt(i) + ((hash << 5) - hash);
    }
    const h = Math.abs(hash % 360);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
        <defs>
            <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:hsl(${h},55%,35%)"/>
                <stop offset="100%" style="stop-color:hsl(${(h+45)%360},50%,18%)"/>
            </linearGradient>
        </defs>
        <rect width="512" height="512" fill="url(#bg)"/>
        <text x="256" y="290" text-anchor="middle" fill="rgba(255,255,255,0.55)"
              font-family="Inter,-apple-system,sans-serif" font-size="140" font-weight="900">♪</text>
    </svg>`;
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

/* =========================================================================
   从 URL 提取文件名作为 fallback 标题
   ========================================================================= */
function filenameFromUrl(url) {
    try {
        const decoded = decodeURIComponent(url);
        const base = decoded.split('/').pop() || decoded;
        return base.replace(/\.[^/.]+$/, '').trim();
    } catch (e) {
        return 'Unknown Title';
    }
}

/* =========================================================================
   从 MP3 文件提取 ID3 元数据
   封面优先级：同名图片 > ID3 内嵌封面 > SVG 占位图
   参数：
     audioUrl        — 音频文件路径
     externalCoverUrl — /src/ 目录下同名图片路径（可选，最高优先级）
   ========================================================================= */
function extractMetadataFromFile(audioUrl, externalCoverUrl) {
    return new Promise((resolve) => {
        const fallbackTitle = filenameFromUrl(audioUrl);
        const fallback = {
            title: fallbackTitle,
            artist: 'Unknown Artist',
            album: '',
            cover: generatePlaceholderCover(fallbackTitle),
            coverType: 'image/svg+xml',
            src: audioUrl
        };

        // ═══ 如果存在同名图片，直接使用（最高优先级）═══
        if (externalCoverUrl) {
            // 推导封面 MIME 类型
            const lower = externalCoverUrl.toLowerCase();
            let mime = 'image/jpeg';
            if (lower.endsWith('.png')) mime = 'image/png';
            else if (lower.endsWith('.webp')) mime = 'image/webp';
            else if (lower.endsWith('.gif')) mime = 'image/gif';
            else if (lower.endsWith('.bmp')) mime = 'image/bmp';
            else if (lower.endsWith('.svg')) mime = 'image/svg+xml';

            // 仍需读取 ID3 获取 title/artist，但封面已确定
            if (typeof jsmediatags === 'undefined') {
                resolve({
                    title: fallbackTitle,
                    artist: 'Unknown Artist',
                    album: '',
                    cover: externalCoverUrl,
                    coverType: mime,
                    src: audioUrl
                });
                return;
            }

            try {
                jsmediatags.read(audioUrl, {
                    onSuccess: (tag) => {
                        const tags = tag.tags;
                        resolve({
                            title: tags.title || fallbackTitle,
                            artist: tags.artist || 'Unknown Artist',
                            album: tags.album || '',
                            cover: externalCoverUrl,    // ← 同名图片优先
                            coverType: mime,
                            src: audioUrl
                        });
                    },
                    onError: () => {
                        resolve({
                            title: fallbackTitle,
                            artist: 'Unknown Artist',
                            album: '',
                            cover: externalCoverUrl,
                            coverType: mime,
                            src: audioUrl
                        });
                    }
                });
            } catch (e) {
                resolve({
                    title: fallbackTitle,
                    artist: 'Unknown Artist',
                    album: '',
                    cover: externalCoverUrl,
                    coverType: mime,
                    src: audioUrl
                });
            }
            return;
        }

        // ═══ 无同名图片 → ID3 内嵌封面 or 占位图 ═══
        if (typeof jsmediatags === 'undefined') {
            console.warn('⚠️ jsmediatags 未加载，使用文件名作为标题');
            resolve(fallback);
            return;
        }

        try {
            jsmediatags.read(audioUrl, {
                onSuccess: (tag) => {
                    const tags = tag.tags;
                    console.log('✅ ID3 元数据提取成功:', {
                        title: tags.title,
                        artist: tags.artist,
                        album: tags.album,
                        hasCover: !!(tags.picture && tags.picture.data && tags.picture.data.length > 0)
                    });

                    let coverUrl = fallback.cover;
                    let coverType = fallback.coverType;
                    if (tags.picture && tags.picture.data && tags.picture.data.length > 0) {
                        try {
                            const picture = tags.picture;
                            const byteArray = new Uint8Array(picture.data);
                            const mimeType = picture.format || 'image/jpeg';
                            const blob = new Blob([byteArray], { type: mimeType });
                            coverUrl = URL.createObjectURL(blob);
                            coverType = mimeType;
                        } catch (e) {
                            console.warn('⚠️ 内嵌封面解析失败，使用占位封面', e);
                        }
                    }

                    resolve({
                        title: tags.title || fallback.title,
                        artist: tags.artist || fallback.artist,
                        album: tags.album || '',
                        cover: coverUrl,
                        coverType: coverType,
                        src: audioUrl
                    });
                },
                onError: (err) => {
                    console.warn('⚠️ ID3 标签读取失败，使用文件名作为标题:', err);
                    resolve(fallback);
                }
            });
        } catch (e) {
            console.warn('⚠️ jsmediatags 调用异常，使用文件名作为标题');
            resolve(fallback);
        }
    });
}

const audioSlider = document.getElementById('audioSlider'),
      activeTrack = document.getElementById('activeTrack'),
      inactiveTrack = document.getElementById('inactiveTrack'),
      sliderThumb = document.getElementById('sliderThumb');

function formatTime(seconds) {
    if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m}:${String(s).padStart(2, '0')}`;
}

function updateUI(percent) {
    percent = isNaN(percent) ? 0 : Math.max(0, Math.min(100, percent));
    audioSlider.value = percent;
    activeTrack.style.width = percent + '%';
    inactiveTrack.style.left = percent + '%';
    inactiveTrack.style.width = (100 - percent) + '%';
    sliderThumb.style.left = percent + '%';

    const dur = currentHowl ? currentHowl.duration() : 0;
    const cur = isDragging ? (percent / 100) * dur : (currentHowl ? currentHowl.seek() || 0 : 0);
    document.getElementById('currTime').innerText = formatTime(cur);
    document.getElementById('durTime').innerText = formatTime(dur);
}

/* =========================================================================
   进度轮询
   ========================================================================= */
function stopProgressLoop() {
    if (progressRAF) {
        cancelAnimationFrame(progressRAF);
        progressRAF = null;
    }
}

function startProgressLoop() {
    stopProgressLoop();
    function loop() {
        if (currentHowl && currentHowl.playing() && !isDragging) {
            const seek = currentHowl.seek() || 0;
            const duration = currentHowl.duration() || 0;
            if (duration > 0) updateUI((seek / duration) * 100);
        }
        progressRAF = requestAnimationFrame(loop);
    }
    progressRAF = requestAnimationFrame(loop);
}

async function loadSong(songEntry) {
    // 1. 显示加载状态
    document.getElementById('mainTitle').innerText = '读取中...';
    document.getElementById('mainArtist').innerText = '';
    document.getElementById('mainCover').classList.add('change');

    // 2. 销毁旧实例
    destroyCurrentHowl();

    // 3. 提取元数据（传入同名封面候选）
    const metadata = await extractMetadataFromFile(songEntry.src, songEntry.coverImage || null);
    currentMetadata = metadata;
    currentCoverUrl = metadata.cover;

    // 4. 更新 UI 文字
    document.getElementById('mainTitle').innerText = metadata.title;
    document.getElementById('mainArtist').innerText = metadata.artist;

    // 5. 从封面提取主题色
    ColorUtils.extractColorFromUrl(metadata.cover, rgb => {
        const theme = ColorUtils.generateTheme(rgb);
        for (const [k, v] of Object.entries(theme))
            document.documentElement.style.setProperty(k, v);
        updateThemeColor();
    });

    // 6. 设置封面图
    const mainCover = document.getElementById('mainCover');
    mainCover.onload = () => {
        mainCover.classList.remove('change');
        updateMediaSessionMetadata();
    };
    mainCover.onerror = () => {
        mainCover.classList.remove('change');
        const fallbackRgb = { r: 100, g: 145, b: 65 };
        const theme = ColorUtils.generateTheme(fallbackRgb);
        for (const [k, v] of Object.entries(theme))
            document.documentElement.style.setProperty(k, v);
        updateThemeColor();
    };
    mainCover.src = metadata.cover;

    // 7. 创建 Howler.js 实例
    currentHowl = new Howl({
        src: [songEntry.src],
        html5: true,
        preload: 'metadata',
        volume: 1.0,
        onplay: function() {
            app.classList.add('playing');
            document.getElementById('playIcon').innerText = 'pause';
            startProgressLoop();
            updateMediaSessionMetadata();
        },
        onpause: function() {
            app.classList.remove('playing');
            document.getElementById('playIcon').innerText = 'play_arrow';
            stopProgressLoop();
        },
        onend: function() {
            stopProgressLoop();
            app.classList.remove('playing');
            document.getElementById('playIcon').innerText = 'play_arrow';
            nextSong();
        },
        onload: function() {
            const dur = currentHowl.duration();
            document.getElementById('durTime').innerText = formatTime(dur);
            updateUI(0);
        },
        onloaderror: function(id, err) {
            console.error('❌ 音频加载失败:', songEntry.src, err);
            document.getElementById('mainTitle').innerText = '加载失败';
            document.getElementById('mainArtist').innerText = '请检查文件是否存在';
        },
        onseek: function() {
            if (!isDragging && currentHowl) {
                const seek = currentHowl.seek() || 0;
                const dur = currentHowl.duration() || 0;
                if (dur > 0) updateUI((seek / dur) * 100);
            }
        }
    });

    // 8. MediaSession
    updateMediaSessionMetadata();
}

function updateMediaSessionMetadata() {
    if (!('mediaSession' in navigator) || !currentMetadata) return;
    navigator.mediaSession.metadata = new MediaMetadata({
        title: currentMetadata.title,
        artist: currentMetadata.artist,
        album: currentMetadata.album || 'Tools Music',
        artwork: [{
            src: currentMetadata.cover,
            sizes: '512x512',
            type: currentMetadata.coverType || 'image/jpeg'
        }]
    });
}

/* =========================================================================
   切歌
   ========================================================================= */
async function prevSong() {
    if (songs.length === 0) return;
    currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
    await loadSong(songs[currentSongIndex]);
    playSong();
}

async function nextSong() {
    if (songs.length === 0) return;
    currentSongIndex = (currentSongIndex + 1) % songs.length;
    await loadSong(songs[currentSongIndex]);
    playSong();
}

/* =========================================================================
   事件绑定
   ========================================================================= */
document.getElementById('playBtn').addEventListener('click', () => {
    if (!currentHowl) return;
    currentHowl.playing() ? pauseSong() : playSong();
});

document.getElementById('nextBtn').addEventListener('click', nextSong);
document.getElementById('prevBtn').addEventListener('click', prevSong);

/* =========================================================================
   进度条拖拽
   ========================================================================= */
audioSlider.addEventListener('input', () => {
    isDragging = true;
    updateUI(parseFloat(audioSlider.value));
});

audioSlider.addEventListener('change', () => {
    isDragging = false;
    if (currentHowl) {
        const dur = currentHowl.duration();
        if (dur > 0) {
            currentHowl.seek((parseFloat(audioSlider.value) / 100) * dur);
        }
    }
});

/* =========================================================================
   MediaSession 动作
   ========================================================================= */
if ('mediaSession' in navigator) {
    navigator.mediaSession.setActionHandler('play', playSong);
    navigator.mediaSession.setActionHandler('pause', pauseSong);
    navigator.mediaSession.setActionHandler('previoustrack', prevSong);
    navigator.mediaSession.setActionHandler('nexttrack', nextSong);
}

/* =========================================================================
   底部抽屉 & 键盘快捷键
   ========================================================================= */
function toggleDrawer() {
    document.getElementById('drawer').classList.toggle('open');
}

document.addEventListener('keydown', async e => {
    if (e.key === ' ') {
        e.preventDefault();
        if (!currentHowl) return;
        currentHowl.playing() ? pauseSong() : playSong();
    } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        await prevSong();
    } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        await nextSong();
    }
});

/* =========================================================================
   Bing 壁纸（桌面端）
   修复：onload 先于 src 绑定 + 移除 CSS background-attachment:fixed
   ========================================================================= */
async function loadBingWallpaper() {
    if (window.innerWidth < 768) return;
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);

        const response = await fetch(
            'https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN',
            { signal: controller.signal }
        );
        clearTimeout(timeoutId);

        const data = await response.json();
        if (data.images && data.images.length > 0) {
            const imgUrl = 'https://www.bing.com' + data.images[0].url;
            const img = new Image();
            // ✅ 修复：先绑定事件，再设置 src
            img.onload = () => {
                document.body.style.backgroundImage = `url(${imgUrl})`;
                console.log('✅ Bing 壁纸加载成功:', data.images[0].copyright);
            };
            img.onerror = () => {
                console.warn('⚠️ Bing 壁纸图片加载失败，尝试低分辨率回退');
                const fallbackUrl = 'https://www.bing.com' + data.images[0].url.replace('_1920x1080', '_1366x768');
                const fbImg = new Image();
                fbImg.onload = () => { document.body.style.backgroundImage = `url(${fallbackUrl})`; };
                fbImg.onerror = () => { console.warn('⚠️ Bing 壁纸回退也失败'); };
                fbImg.src = fallbackUrl;
            };
            img.src = imgUrl;
        }
    } catch (e) {
        if (e.name === 'AbortError') {
            console.warn('⚠️ Bing 壁纸请求超时');
        } else {
            console.warn('⚠️ Bing 壁纸加载失败:', e.message);
        }
    }
}

/* =========================================================================
   初始化 — 全量从 /src/ 扫描，零硬编码
   ========================================================================= */
async function init() {
    // 1. 扫描 /src/ 目录获取歌曲列表
    songs = await scanSrcDirectory();

    if (songs.length === 0) {
        document.getElementById('mainTitle').innerText = '未发现音乐文件';
        document.getElementById('mainArtist').innerText = '请在 /src/ 目录添加 .mp3/.ogg/.wav/.flac 等音频';
        console.warn('⚠️ 未扫描到任何歌曲。请检查 /src/ 目录。');
    } else {
        console.log(`🎵 共发现 ${songs.length} 首歌曲`);
        songs.forEach((s, i) => {
            const tag = s.coverImage ? '🖼️ 有同名封面' : '🎨 无同名封面';
            console.log(`   ${i + 1}. ${tag} ${s.src}`);
        });

        // 加载第一首歌
        await loadSong(songs[currentSongIndex]);
    }

    // 2. 时钟
    updateTime();
    setInterval(updateTime, 1000);

    // 3. 天气
    fetchWeather();
    setInterval(fetchWeather, 10 * 60 * 1000);

    // 4. 灵动岛
    island.addEventListener('click', toggleIsland);

    // 5. Bing 壁纸（桌面端）
    loadBingWallpaper();
    window.addEventListener('resize', () => {
        if (window.innerWidth >= 768) loadBingWallpaper();
    });

    // 6. 主题色
    updateThemeColor();
}

init();
</script>
