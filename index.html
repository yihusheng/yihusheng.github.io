<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#e8ebe6">
  <title>Tools Music</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" media="all" />
  <link rel="stylesheet" href="/style/material-symbols.css" media="print" onload="this.media=\"all\"" />
  <link rel="stylesheet" href="/style/index.css">
  <link rel="stylesheet" href="/Tools/navbar.css">
  <!-- 预连接：加速音频、封面、歌词加载 -->
  <link rel="dns-prefetch" href="/">
  <link rel="preconnect" href="/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- ES Module 预加载：浏览器并行下载所有模块 -->
  <link rel="modulepreload" href="/scripts/state.js">
  <link rel="modulepreload" href="/scripts/drawer.js">
  <link rel="modulepreload" href="/scripts/utils.js">
  <link rel="modulepreload" href="/scripts/weather.js">
  <link rel="modulepreload" href="/scripts/player.js">
  <link rel="modulepreload" href="/scripts/island.js">
  <link rel="modulepreload" href="/scripts/init.js">
</head>
<body>
<div class="phone-screen" id="app">
  <div class="dynamic-island" id="island">
    <div class="island-default">
      <span class="island-time" id="islandTime">12:00</span>
      <div class="island-weather">
        <span class="island-weather-icon material-symbols-rounded" id="islandWeatherIcon">wb_sunny</span>
        <span class="island-weather-temp" id="islandWeatherTemp">--°</span>
      </div>
    </div>
    <div class="island-music" id="islandMusic">
      <div class="island-music-cover"><img id="islandMusicCover" src="" alt=""></div>
      <div class="island-music-text">
        <span class="island-music-title" id="islandMusicTitle">Title</span>
        <span class="island-music-artist" id="islandMusicArtist">Artist</span>
      </div>
      <span class="material-symbols-rounded island-music-icon">music_note</span>
    </div>
    <div class="island-weather-detail">
      <div class="detail-main">
        <div class="detail-left">
          <span class="detail-icon-lg material-symbols-rounded" id="detailIcon">wb_sunny</span>
          <div class="detail-temp-wrap">
            <span class="detail-temp-now" id="detailTemp">25°</span>
            <span class="detail-temp-range" id="detailRange">H:28° L:20°</span>
          </div>
        </div>
        <div class="detail-right">
          <div class="location-display" id="locationDisplay">获取中...</div>
          <div class="detail-meta">
            <span id="detailWind"><span class="material-symbols-rounded">air</span> 12km/h</span>
            <span id="detailHumidity"><span class="material-symbols-rounded">water_drop</span> 45%</span>
          </div>
          <div class="detail-desc" id="detailDesc">晴朗</div>
        </div>
      </div>
      <button class="weather-more-btn" id="weatherMoreBtn" aria-label="更多天气信息">
        <span class="material-symbols-rounded" id="weatherMoreIcon">expand_more</span>
      </button>
      <div class="weather-drawer" id="weatherDrawer">
        <div class="weather-drawer-row sun-times">
          <span class="sun-group">
            <span class="material-symbols-rounded" style="font-size:14px;color:rgba(255,255,255,0.6)">wb_twilight</span>
            <span class="weather-drawer-label">日出</span>
            <span class="weather-drawer-value" id="weatherSunrise">--:--</span>
          </span>
          <span class="sun-group" style="margin-left:auto">
            <span class="material-symbols-rounded" style="font-size:14px;color:rgba(255,255,255,0.6)">clear_day</span>
            <span class="weather-drawer-label">日落</span>
            <span class="weather-drawer-value" id="weatherSunset">--:--</span>
          </span>
        </div>
        <div class="weather-drawer-row sun-arc-wrap">
          <svg id="sunSvg" viewBox="0 0 240 52" width="100%" height="52">
            <defs>
              <radialGradient id="sg" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(255,200,50,0.35)"/>
                <stop offset="100%" stop-color="rgba(255,200,50,0)"/>
              </radialGradient>
            </defs>
            <path d="M 12,46 Q 120,12 228,46" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
            <circle cx="12" cy="46" r="2.5" fill="rgba(255,200,100,0.4)"/>
            <circle cx="228" cy="46" r="2.5" fill="rgba(255,200,100,0.4)"/>
            <circle id="sgd" cx="120" cy="29" r="14" fill="url(#sg)" opacity="0"/>
            <circle id="sd" cx="120" cy="29" r="5" fill="#FFD700" opacity="0"/>
          </svg>
        </div>
        <div class="weather-drawer-row moon-arc-wrap">
          <svg id="moonArcSvg" viewBox="0 0 240 52" width="100%" height="52">
            <defs>
              <radialGradient id="mg" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(200,200,220,0.3)"/>
                <stop offset="100%" stop-color="rgba(200,200,220,0)"/>
              </radialGradient>
            </defs>
            <path d="M 12,46 Q 120,12 228,46" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
            <circle cx="12" cy="46" r="2.5" fill="rgba(200,200,220,0.35)"/>
            <circle cx="228" cy="46" r="2.5" fill="rgba(200,200,220,0.35)"/>
            <circle id="mgd" cx="120" cy="29" r="12" fill="url(#mg)" opacity="0"/>
            <circle id="md" cx="120" cy="29" r="4" fill="#C0C0D0" opacity="0"/>
          </svg>
        </div>
        <div class="weather-drawer-row moon-phase-row" style="text-align:center;justify-content:center">
          <span class="weather-drawer-label">月相</span>
          <span class="weather-drawer-value" id="weatherMoonPhase">--</span>
        </div>
        <div class="weather-drawer-row moon-times" id="moonTimesRow" style="display:none">
          <span class="sun-group">
            <span class="weather-drawer-label">月升</span>
            <span class="weather-drawer-value" id="weatherMoonrise">--:--</span>
          </span>
          <span class="sun-group" style="margin-left:auto">
            <span class="weather-drawer-label">月落</span>
            <span class="weather-drawer-value" id="weatherMoonset">--:--</span>
          </span>
        </div>
      </div>
    </div>
  </div>
  <div class="player-content">
    <div class="player-background"></div>
    <div class="cover-lyrics-wrapper">
      <img id="mainCover" crossorigin="anonymous" src="" class="album-art" alt="album cover" title="点击查看歌词">
      <div class="song-info" id="songInfo">
        <h1 id="mainTitle" class="song-title-main">Title</h1>
        <p id="mainArtist" class="artist-name">Artist</p>
      </div>
    </div>
    <!-- 歌词视图：脱离封面容器，覆盖整个 player-content 消除卡片感 -->
    <div class="lyrics-view" id="lyricsView">
      <div class="lyrics-scroll" id="lyricsContent">
        <div class="lyrics-empty">暂无歌词</div>
      </div>
    </div>
    <div class="m3-slider-root">
      <div class="m3-slider-track-inactive" id="inactiveTrack"></div>
      <div class="m3-slider-track-active-container" id="activeTrack">
        <svg width="600" height="20" viewBox="0 0 600 20" preserveAspectRatio="none">
          <path class="m3-slider-wavy-path" d="M0,10 Q10,0 20,10 T40,10 T60,10 T80,10 T100,10 T120,10 T140,10 T160,10 T180,10 T200,10 T220,10 T240,10 T260,10 T280,10 T300,10 T320,10 T340,10 T360,10 T380,10 T400,10 T420,10 T440,10 T460,10 T480,10 T500,10 T520,10 T540,10 T560,10 T580,10 T600,10" />
        </svg>
      </div>
      <div class="m3-slider-thumb-vertical" id="sliderThumb"></div>
      <input type="range" class="m3-slider-input" id="audioSlider" min="0" max="100" value="0" title="progress">
    </div>
    <div class="time-labels">
      <span id="currTime">0:00</span>
      <span id="durTime">0:00</span>
    </div>
    <div class="controls">
      <button class="btn btn-shuffle active" id="shuffleBtn" aria-label="shuffle"><span class="material-symbols-rounded">shuffle</span></button>
      <button class="btn" id="prevBtn" aria-label="previous"><span class="material-symbols-rounded">skip_previous</span></button>
      <button class="btn btn-play" id="playBtn" aria-label="play/pause"><span class="material-symbols-rounded" id="playIcon">play_arrow</span></button>
      <button class="btn" id="nextBtn" aria-label="next"><span class="material-symbols-rounded">skip_next</span></button>
      <button class="btn btn-shuffle" id="playlistBtn" aria-label="playlist"><span class="material-symbols-rounded">queue_music</span></button>
    </div>
  </div>
  <div class="bottom-drawer" id="drawer">
    <div class="nav-handle-area"><div class="md3-nav-bar"></div></div>
    <div class="drawer-scroll-view">
      <div class="drawer-header">
        <div class="drawer-title">快捷工具</div>
        <div class="drawer-subtitle">所有应用</div>
      </div>
      <div class="drawer-sections" id="drawerSections"></div>
    </div>
    <div class="drawer-footer">
      <div class="drawer-footer-text">
        &copy; 2026 &middot; <a href="/Music" class="drawer-footer-secret">&#10005;</a>
      </div>
    </div>
  </div>
</div>

<div class="playlist-overlay" id="playlistOverlay">
  <div class="playlist-backdrop" id="playlistBackdrop"></div>
  <div class="playlist-sheet">
    <div class="playlist-handle-area" id="playlistHandle">
      <div class="playlist-handle"></div>
    </div>
    <div class="playlist-header">
      <div class="playlist-header-left">
        <span class="playlist-header-title">播放列表</span>
        <span class="playlist-header-count" id="playlistCount">0 首</span>
      </div>
      <button class="playlist-repeat-btn" id="playlistRepeatBtn" aria-label="toggle repeat">
        <span class="material-symbols-rounded">repeat</span>
      </button>
    </div>
    <div class="playlist-body" id="playlistBody"></div>
  </div>
</div>

<canvas id="colorCanvas" style="display: none;"></canvas>

<!-- Toast 提示 -->
<div id="toast" style="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:12px 24px;border-radius:8px;font-size:0.85rem;z-index:9999;opacity:0;transition:opacity 0.3s ease;pointer-events:none;max-width:80vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.2);"></div>

<script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
<script src="/Tools/navbar.js"></script>
<script type="module" src="/scripts/init.js"></script>
</body>
</html>
