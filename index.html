<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#e8ebe6">
  <title>Tools Music</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <!-- ═══ 共享导航栏（首页只读取数据，不注入顶部栏）═══ -->
  <link rel="stylesheet" href="/Tools/navbar.css">
  <script src="/Tools/navbar.js"></script>
  <style>
    :root {
      --wise-primary: #9fe870;
      --wise-on-primary: #0e0f0c;
      --wise-primary-active: #cdffad;
      --wise-primary-pale: #e2f6d5;
      --wise-ink: #0e0f0c;
      --wise-ink-deep: #163300;
      --wise-body: #454745;
      --wise-mute: #868685;
      --wise-canvas: #ffffff;
      --wise-canvas-soft: #e8ebe6;
      --wise-canvas-soft-darker: #d8dbd6;
      --wise-positive: #2ead4b;
      --wise-negative: #d03238;
      --wise-negative-bg: #320707;
      --md-sys-color-primary: #9fe870;
      --md-sys-color-on-primary: #0e0f0c;
      --md-sys-color-primary-container: #0e0f0c;
      --md-sys-color-on-primary-container: #9fe870;
      --md-sys-color-secondary-container: #e8ebe6;
      --md-sys-color-on-secondary-container: #0e0f0c;
      --md-sys-color-surface: #ffffff;
      --md-sys-color-surface-container: #e8ebe6;
      --md-sys-color-on-surface: #0e0f0c;
      --md-sys-color-on-surface-variant: #868685;
      --md-sys-color-outline: #868685;
      --island-bg: #0e0f0c;
      --island-expand-bg: #1a1c18;
      --phone-screen-bg: #e8ebe6;
      --player-bg: #e8ebe6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: "calt";
      background-color: #e8ebe6;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      transition: background-image 0.5s ease;
      background-size: cover; background-position: center; background-repeat: no-repeat;
    }
    .phone-screen {
      width: 100vw; height: 100dvh; height: 100vh;
      background-color: var(--phone-screen-bg);
      overflow: hidden; position: relative;
      color: var(--md-sys-color-on-surface);
      border-radius: 0; box-shadow: none;
      display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }
    @supports (height: 100dvh) { .phone-screen { height: 100dvh; } }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute; left: 50%; transform: translateX(-50%);
      width: 126px; height: 38px;
      background-color: var(--island-bg); border-radius: 20px;
      z-index: 500;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; box-shadow: 0 4px 16px rgba(14,15,12,0.3);
      cursor: pointer;
      top: calc(env(safe-area-inset-top, 12px) + 10px);
    }
    .dynamic-island.active { width: 320px; height: 150px; border-radius: 36px; background-color: var(--island-expand-bg); }
    .island-default {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 0 14px; gap: 8px;
      opacity: 1; pointer-events: auto; transition: opacity 0.2s ease;
      position: absolute; height: 100%; z-index: 10;
    }
    .dynamic-island.active .island-default { opacity: 0; pointer-events: none; }
    .island-time { font-size: 0.85rem; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
    .island-weather { display: flex; align-items: center; gap: 5px; }
    .island-weather-icon { font-size: 1.15rem; color: var(--md-sys-color-primary); line-height: 1; }
    .island-weather-temp { font-size: 0.75rem; font-weight: 600; color: var(--md-sys-color-primary); font-variant-numeric: tabular-nums; }
    .island-weather-detail {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 20px 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease 0.1s;
      position: absolute; top: 0; height: 100%; z-index: 20;
    }
    .dynamic-island.active .island-weather-detail { opacity: 1; pointer-events: auto; }
    .detail-left { display: flex; flex-direction: column; align-items: flex-start; }
    .detail-icon-lg { font-size: 2.8rem; line-height: 1; margin-bottom: 10px; color: var(--md-sys-color-primary); }
    .detail-temp-wrap { display: flex; flex-direction: column; }
    .detail-temp-now { font-size: 2.2rem; font-weight: 900; color: var(--md-sys-color-primary); line-height: 1; }
    .detail-temp-range { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 4px; font-weight: 500; }
    .detail-right { text-align: right; display: flex; flex-direction: column; gap: 6px; }
    .detail-desc { font-size: 1.05rem; font-weight: 700; color: #fff; }
    .location-display { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 2px; font-weight: 500; }
    .detail-meta { font-size: 0.75rem; color: rgba(255,255,255,0.38); display: flex; flex-direction: column; gap: 3px; font-weight: 400; }
    .detail-meta .material-symbols-rounded { font-size: 0.85rem; vertical-align: middle; color: rgba(255,255,255,0.45); margin-right: 2px; }

    /* Player */
    .player-content { padding: calc(env(safe-area-inset-top, 20px) + 100px) 24px 70px; display: flex; flex-direction: column; align-items: center; height: 100%; position: relative; z-index: 1; }
    .player-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-color: var(--player-bg); filter: blur(60px) saturate(1.2); transform: scale(1.3); opacity: 0.3; transition: background-color 0.6s ease; }
    .album-art { width: 280px; height: 280px; object-fit: cover; border-radius: 24px; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(14,15,12,0.1), 0 2px 8px rgba(14,15,12,0.05); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); max-width: 75vw; background: var(--wise-canvas); }
    .album-art.change { transform: scale(0.9); opacity: 0.7; }
    .song-info { text-align: center; margin-bottom: 12px; width: 100%; padding: 0 8px; }
    .song-title-main { font-weight: 900; font-size: 1.75rem; color: var(--md-sys-color-on-surface); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.5px; line-height: 1.15; }
    .artist-name { font-size: 1.05rem; color: var(--wise-ink-deep); font-weight: 600; letter-spacing: -0.2px; }

    /* Wavy Slider */
    .m3-slider-root { width: 100%; height: 60px; position: relative; display: flex; align-items: center; margin-bottom: 0; flex-shrink: 0; }
    .m3-slider-track-inactive { position: absolute; height: 4px; background-color: rgba(14,15,12,0.1); border-radius: 2px; z-index: 1; top: 28px; left: 0; width: 100%; }
    .m3-slider-track-active-container { position: absolute; left: 0; height: 20px; overflow: hidden; z-index: 2; width: 0%; top: 20px; }
    .m3-slider-wavy-path { fill: none; stroke: var(--md-sys-color-primary); stroke-width: 4; stroke-linecap: round; }
    @keyframes wavy-move { from { transform: translateX(0); } to { transform: translateX(-40px); } }
    .playing .m3-slider-wavy-path { animation: wavy-move 1.5s linear infinite; }
    .m3-slider-thumb-vertical { position: absolute; top: 30px; left: 0%; width: 4px; height: 20px; background-color: var(--md-sys-color-primary); border-radius: 2px; transform: translate(-50%, -50%); z-index: 3; pointer-events: none; box-shadow: 0 2px 8px rgba(14,15,12,0.15); }
    .m3-slider-input { position: absolute; width: 100%; height: 100%; -webkit-appearance: none; appearance: none; background: transparent; z-index: 20 !important; cursor: pointer; outline: none; margin: 0; }
    .m3-slider-input::-webkit-slider-thumb { -webkit-appearance: none; height: 0; width: 0; border: none; background: transparent; cursor: pointer; box-shadow: none; }
    .m3-slider-input::-moz-range-thumb { width: 0; height: 0; border: none; background: transparent; cursor: pointer; box-shadow: none; }
    .time-labels { width: 100%; display: flex; justify-content: space-between; margin-top: 4px; color: var(--md-sys-color-on-surface-variant); font-size: 0.75rem; font-weight: 600; flex-shrink: 0; font-variant-numeric: tabular-nums; }

    /* Controls */
    .controls { display: flex; gap: 20px; align-items: center; flex-shrink: 0; margin-top: 8px; }
    .btn { background: var(--wise-canvas-soft-darker); color: var(--md-sys-color-on-secondary-container); border: none; cursor: pointer; border-radius: 24px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 1px 3px rgba(14,15,12,0.06); }
    .btn:active { transform: scale(0.92); background: var(--wise-canvas-soft); }
    .btn .material-symbols-rounded { font-size: 1.5rem; }
    .btn-play { width: 72px; height: 72px; border-radius: 36px; background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); box-shadow: 0 4px 16px rgba(159,232,112,0.35); }
    .btn-play:active { background: var(--wise-primary-active); }
    .btn-play .material-symbols-rounded { font-size: 2rem; }
    @keyframes pulse-play { 0%, 100% { box-shadow: 0 4px 16px rgba(159,232,112,0.35); transform: scale(1); } 50% { box-shadow: 0 6px 24px rgba(159,232,112,0.5); transform: scale(1.03); } }
    .playing .btn-play { animation: pulse-play 2s ease-in-out infinite; }

    /* Bottom Drawer */
    .bottom-drawer { position: absolute; bottom: 0; left: 0; width: 100%; height: 92%; background: var(--md-sys-color-surface); border-radius: 24px 24px 0 0; transform: translateY(calc(100% - 16px)); transition: transform 0.5s cubic-bezier(0.2,0,0,1); z-index: 1000; display: flex; flex-direction: column; box-shadow: 0 -8px 40px rgba(14,15,12,0.08); }
    .bottom-drawer.open { transform: translateY(0); }
    .nav-handle-area { width: 100%; height: 16px; padding-top: 6px; display: flex; justify-content: center; flex-shrink: 0; cursor: pointer; background: transparent; }
    .md3-nav-bar { width: 32px; height: 4px; background: var(--md-sys-color-outline); border-radius: 2px; opacity: 0.3; }
    .drawer-scroll-view { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 4px 24px 0; }
    .drawer-scroll-view::-webkit-scrollbar { display: none; }
    .drawer-title { font-size: 1.5rem; color: var(--md-sys-color-on-surface); margin: 4px 0 16px; font-weight: 900; flex-shrink: 0; letter-spacing: -0.5px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 16px; }
    .card { background: var(--md-sys-color-surface-container); border-radius: 24px; padding: 18px 16px; text-decoration: none; color: var(--md-sys-color-on-surface); display: flex; flex-direction: column; gap: 10px; border: none; box-shadow: none; transition: all 0.25s cubic-bezier(0.2, 0, 0, 1); position: relative; overflow: hidden; }
    .card:active { transform: scale(0.97); background: var(--wise-primary-pale); }
    .card .material-symbols-rounded { font-size: 1.7rem; color: var(--wise-ink-deep); }
    .card a { text-decoration: none; color: var(--md-sys-color-on-surface); font-weight: 600; font-size: 0.9rem; display: block; padding: 2px 0; transition: color 0.2s; position: relative; z-index: 1; }
    .card a:hover { color: var(--wise-ink-deep); text-decoration: none; }
    .drawer-footer-copyright { flex-shrink: 0; padding: 12px 24px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); text-align: center; width: 100%; background: var(--wise-ink); z-index: 1; }
    .copyright-text { font-size: 0.7rem; color: var(--wise-canvas-soft); margin-bottom: 4px; opacity: 0.65; font-weight: 400; }
    .secret-x { text-decoration: none; color: inherit; opacity: 0.15; transition: opacity 0.3s; padding: 5px; font-weight: 700; }
    .secret-x:hover { opacity: 1; color: var(--md-sys-color-primary); }

    @media screen and (min-width: 768px) {
      body { background-color: var(--wise-canvas-soft); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: flex-end; align-items: flex-end; padding: 20px; }
      .phone-screen { width: 375px; height: 812px; border-radius: 40px; box-shadow: 0 0 0 10px var(--wise-ink), 0 0 0 12px rgba(14,15,12,0.2), 0 30px 60px rgba(14,15,12,0.15); position: relative; margin: 0; padding-top: env(safe-area-inset-top); transform: none; align-self: flex-end; }
      .player-content { padding-top: calc(env(safe-area-inset-top, 20px) + 100px); }
    }
    @media screen and (min-width: 1024px) { body { padding: 30px; } .phone-screen { width: 390px; height: 844px; } }
  </style>
</head>
<body>

<audio id="audio" preload="metadata"></audio>
<canvas id="colorCanvas" style="display: none;"></canvas>

<script>
// Render drawer from WiseNavbarData
(function renderDrawer() {
  const grid = document.getElementById('drawerGrid');
  if (!grid) return;
  const items = window.WiseNavbarData || [];
  const seen = new Set();
  const filtered = items.filter(item => {
    if (item.href === '/' || item.href === '/index.html') return false;
    const key = item.href;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  grid.innerHTML = filtered.map(item => `
    <div class="card">
      <span class="material-symbols-rounded">${item.icon}</span>
      <span><a href="${item.href}">${item.label}</a></span>
    </div>
  `).join('');
})();

const ColorUtils = {
  hexToRgb: (hex) => { const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return r ? { r: parseInt(r[1],16), g: parseInt(r[2],16), b: parseInt(r[3],16) } : null; },
  rgbToHsl: (r,g,b) => { r/=255; g/=255; b/=255; const M=Math.max(r,g,b), m=Math.min(r,g,b); let h,s,l=(M+m)/2; if(M===m){h=s=0;}else{const d=M-m; s=l>0.5?d/(2-M-m):d/(M+m); switch(M){case r:h=(g-b)/d+(g<b?6:0);break; case g:h=(b-r)/d+2;break; case b:h=(r-g)/d+4;break;} h/=6;} return {h:h*360,s:s*100,l:l*100}; },
  hslToString: (h,s,l) => 'hsl('+h+','+s+'%,'+l+'%)',
  extractColorFromUrl: (url,cb) => {
    const c=document.getElementById('colorCanvas'), x=c.getContext('2d'), i=new Image();
    i.crossOrigin='Anonymous'; i.src=url;
    i.onload=function(){c.width=50;c.height=50;x.drawImage(i,0,0,50,50);try{const d=x.getImageData(0,0,50,50).data;let r=0,g=0,b=0,t=0;for(let i=0;i<d.length;i+=4){const br=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];let w=br<50?2:1;r+=d[i]*w;g+=d[i+1]*w;b+=d[i+2]*w;t+=w;}if(t>0){r=Math.floor(r/t);g=Math.floor(g/t);b=Math.floor(b/t);}cb({r,g,b});}catch(e){cb({r:100,g:145,b:65});}};
    i.onerror=()=>cb({r:100,g:145,b:65});
  },
  generateTheme: (src) => {
    const h=ColorUtils.rgbToHsl(src.r,src.g,src.b), hue=h.h, s=Math.max(20,Math.min(100,h.s)), l=h.l, aL=Math.max(55,Math.min(78,l+20)), aS=Math.max(50,Math.min(95,s+10));
    return {'--md-sys-color-primary':ColorUtils.hslToString(hue,aS,aL),'--md-sys-color-on-primary':'#0e0f0c','--md-sys-color-primary-container':ColorUtils.hslToString(hue,Math.max(25,s-5),Math.min(30,l-15)),'--md-sys-color-on-primary-container':ColorUtils.hslToString(hue,aS,Math.min(85,aL+10)),'--md-sys-color-secondary-container':ColorUtils.hslToString(hue,Math.max(5,s/6),91),'--md-sys-color-on-secondary-container':'#0e0f0c','--md-sys-color-surface':'#ffffff','--md-sys-color-surface-container':ColorUtils.hslToString(hue,Math.max(4,s/7),91),'--md-sys-color-on-surface':'#0e0f0c','--md-sys-color-on-surface-variant':'#868685','--md-sys-color-outline':'#868685','--phone-screen-bg':ColorUtils.hslToString(hue,Math.max(3,s/8),91),'--player-bg':ColorUtils.hslToString(hue,Math.max(5,s/6),88),'--island-expand-bg':ColorUtils.hslToString(hue,Math.max(8,s/3),10),'--wise-primary-pale':ColorUtils.hslToString(hue,Math.max(20,aS-30),Math.min(92,aL+15)),'--wise-ink-deep':ColorUtils.hslToString(hue,Math.max(40,s),Math.max(12,Math.min(22,l-10))),'--wise-canvas-soft-darker':ColorUtils.hslToString(hue,Math.max(4,s/5),85)};
  }
};

const CookieUtils = {
  set: (n,v,d) => { const e=new Date(); e.setTime(e.getTime()+(d||30)*864e5); document.cookie=n+'='+v+';expires='+e.toUTCString()+';path=/'; },
  get: (n) => { const v=document.cookie.match('(^|;)\\s*'+n+'=([^;]*)'); return v?v[2]:null; },
  remove: (n) => { document.cookie=n+'=;expires=Thu, 01 Jan 1970 00:00:01 GMT;path=/'; }
};

// ===== 动态从 music.json 加载歌曲列表 =====
let songs = [];
let currentSongIndex = 0;

async function loadMusicList() {
  try {
    const res = await fetch('music.json?' + Date.now()); // 加时间戳防止缓存
    if (!res.ok) throw new Error('HTTP ' + res.status);
    songs = await res.json();
    console.log('🎵 已加载 ' + songs.length + ' 首歌曲');
  } catch (e) {
    console.error('❌ 加载 music.json 失败:', e);
    songs = [];
  }
  // 如果列表为空，显示提示
  if (songs.length === 0) {
    songs = [{ title: '暂无歌曲', artist: '请添加 .mp3 文件到 /src 目录', cover: '', src: '' }];
  }
  // 加载第一首歌
  loadSong(songs[0]);
}

const audio = document.getElementById('audio');
const app = document.getElementById('app');
const island = document.getElementById('island');
const themeColorMeta = document.querySelector('meta[name="theme-color"]');

const weatherCodeMap = {
  0:{d:"晴朗",i:"wb_sunny",b:"#1a1c18"},1:{d:"多云",i:"partly_cloudy_day",b:"#1e2020"},2:{d:"少云",i:"partly_cloudy_day",b:"#1d1f1e"},3:{d:"阴天",i:"cloud",b:"#1c1d1c"},
  45:{d:"雾",i:"foggy",b:"#1a1b1a"},48:{d:"冻雾",i:"foggy",b:"#1b1c1e"},51:{d:"毛毛雨",i:"rainy",b:"#1a1e22"},53:{d:"中毛毛雨",i:"rainy",b:"#1b1f23"},55:{d:"大毛毛雨",i:"rainy",b:"#1c2024"},
  61:{d:"小雨",i:"rainy",b:"#1a1e24"},63:{d:"中雨",i:"rainy",b:"#191d22"},65:{d:"大雨",i:"thunderstorm",b:"#171b20"},66:{d:"冻雨",i:"severe_cold",b:"#1e2126"},67:{d:"冻雨",i:"severe_cold",b:"#1e2126"},
  71:{d:"小雪",i:"ac_unit",b:"#1e2022"},73:{d:"中雪",i:"ac_unit",b:"#1d1f21"},75:{d:"大雪",i:"severe_cold",b:"#1c1e20"},77:{d:"雪粒",i:"severe_cold",b:"#1c1e20"},
  80:{d:"阵雨",i:"rainy",b:"#1a1e23"},81:{d:"阵雨",i:"rainy",b:"#1b1f24"},82:{d:"暴雨",i:"thunderstorm",b:"#181c22"},85:{d:"阵雪",i:"ac_unit",b:"#1d1f21"},86:{d:"阵雪",i:"ac_unit",b:"#1c1e20"},
  95:{d:"雷暴",i:"thunderstorm",b:"#1a1c22"},96:{d:"雷暴",i:"thunderstorm",b:"#1b1d23"},99:{d:"强雷暴",i:"thunderstorm",b:"#191b21"}
};

function updateThemeColor() { const c=getComputedStyle(document.documentElement).getPropertyValue('--phone-screen-bg').trim(); if(c) themeColorMeta.setAttribute('content',c); }
function updateTime() { const n=new Date(); document.getElementById('islandTime').textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }

async function getLocationByIP() {
  try { const r=await fetch('https://ipapi.co/json/'); if(!r.ok) throw Error(); const d=await r.json(); if(d.latitude&&d.longitude) return {lat:d.latitude,lon:d.longitude,city:d.city}; } catch(e) {
    if(location.protocol==='http:'){ try { const r2=await fetch('http://ip-api.com/json/?lang=zh-CN'); if(r2.ok){ const d2=await r2.json(); if(d2.status==='success') return {lat:d2.lat,lon:d2.lon,city:d2.city}; } } catch(e2){} }
  } return null;
}

async function fetchWeather() {
  let lat=parseFloat(CookieUtils.get('weather_lat'))||null, lon=parseFloat(CookieUtils.get('weather_lon'))||null, locName=null;
  if(!lat||!lon) {
    if('geolocation'in navigator){
      try {
        document.getElementById('locationDisplay').textContent='正在请求位置...';
        const p=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:1e4,enableHighAccuracy:true,maximumAge:3e5}));
        lat=p.coords.latitude; lon=p.coords.longitude;
        CookieUtils.set('weather_lat',lat,30); CookieUtils.set('weather_lon',lon,30);
      } catch(e) {
        const ip=await getLocationByIP();
        if(ip){lat=ip.lat;lon=ip.lon;locName=ip.city;CookieUtils.set('weather_lat',lat,30);CookieUtils.set('weather_lon',lon,30);}
        else{lat=39.9042;lon=116.4074;document.getElementById('locationDisplay').textContent='默认位置 (北京)';}
      }
    } else {
      const ip=await getLocationByIP();
      if(ip){lat=ip.lat;lon=ip.lon;locName=ip.city;CookieUtils.set('weather_lat',lat,30);CookieUtils.set('weather_lon',lon,30);}
      else{lat=39.9042;lon=116.4074;document.getElementById('locationDisplay').textContent='默认位置 (北京)';}
    }
  }
  try {
    if(!locName){ try { const l=await fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+lat+'&longitude='+lon+'&localityLanguage=zh'); const ld=await l.json(); locName=ld.city||ld.locality||ld.principalSubdivision||ld.countryName||lat.toFixed(2)+', '+lon.toFixed(2); } catch(e){locName='未知位置';} }
    if(!document.getElementById('locationDisplay').textContent.includes('默认')) document.getElementById('locationDisplay').textContent=locName;
    const wr=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=auto');
    const d=await wr.json(); const c=d.current_weather||d.current, da=d.daily, t=Math.round(c.temperature_2m), cd=c.weather_code, w=weatherCodeMap[cd]||{d:'未知',i:'thermostat',b:'#1a1c18'};
    document.getElementById('islandWeatherTemp').textContent=t+'°'; document.getElementById('islandWeatherIcon').textContent=w.i;
    document.getElementById('detailIcon').textContent=w.i; document.getElementById('detailTemp').textContent=t+'°';
    document.getElementById('detailDesc').textContent=w.d;
    document.getElementById('detailRange').textContent='H:'+Math.round(da.temperature_2m_max[0])+'° L:'+Math.round(da.temperature_2m_min[0])+'°';
    document.getElementById('detailWind').innerHTML='<span class="material-symbols-rounded">air</span> '+Math.round(c.wind_speed_10m)+'km/h';
    document.getElementById('detailHumidity').innerHTML='<span class="material-symbols-rounded">water_drop</span> '+c.relative_humidity_2m+'%';
    document.documentElement.style.setProperty('--island-expand-bg',w.b);
  } catch(e) { console.error(e); if(!document.getElementById('locationDisplay').textContent.includes('失败')) document.getElementById('locationDisplay').textContent='天气获取失败'; }
}

function toggleIsland(){island.classList.toggle('active');}
function playSong(){if(!audio.src)return;audio.play();app.classList.add('playing');document.getElementById('playIcon').innerText='pause';}
function pauseSong(){audio.pause();app.classList.remove('playing');document.getElementById('playIcon').innerText='play_arrow';}
document.getElementById('playBtn').addEventListener('click',()=>audio.paused?playSong():pauseSong());
document.getElementById('nextBtn').addEventListener('click',()=>{if(!songs.length)return;currentSongIndex=(currentSongIndex+1)%songs.length;loadSong(songs[currentSongIndex]);playSong();});
document.getElementById('prevBtn').addEventListener('click',()=>{if(!songs.length)return;currentSongIndex=(currentSongIndex-1+songs.length)%songs.length;loadSong(songs[currentSongIndex]);playSong();});

function loadSong(song){
  if (!song || !song.src) return;
  document.getElementById('mainTitle').innerText=song.title; document.getElementById('mainArtist').innerText=song.artist;
  if (song.cover) {
    ColorUtils.extractColorFromUrl(song.cover,rgb=>{const t=ColorUtils.generateTheme(rgb); for(const[k,v]of Object.entries(t))document.documentElement.style.setProperty(k,v); updateThemeColor();});
  }
  const mc=document.getElementById('mainCover');
  mc.onload=()=>{if('mediaSession'in navigator)navigator.mediaSession.metadata=new MediaMetadata({title:song.title,artist:song.artist,album:'Unknown Album',artwork:[{src:song.cover||'',sizes:'512x512',type:'image/jpeg'}]});};
  mc.src=song.cover||''; audio.src=song.src;
  if('mediaSession'in navigator)navigator.mediaSession.metadata=new MediaMetadata({title:song.title,artist:song.artist,artwork:[{src:song.cover||'',sizes:'512x512',type:'image/jpeg'}]});
}

let isDragging=false;
const audioSlider=document.getElementById('audioSlider'),activeTrack=document.getElementById('activeTrack'),inactiveTrack=document.getElementById('inactiveTrack'),sliderThumb=document.getElementById('sliderThumb');
audio.addEventListener('timeupdate',()=>{const{duration,currentTime}=audio;if(isNaN(duration))return;const p=currentTime/duration*100;if(!isDragging)updateUI(p);if(currentTime>=duration&&duration>0)document.getElementById('nextBtn').click();});
audioSlider.addEventListener('input',()=>{isDragging=true;updateUI(audioSlider.value);});
audioSlider.addEventListener('change',()=>{isDragging=false;audio.currentTime=audioSlider.value/100*audio.duration;});
function updateUI(p){p=isNaN(p)?0:Math.max(0,Math.min(100,p));audioSlider.value=p;activeTrack.style.width=p+'%';inactiveTrack.style.left=p+'%';inactiveTrack.style.width=(100-p)+'%';sliderThumb.style.left=p+'%';const cur=isDragging?p/100*audio.duration:audio.currentTime;document.getElementById('currTime').innerText=isNaN(cur)?'0:00':Math.floor(cur/60)+':'+String(Math.floor(cur%60)).padStart(2,'0');document.getElementById('durTime').innerText=isNaN(audio.duration)?'0:00':Math.floor(audio.duration/60)+':'+String(Math.floor(audio.duration%60)).padStart(2,'0');}
if('mediaSession'in navigator){navigator.mediaSession.setActionHandler('play',playSong);navigator.mediaSession.setActionHandler('pause',pauseSong);navigator.mediaSession.setActionHandler('previoustrack',()=>document.getElementById('prevBtn').click());navigator.mediaSession.setActionHandler('nexttrack',()=>document.getElementById('nextBtn').click());}
function toggleDrawer(){document.getElementById('drawer').classList.toggle('open');}
document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();audio.paused?playSong():pauseSong();}else if(e.key==='ArrowLeft'){e.preventDefault();document.getElementById('prevBtn').click();}else if(e.key==='ArrowRight'){e.preventDefault();document.getElementById('nextBtn').click();}});
async function loadBingWallpaper(){if(window.innerWidth<768)return;try{const r=await fetch('https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN');const d=await r.json();if(d.images&&d.images.length>0){const u='https://www.bing.com'+d.images[0].url;const img=new Image();img.src=u;img.onload=()=>{document.body.style.backgroundImage='url('+u+')';};}}catch(e){}}
function init(){updateTime();setInterval(updateTime,1e3);fetchWeather();setInterval(fetchWeather,6e5);island.addEventListener('click',toggleIsland);loadBingWallpaper();window.addEventListener('resize',()=>{if(window.innerWidth>=768)loadBingWallpaper();});updateThemeColor();}

// 启动：先加载歌曲列表，再初始化其他功能
loadMusicList().then(init);
</script>
</body>
</html>
