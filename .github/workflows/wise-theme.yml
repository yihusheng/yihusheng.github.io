name: Inject Wise Theme

on:
  push:
    paths:
      - 'Music/index.html'
      - 'Music/css/**'
      - 'Music/js/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure wise-theme.css exists in Music/css
        run: |
          if [ ! -f "Music/css/wise-theme.css" ] && [ -f "css/wise-theme.css" ]; then
            cp css/wise-theme.css Music/css/wise-theme.css
            echo "Copied wise-theme.css into Music/css/"
          fi

      - name: Inject CSS link into Music/index.html
        run: |
          if grep -q 'wise-theme.css' Music/index.html; then
            echo "✓ wise-theme.css already referenced"
          else
            sed -i 's|</head>|<link href="css/wise-theme.css" rel="stylesheet"></head>|' Music/index.html
            echo "✓ Injected wise-theme.css link"
          fi

      - name: Commit fixes if needed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add Music/index.html Music/css/wise-theme.css 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: auto-inject Wise theme [skip ci]"
          git pull --rebase
          git push
