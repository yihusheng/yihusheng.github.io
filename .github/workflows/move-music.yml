name: Migrate Music Files to src/music/
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move music files
        run: |
          mkdir -p src/music
          git mv src/*.mp3 src/music/ 2>/dev/null || true
          git mv src/*.m4a src/music/ 2>/dev/null || true
          git mv src/*.jpg src/music/ 2>/dev/null || true
          git mv src/*.jpeg src/music/ 2>/dev/null || true
          git mv src/*.png src/music/ 2>/dev/null || true
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add src/music/
          git diff --staged --quiet || git commit -m "chore: migrate music files from src/ to src/music/"
          git push
