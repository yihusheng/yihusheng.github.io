name: Update Music & Deploy

on:
  push:
    paths:
      - 'src/music/*.mp3'
      - 'src/music/*.wav'
      - 'src/music/*.flac'
      - 'src/music/*.ogg'
      - 'src/music/*.m4a'
      - 'src/music/*.aac'
      - 'src/music/*.jpg'
      - 'src/music/*.jpeg'
      - 'src/music/*.png'
      - 'src/music/*.webp'
      - 'src/music/*.lrc'
      - 'src/scripts/generate-music.js'
      - 'src/scripts/index.js'
      - '.github/workflows/update-music.yml'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install music-metadata

      - name: Generate music.json & extract covers & lyrics
        run: node src/scripts/generate-music.js

      - name: Commit and push changes
        shell: bash -e {0}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add src/scripts/music.json
          git add src/music/ -- '*.jpg' '*.png' '*.lrc'
          if ! git diff --staged --quiet; then
            git commit -m 'chore: auto-update music.json, covers and lyrics [skip ci]'
          fi
          git stash push -m "auto-stash" || true
          git pull --rebase
          git stash pop || true
          git push

      - name: Upload to Cloudflare R2
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN || '' }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '5d7d0fcdc929a2bd1491c8924d0a587a' }}
          command: |
            r2 object put maxcloud/src/scripts/music.json --file=src/scripts/music.json
            for f in src/music/*.mp3 src/music/*.flac src/music/*.m4a src/music/*.ogg src/music/*.wav src/music/*.jpg src/music/*.jpeg src/music/*.png src/music/*.lrc src/music/*.txt; do
              [ -f "$f" ] && r2 object put "maxcloud/$f" --file="$f"
            done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
