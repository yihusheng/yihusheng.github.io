name: Update Music & Deploy

on:
  push:
    paths:
      - 'public/music/*.mp3'
      - 'public/music/*.wav'
      - 'public/music/*.flac'
      - 'public/music/*.ogg'
      - 'public/music/*.m4a'
      - 'public/music/*.aac'
      - 'public/music/*.jpg'
      - 'public/music/*.jpeg'
      - 'public/music/*.png'
      - 'public/music/*.webp'
      - 'public/music/*.lrc'
      - 'src/scripts/generate-music.js'
      - 'src/scripts/index.js'
      - '.github/workflows/update-music.yml'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install music-metadata

      - name: Generate music.json & extract covers & lyrics
        run: node src/scripts/generate-music.js

      - name: Commit and push changes
        shell: bash -e {0}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add src/scripts/music.json
          git add public/music/ -- '*.jpg' '*.png' '*.lrc'
          if ! git diff --staged --quiet; then
            git commit -m 'chore: auto-update music.json, covers and lyrics [skip ci]'
          fi
          git stash push -m "auto-stash" || true
          git pull --rebase
          git stash pop || true
          git push

      - name: Upload music files to R2
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⏭️ CLOUDFLARE_API_TOKEN 未设置，跳过 R2 上传"
            exit 0
          fi
          npx --yes wrangler r2 object put maxcloud/src/scripts/music.json --file=src/scripts/music.json
          for f in public/music/*.mp3 public/music/*.flac public/music/*.m4a public/music/*.ogg public/music/*.wav public/music/*.jpg public/music/*.jpeg public/music/*.png public/music/*.lrc public/music/*.txt; do
            [ -f "$f" ] && npx --yes wrangler r2 object put "maxcloud/$f" --file="$f"
          done
          echo "✅ R2 上传完成"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
