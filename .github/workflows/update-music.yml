name: Update Music List

on:
  push:
    paths:
      - 'src/*.mp3'
      - 'src/*.wav'
      - 'src/*.flac'
      - 'src/*.jpg'
      - 'src/*.jpeg'
      - 'src/*.png'
      - 'scripts/generate-music.js'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-music:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate music.json
        run: node scripts/generate-music.js

      - name: Commit changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add music.json
          git diff --staged --quiet || git commit -m "chore: auto-update music.json"
          git push