name: Update Music & Deploy

on:
  push:
    paths:
      - 'src/music/*.mp3'
      - 'src/music/*.wav'
      - 'src/music/*.flac'
      - 'src/music/*.ogg'
      - 'src/music/*.m4a'
      - 'src/music/*.aac'
      - 'src/music/*.jpg'
      - 'src/music/*.jpeg'
      - 'src/music/*.png'
      - 'src/music/*.webp'
      - 'src/scripts/generate-music.js'
      - '.github/workflows/update-music.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install node-id3

      - name: Generate music.json & extract covers
        run: node src/scripts/generate-music.js

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add src/scripts/music.json
          git add src/music/ -- '*.jpg' '*.png'
          git diff --staged --quiet || git commit -m "chore: auto-update music.json & extract covers [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4