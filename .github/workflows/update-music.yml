name: Update Music & Deploy

on:
  push:
    paths:
      - 'src/*.mp3'
      - 'src/*.wav'
      - 'src/*.flac'
      - 'src/*.ogg'
      - 'src/*.m4a'
      - 'src/*.aac'
      - 'src/*.jpg'
      - 'src/*.jpeg'
      - 'src/*.png'
      - 'src/*.webp'
      - 'scripts/generate-music.js'
      - '.github/workflows/update-music.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate music.json
        run: node scripts/generate-music.js

      - name: Commit updated music.json
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add music.json
          git diff --staged --quiet || git commit -m "chore: auto-update music.json [skip ci]"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4