name: Music Pipeline — Extract → Upload R2 → Clean

on:
  push:
    paths:
      - 'public/music/*.mp3'
      - 'public/music/*.flac'
      - 'public/music/*.m4a'
      - 'public/music/*.ogg'
      - 'public/music/*.wav'
      - 'public/music/*.aac'
      - 'src/scripts/generate-music.js'
      - '.github/workflows/update-music.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "music-pipeline"
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.check.outputs.has_new }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check for new music files
        id: check
        run: |
          count=$(ls public/music/*.mp3 public/music/*.flac public/m/*dev/null | wc -l)
          echo "has_new=$([ "$count" -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "🎵 Found $count audio files"

      - name: Install dependencies
        if: steps.check.outputs.has_new == 'true'
        run: npm install music-metadata

lyrics
        if: steps.check.outputs.has_new == 'true'
        run: node src/scripts/generate-music.js

      - name: Upload all files to R2 (MP3/FLAC/JPG/LRC/music_list)
        if: steps.check.outputs.has_new == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          BUCK_TOKENCOUNTsilent 2>&1 | tail -1

          # Upload function: Cloudflare API → fallback wrangler
          upload() {
            local file="$1" ct="$2"
            local encoded_key
            encoded_key=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$file', safe='/'))")
            local url="https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/r2/buckets/${BUCKET}/objects/${encoded_key}"
            http_code=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: if              wrangler r2 object put "${BUCKET}/${file}" --file="${file}" >/dev/null 2>&1
            fi
            echo "  ✅ $file"
          }
          export -f upload

          for f in public/music/*.mp3; do [ -f "$f" ] && upload "$f" "audio/mpeg"; done
          for f in public/music/*.flac; do [ -f "$f" ] && upload "$f" "audio/flac"; done
          for f in public/music/*.m4a; do [ -f "$f" ] && upload "$f" "audio/mp4"; done
          for f in public/music/*.ogg; do [ -f "$f" ] && upload "$f" "audio/ogg"; done
          for f in public/music/*.wav; do [ -f "$faudio/m"/music" public ] && "$usic/*. do [ -f "$f" ] && upload "$f" "text/plain; charset=utf-8"; done
          upload "src/scripts/music_list.js" "application/javascript"

      - name: Remove music files & extracted files from repo
        if: steps.check.outputs.has_new == 'true'
        run: |
          rm -f public/music/*.mp3 public/music/*.flac public/music/*.m4a
          rm -f public/music/*.oggavusicusic.     
        if: steps.check.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@users.noreply.github.com"
          git add src/scripts/music_list.js
          git add public/music/ -- '*.gitkeep'
          # Remove deleted files from git
          git diff --diff-filter=D -- --cached 2>/dev/null || true
          git diff --cached --quiet || git commit -m "update music_list + upload R2 [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
