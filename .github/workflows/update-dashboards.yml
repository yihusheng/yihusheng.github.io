name: Update Dashboards

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update (skip version check)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  M: Tools/Metacubexd
  Z: Tools/zashboard

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ═══════════════════════════════
      # Metacubexd
      # ═══════════════════════════════
      - name: Check Metacubexd version
        id: mv
        run: |
          LATEST=$(curl -s https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest \
            | jq -r '.tag_name // "v0"')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          CUR=""
          [ -f "$M/index.html" ] && CUR=$(grep -oP 'appVersion:"\K[^"]+' "$M/index.html" || echo "")
          echo "cur=${CUR:-none}" >> $GITHUB_OUTPUT
          [ "$LATEST" = "$CUR" -a "${{ inputs.force_update }}" != "true" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT

      - name: Update Metacubexd
        if: steps.mv.outputs.skip == 'false'
        run: |
          V=${{ steps.mv.outputs.latest }}
          curl -sL "https://github.com/MetaCubeX/metacubexd/releases/download/${V}/compressed-dist.tgz" -o /tmp/m.tgz
          mkdir -p /tmp/ms
          tar -xzf /tmp/m.tgz -C /tmp/ms
          
          # compressed-dist.tgz 可能包含子目录，自动检测源目录
          if [ -d "/tmp/ms/compressed-dist" ]; then
            S=/tmp/ms/compressed-dist
          elif [ -d "/tmp/ms/_nuxt" ]; then
            S=/tmp/ms
          else
            # 查找包含 index.html 的目录
            S=$(find /tmp/ms -name index.html -exec dirname {} \; | head -1)
            if [ -z "$S" ]; then
              echo "ERROR: no index.html found in release artifact"
              ls -la /tmp/ms/
              exit 1
            fi
          fi
          echo "Source dir: $S"

          # compressed-dist.tgz 可能用 _index.html 或 index.html
          if [ -f "$S/index.html" ]; then
            IDX=index.html
          elif [ -f "$S/_index.html" ]; then
            IDX=_index.html
          else
            echo "ERROR: no index.html found in release artifact"
            ls -la "$S/"
            exit 1
          fi
          echo "Using $IDX as index"

          # _nuxt (核心资源)
          rm -rf $M/_nuxt && cp -r $S/_nuxt $M/

          # _fonts (部分版本携带)
          rm -rf $M/_fonts 2>/dev/null || true
          [ -d "$S/_fonts" ] && cp -r $S/_fonts $M/

          # workbox (sw 依赖)
          rm -f $M/workbox-*.js 2>/dev/null || true
          for f in $S/workbox-*.js; do
            [ -f "$f" ] && cp "$f" $M/
          done

          # 其他静态文件
          for f in sw.js manifest.webmanifest .nojekyll favicon.ico favicon.svg \
                   pwa-*.png maskable-icon-*.png apple-touch-icon-*.png; do
            [ -f "$S/$f" ] && cp "$S/$f" $M/ 2>/dev/null || true
          done

          # index 文件 + 导航栏注入
          for f in $IDX 200.html 404.html; do
            if [ -f "$S/$f" ]; then
              cp "$S/$f" "$M/$f"
            elif [ "$f" != "$IDX" ]; then
              # 200.html / 404.html 不存在则从 index 创建（SPA 路由需要）
              [ -f "$M/$IDX" ] && cp "$M/$IDX" "$M/$f" && echo "  Created $f from $IDX"
            fi
            [ -f "$M/$f" ] || continue
            grep -q '/Tools/navbar.css' "$M/$f" && continue
            sed -i 's|<head>|<head>\n<!-- navbar -->\n<link rel="stylesheet" href="/Tools/navbar.css">\n<script src="/Tools/navbar.js"></script>|' "$M/$f"
            sed -i 's|<body>|<body class="navbar-overlay">|' "$M/$f"
            echo "  Injected navbar: $M/$f"
          done

          # config.js
          [ -f "$M/config.js" ] || echo 'window.__METACUBEXD_CONFIG__={defaultBackendURL:""}' > $M/config.js
          echo "Metacubexd ${V} done"

      # ═══════════════════════════════
      # Zashboard
      # ═══════════════════════════════
      - name: Check Zashboard version
        id: zv
        run: |
          LATEST=$(curl -s https://api.github.com/repos/Zephyruso/zashboard/releases/latest \
            | jq -r '.tag_name // "v0"')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          CUR=""; [ -f "$Z/.version" ] && CUR=$(cat "$Z/.version")
          echo "cur=${CUR:-none}" >> $GITHUB_OUTPUT
          [ "$LATEST" = "$CUR" -a "${{ inputs.force_update }}" != "true" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT

      - name: Update Zashboard
        if: steps.zv.outputs.skip == 'false'
        run: |
          V=${{ steps.zv.outputs.latest }}
          curl -sL "https://github.com/Zephyruso/zashboard/releases/download/${V}/dist-no-fonts.zip" -o /tmp/z.zip
          unzip -qo /tmp/z.zip -d /tmp/zs

          # dist zip 可能包含 dist/ 前缀目录，自动检测
          if [ -d "/tmp/zs/dist" ]; then
            S=/tmp/zs/dist
          elif [ -d "/tmp/zs/assets" ]; then
            S=/tmp/zs
          else
            # 查找包含 index.html 的目录
            S=$(find /tmp/zs -name index.html -exec dirname {} \; | head -1)
          fi
          echo "Source dir: $S"

          rm -rf $Z/assets
          [ -d "$S/assets" ] && cp -r $S/assets $Z/ || echo "WARNING: no assets dir"

          for f in favicon.ico favicon.svg apple-touch-icon.png pwa-*.png manifest.webmanifest registerSW.js sw.js; do
            [ -f "$S/$f" ] && cp "$S/$f" $Z/ 2>/dev/null || true
          done

          # index.html
          [ -f "$S/index.html" ] && cp "$S/index.html" $Z/index.html

          grep -q '/Tools/navbar.css' "$Z/index.html" 2>/dev/null && NEED_INJECT=false || NEED_INJECT=true
          if [ "$NEED_INJECT" = true ]; then
            sed -i 's|<head>|<head>\n<!-- navbar -->\n<link rel="stylesheet" href="/Tools/navbar.css">\n<script src="/Tools/navbar.js"></script>|' "$Z/index.html"
            sed -i 's|<body class="|<body class="navbar-overlay |' "$Z/index.html"
            sed -i 's|<body>|<body class="navbar-overlay">|' "$Z/index.html"
            echo "Navbar injected"
          fi
          echo "$V" > $Z/.version
          echo "Zashboard $V done"

      # ═══════════════════════════════
      # Commit & Deploy
      # ═══════════════════════════════
      - name: Commit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add $M/ $Z/
          git diff --staged --quiet || git commit -m "chore: auto-update dashboards [skip ci]"
          git pull --rebase
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deploy
        uses: actions/deploy-pages@v4
