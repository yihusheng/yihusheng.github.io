name: Update Dashboards

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update (skip version check)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: "update-dashboards"
  cancel-in-progress: false

env:
  M: Tools/Metacubexd
  Z: Tools/zashboard

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ═══════════════════════════════
      # Metacubexd
      # 导航栏由 Cloudflare Pages _middleware 在边缘注入，
      # 此工作流只负责更新源文件，不做任何修改。
      # ═══════════════════════════════
      - name: Check Metacubexd version
        id: mv
        run: |
          LATEST=$(curl -s https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest \
            | jq -r '.tag_name // "v0"')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          CUR=""
          [ -f "$M/index.html" ] && CUR=$(grep -oP 'appVersion:"\K[^"]+' "$M/index.html" || echo "")
          echo "cur=${CUR:-none}" >> $GITHUB_OUTPUT
          [ "$LATEST" = "$CUR" -a "${{ inputs.force_update }}" != "true" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT

      - name: Update Metacubexd
        if: steps.mv.outputs.skip == 'false'
        run: |
          V=${{ steps.mv.outputs.latest }}
          echo "Downloading Metacubexd ${V}..."
          curl -sL "https://github.com/MetaCubeX/metacubexd/releases/download/${V}/compressed-dist.tgz" -o /tmp/m.tgz
          mkdir -p /tmp/ms
          tar -xzf /tmp/m.tgz -C /tmp/ms

          S=""
          if [ -d "/tmp/ms/compressed-dist" ]; then
            S=/tmp/ms/compressed-dist
          elif [ -d "/tmp/ms/_nuxt" ]; then
            S=/tmp/ms
          else
            NUXT_DIR=$(find /tmp/ms -type d -name "_nuxt" | head -1)
            [ -n "$NUXT_DIR" ] && S=$(dirname "$NUXT_DIR")
          fi
          if [ -z "$S" ] || [ ! -d "$S" ]; then
            echo "ERROR: Cannot find source directory"
            exit 1
          fi
          echo "Source dir: $S"

          IDX=""
          [ -f "$S/index.html" ] && IDX=index.html
          [ -z "$IDX" ] && [ -f "$S/_index.html" ] && IDX=_index.html
          [ -z "$IDX" ] && { echo "ERROR: no index.html"; exit 1; }

          rm -rf "$M/_nuxt" "$M/_fonts" "$M"/workbox-*.js 2>/dev/null || true
          mkdir -p "$M"

          cp -r "$S/_nuxt" "$M/"
          echo "Copied _nuxt ($(find $M/_nuxt -type f | wc -l) files)"

          [ -d "$S/_fonts" ] && cp -r "$S/_fonts" "$M/" && echo "Copied _fonts"

          # 拷贝所有文件（保持原始，不做导航栏注入）
          for f in $IDX 200.html 404.html; do
            if [ -f "$S/$f" ]; then
              cp "$S/$f" "$M/$f"
            elif [ "$f" != "$IDX" ] && [ -f "$M/$IDX" ]; then
              cp "$M/$IDX" "$M/$f"
            fi
          done

          for f in sw.js manifest.webmanifest favicon.ico favicon.svg \
                   pwa-*.png maskable-icon-*.png apple-touch-icon-*.png config.js .nojekyll; do
            for g in "$S"/$f; do
              [ -f "$g" ] && cp "$g" "$M/" 2>/dev/null || true
            done
          done

          [ -f "$M/config.js" ] || echo 'window.__METACUBEXD_CONFIG__={defaultBackendURL:""}' > "$M/config.js"
          echo "Metacubexd ${V} done (no source modification)"

      # ═══════════════════════════════
      # Zashboard
      # 导航栏同样由 _middleware 注入
      # ═══════════════════════════════
      - name: Check Zashboard version
        id: zv
        run: |
          LATEST=$(curl -s https://api.github.com/repos/Zephyruso/zashboard/releases/latest \
            | jq -r '.tag_name // "v0"')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          CUR=""; [ -f "$Z/.version" ] && CUR=$(cat "$Z/.version")
          echo "cur=${CUR:-none}" >> $GITHUB_OUTPUT
          [ "$LATEST" = "$CUR" -a "${{ inputs.force_update }}" != "true" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT

      - name: Update Zashboard
        if: steps.zv.outputs.skip == 'false'
        run: |
          V=${{ steps.zv.outputs.latest }}
          echo "Downloading Zashboard ${V}..."
          curl -sL "https://github.com/Zephyruso/zashboard/releases/download/${V}/dist-no-fonts.zip" -o /tmp/z.zip
          mkdir -p /tmp/zs
          unzip -qo /tmp/z.zip -d /tmp/zs

          if [ -d "/tmp/zs/dist" ]; then
            S=/tmp/zs/dist
          elif [ -d "/tmp/zs/assets" ]; then
            S=/tmp/zs
          else
            S=$(find /tmp/zs -name index.html -exec dirname {} \; | head -1)
          fi
          echo "Source dir: $S"

          mkdir -p "$Z"
          rm -rf "$Z/assets"
          [ -d "$S/assets" ] && cp -r "$S/assets" "$Z/"

          for f in index.html favicon.ico favicon.svg apple-touch-icon.png \
                   pwa-*.png manifest.webmanifest registerSW.js sw.js; do
            for g in "$S"/$f; do
              [ -f "$g" ] && cp "$g" "$Z/" 2>/dev/null || true
            done
          done

          echo "$V" > "$Z/.version"
          echo "Zashboard $V done (no source modification)"

      # ═══════════════════════════════
      # Commit（触发 Cloudflare Pages 自动部署）
      # ═══════════════════════════════
      - name: Commit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add $M/ $Z/
          git diff --staged --quiet || git commit -m "chore: auto-update dashboards"
          git pull --rebase
          git push
