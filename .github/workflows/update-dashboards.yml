name: Update Dashboards (Metacubexd and Zashboard)

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update (skip version check)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  METACUBEXD_DIR: Tools/Metacubexd
  ZASHBOARD_DIR: Tools/zashboard

jobs:
  update-dashboards:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ‚îÄ‚îÄ Metacubexd version check ‚îÄ‚îÄ
      - name: Check Metacubexd version
        id: meta_ver
        run: |
          LATEST=$(curl -s https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest \
            | jq -r '.tag_name // "v0"')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          CURRENT=""
          if [ -f "${{ env.METACUBEXD_DIR }}/index.html" ]; then
            CURRENT=$(grep -oP 'appVersion:"\K[^"]+' "${{ env.METACUBEXD_DIR }}/index.html" || echo "")
          fi
          echo "current=${CURRENT:-none}" >> $GITHUB_OUTPUT
          if [ "$LATEST" = "$CURRENT" ] && [ "${{ inputs.force_update }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
          echo "Metacubexd: current=$CURRENT -> latest=$LATEST"

      # ‚îÄ‚îÄ Update Metacubexd ‚îÄ‚îÄ
      - name: Update Metacubexd
        if: steps.meta_ver.outputs.skip == 'false'
        run: |
          echo "Downloading Metacubexd gh-pages..."
          curl -sL https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip -o /tmp/meta.zip
          unzip -qo /tmp/meta.zip -d /tmp/meta_src
          SRC=/tmp/meta_src/metacubexd-gh-pages

          echo "Replacing _nuxt..."
          rm -rf ${{ env.METACUBEXD_DIR }}/_nuxt
          cp -r $SRC/_nuxt ${{ env.METACUBEXD_DIR }}/

          echo "Replacing sw/workbox..."
          cp $SRC/sw.js ${{ env.METACUBEXD_DIR }}/sw.js
          cp $SRC/workbox-*.js ${{ env.METACUBEXD_DIR }}/ 2>/dev/null || true
          ls ${{ env.METACUBEXD_DIR }}/workbox-*.js 2>/dev/null \
            | grep -vF "$(ls $SRC/workbox-*.js 2>/dev/null | xargs basename)" \
            | xargs rm -f 2>/dev/null || true

          echo "Updating manifest / icons..."
          cp $SRC/manifest.webmanifest ${{ env.METACUBEXD_DIR }}/ 2>/dev/null || true
          cp $SRC/.nojekyll ${{ env.METACUBEXD_DIR }}/ 2>/dev/null || true
          for f in favicon.ico favicon.svg pwa-*.png maskable-icon-*.png apple-touch-icon-*.png; do
            [ -f "$SRC/$f" ] && cp "$SRC/$f" "${{ env.METACUBEXD_DIR }}/" 2>/dev/null || true
          done

          echo "Injecting navbar..."
          python3 -c "
import os, shutil
d = os.environ['METACUBEXD_DIR']
s = '/tmp/meta_src/metacubexd-gh-pages'
nb = '<!-- navbar -->\n<link rel=\"stylesheet\" href=\"/Tools/navbar.css\">\n<script src=\"/Tools/navbar.js\"></script>'
for f in ['index.html','200.html','404.html']:
    t = os.path.join(d, f)
    fb = os.path.join(s, f)
    if os.path.exists(fb): shutil.copy2(fb, t)
    if not os.path.exists(t): continue
    with open(t, encoding='utf-8') as fh: h = fh.read()
    c = False
    if '/Tools/navbar.css' not in h:
        h = h.replace('<head>', '<head>\n' + nb); c = True
    if 'navbar-overlay' not in h:
        h = h.replace('<body>', '<body class=\"navbar-overlay\">'); c = True
    if c:
        with open(t, 'w', encoding='utf-8') as fh: fh.write(h)
        print('  Updated:', t)
if not os.path.exists(os.path.join(d, 'config.js')):
    with open(os.path.join(d, 'config.js'), 'w') as f:
        f.write('window.__METACUBEXD_CONFIG__={defaultBackendURL:\"\"}\n')
"
          echo "Metacubexd updated to ${{ steps.meta_ver.outputs.latest }}"

      # ‚îÄ‚îÄ Zashboard version check ‚îÄ‚îÄ
      - name: Check Zashboard version
        id: zash_ver
        run: |
          LATEST=$(curl -s https://api.github.com/repos/Zephyruso/zashboard/releases/latest \
            | jq -r '.tag_name // "v0"')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          VERSION_FILE="${{ env.ZASHBOARD_DIR }}/.version"
          CURRENT=""
          [ -f "$VERSION_FILE" ] && CURRENT=$(cat "$VERSION_FILE")
          echo "current=${CURRENT:-none}" >> $GITHUB_OUTPUT
          if [ "$LATEST" = "$CURRENT" ] && [ "${{ inputs.force_update }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
          echo "Zashboard: current=$CURRENT -> latest=$LATEST"

      # ‚îÄ‚îÄ Update Zashboard ‚îÄ‚îÄ
      - name: Update Zashboard
        if: steps.zash_ver.outputs.skip == 'false'
        run: |
          VER=${{ steps.zash_ver.outputs.latest }}
          echo "Downloading Zashboard $VER..."
          curl -sL "https://github.com/Zephyruso/zashboard/releases/download/${VER}/dist-cdn-fonts.zip" \
            -o /tmp/zash.zip
          unzip -qo /tmp/zash.zip -d /tmp/zash_src
          SRC=/tmp/zash_src

          echo "Replacing assets..."
          rm -rf ${{ env.ZASHBOARD_DIR }}/assets
          cp -r $SRC/assets ${{ env.ZASHBOARD_DIR }}/

          echo "Updating core files..."
          for f in favicon.ico favicon.svg apple-touch-icon.png pwa-192x192.png pwa-512x512.png \
                    pwa-maskable-192x192.png pwa-maskable-512x512.png \
                    manifest.webmanifest registerSW.js sw.js; do
            [ -f "$SRC/$f" ] && cp "$SRC/$f" "${{ env.ZASHBOARD_DIR }}/" 2>/dev/null || true
          done

          echo "Injecting navbar..."
          python3 -c "
import os, shutil
d = os.environ['ZASHBOARD_DIR']
s = '/tmp/zash_src'
nb = '<!-- navbar -->\n<link rel=\"stylesheet\" href=\"/Tools/navbar.css\">\n<script src=\"/Tools/navbar.js\"></script>'
src_idx = os.path.join(s, 'index.html')
tgt_idx = os.path.join(d, 'index.html')
if os.path.exists(src_idx): shutil.copy2(src_idx, tgt_idx)
with open(tgt_idx, encoding='utf-8') as f: h = f.read()
c = False
if '/Tools/navbar.css' not in h:
    h = h.replace('<head>', '<head>\n' + nb); c = True
if 'navbar-overlay' not in h:
    h = h.replace('<body class=\"', '<body class=\"navbar-overlay ')
    h = h.replace('<body>', '<body class=\"navbar-overlay\">'); c = True
if c:
    with open(tgt_idx, 'w', encoding='utf-8') as f: f.write(h)
    print('Navbar injected')
"
          echo "$VER" > ${{ env.ZASHBOARD_DIR }}/.version
          echo "Zashboard updated to ${{ steps.zash_ver.outputs.latest }}"

      # ‚îÄ‚îÄ Commit changes ‚îÄ‚îÄ
      - name: Commit changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.METACUBEXD_DIR }}/ ${{ env.ZASHBOARD_DIR }}/
          git diff --staged --quiet || git commit -m "chore: auto-update dashboards [skip ci]"
          git pull --rebase
          git push

      # ‚îÄ‚îÄ Deploy to Pages ‚îÄ‚îÄ
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
