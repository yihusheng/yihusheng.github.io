name: Update Dashboards

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update (skip version check)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  M: Tools/Metacubexd
  Z: Tools/zashboard

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ═══════════════════════════════
      # Metacubexd（导航栏由 Cloudflare Pages _middleware 注入）
      # ═══════════════════════════════
      - name: Check Metacubexd version
        id: mv
        run: |
          LATEST=$(curl -s https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest \
            | jq -r '.tag_name // "v0"')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          CUR=""
          [ -f "$M/index.html" ] && CUR=$(grep -oP 'appVersion:"\K[^"]+' "$M/index.html" || echo "")
          echo "cur=${CUR:-none}" >> $GITHUB_OUTPUT
          [ "$LATEST" = "$CUR" -a "${{ inputs.force_update }}" != "true" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT

      - name: Update Metacubexd
        if: steps.mv.outputs.skip == 'false'
        run: |
          V=${{ steps.mv.outputs.latest }}
          echo "Downloading Metacubexd ${V}..."
          curl -sL "https://github.com/MetaCubeX/metacubexd/releases/download/${V}/compressed-dist.tgz" -o /tmp/m.tgz
          mkdir -p /tmp/ms
          tar -xzf /tmp/m.tgz -C /tmp/ms

          # 自动检测源目录
          S=""
          if [ -d "/tmp/ms/compressed-dist" ]; then
            S=/tmp/ms/compressed-dist
          elif [ -d "/tmp/ms/_nuxt" ]; then
            S=/tmp/ms
          else
            NUXT_DIR=$(find /tmp/ms -type d -name "_nuxt" | head -1)
            [ -n "$NUXT_DIR" ] && S=$(dirname "$NUXT_DIR")
          fi
          if [ -z "$S" ] || [ ! -d "$S" ]; then
            echo "ERROR: Cannot find source directory with _nuxt"
            find /tmp/ms -type f | head -30
            exit 1
          fi
          echo "Source dir: $S"

          # 检查 index.html
          IDX=""
          if [ -f "$S/index.html" ]; then
            IDX=index.html
          elif [ -f "$S/_index.html" ]; then
            IDX=_index.html
          else
            echo "ERROR: no index.html in $S"
            exit 1
          fi
          echo "Index file: $IDX"

          # 清理旧文件
          rm -rf "$M/_nuxt" "$M/_fonts"
          rm -f "$M"/workbox-*.js 2>/dev/null || true
          mkdir -p "$M"

          # _nuxt
          echo "Copying _nuxt ($(find $S/_nuxt -type f | wc -l) files)..."
          cp -r "$S/_nuxt" "$M/"

          # _fonts
          if [ -d "$S/_fonts" ]; then
            cp -r "$S/_fonts" "$M/"
            echo "Copied _fonts ($(find $M/_fonts -type f | wc -l) files)"
          fi

          # workbox
          for f in "$S"/workbox-*.js; do
            [ -f "$f" ] && cp "$f" "$M/"
          done

          # 静态文件
          for f in sw.js manifest.webmanifest .nojekyll favicon.ico favicon.svg \
                   pwa-*.png maskable-icon-*.png apple-touch-icon-*.png; do
            for g in "$S"/$f; do
              [ -f "$g" ] && cp "$g" "$M/" 2>/dev/null || true
            done
          done

          # HTML 文件（纯拷贝，导航栏由 Cloudflare _middleware 注入）
          for f in $IDX 200.html 404.html; do
            if [ -f "$S/$f" ]; then
              cp "$S/$f" "$M/$f"
            elif [ "$f" != "$IDX" ] && [ -f "$M/$IDX" ]; then
              cp "$M/$IDX" "$M/$f"
              echo "  Created $f from $IDX"
            fi
            [ -f "$M/$f" ] && echo "  Copied: $M/$f"
          done

          # config.js
          [ -f "$M/config.js" ] || echo 'window.__METACUBEXD_CONFIG__={defaultBackendURL:""}' > "$M/config.js"
          echo "Metacubexd ${V} done ($(find $M/_nuxt -type f | wc -l) nuxt files)"

      # ═══════════════════════════════
      # Zashboard（导航栏由 Cloudflare Pages _middleware 注入）
      # ═══════════════════════════════
      - name: Check Zashboard version
        id: zv
        run: |
          LATEST=$(curl -s https://api.github.com/repos/Zephyruso/zashboard/releases/latest \
            | jq -r '.tag_name // "v0"')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          CUR=""; [ -f "$Z/.version" ] && CUR=$(cat "$Z/.version")
          echo "cur=${CUR:-none}" >> $GITHUB_OUTPUT
          [ "$LATEST" = "$CUR" -a "${{ inputs.force_update }}" != "true" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT

      - name: Update Zashboard
        if: steps.zv.outputs.skip == 'false'
        run: |
          V=${{ steps.zv.outputs.latest }}
          echo "Downloading Zashboard ${V}..."
          curl -sL "https://github.com/Zephyruso/zashboard/releases/download/${V}/dist-no-fonts.zip" -o /tmp/z.zip
          mkdir -p /tmp/zs
          unzip -qo /tmp/z.zip -d /tmp/zs

          # 自动检测源目录
          if [ -d "/tmp/zs/dist" ]; then
            S=/tmp/zs/dist
          elif [ -d "/tmp/zs/assets" ]; then
            S=/tmp/zs
          else
            S=$(find /tmp/zs -name index.html -exec dirname {} \; | head -1)
          fi
          echo "Source dir: $S"

          mkdir -p "$Z"
          rm -rf "$Z/assets"
          [ -d "$S/assets" ] && cp -r "$S/assets" "$Z/" || echo "WARNING: no assets dir"

          for f in favicon.ico favicon.svg apple-touch-icon.png pwa-*.png manifest.webmanifest registerSW.js sw.js; do
            for g in "$S"/$f; do
              [ -f "$g" ] && cp "$g" "$Z/" 2>/dev/null || true
            done
          done

          # HTML 文件（纯拷贝，导航栏由 Cloudflare _middleware 注入）
          [ -f "$S/index.html" ] && cp "$S/index.html" "$Z/index.html"
          echo "$V" > "$Z/.version"
          echo "Zashboard $V done"

      # ═══════════════════════════════
      # Commit & Deploy
      # ═══════════════════════════════
      - name: Commit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add $M/ $Z/
          git diff --staged --quiet || git commit -m "chore: auto-update dashboards [skip ci]"
          git pull --rebase
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deploy
        uses: actions/deploy-pages@v4
